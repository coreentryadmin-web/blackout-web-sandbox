 cross-instance fan-out even when the other client would have succeeded. Minor because both clients share one REDIS_URL and usually fail together.","fix":"Track lastFailedAt separately for publisher and subscriber so one client's outage doesn't gate the other's reconnect.","commit":null,"note":""},{"id":"f_5_8","dim":"Realtime / WebSockets / SSE","sev":"P3","cat":"performance","eff":"M","conf":"medium","title":"No per-message backpressure; slow SSE clients buffer unbounded in the stream controller","location":"src/app/api/market/flows/stream/route.ts:43-44; src/app/api/admin/apis/stream/route.ts:30-33; src/app/api/market/spx/pulse/stream/route.ts:42","evidence":"All three routes call controller.enqueue() unconditionally per event/heartbeat with no check of controller.desiredSize. A slow consumer (mobile on poor network) cannot exert backpressure, so the ReadableStream's internal queue grows.","impact":"During a high-volume flow burst, a slow client accumulates a growing in-memory queue in the server's stream controller, raising per-instance memory. MAX_STREAMS bounds connection count but not per-connection buffer size.","fix":"Check controller.desiredSize before enqueue and, when it goes \u003c= 0, drop/coalesce non-critical messages (skip heartbeats, drop oldest flow) so a slow client degrades gracefully instead of bloating memory.","commit":null,"note":""},{"id":"f_5_9","dim":"Realtime / WebSockets / SSE","sev":"P3","cat":"tech-debt","eff":"S","conf":"high","title":"spx-broadcaster (unused) has unmanaged reconnect timers — declared reconnectTimer field never assigned","location":"src/lib/spx-broadcaster.ts:1, 25, 56-66, 99-104","evidence":"The file header (line 1) states this broadcaster is currently unused (pulse/stream reads Redis directly). scheduleReconnect() (56-66) calls setTimeout(() => this.connect()) without storing/clearing a handle, and the declared reconnectTimer field (line 25) is never assigned anywhere, so overlapping reconnect schedules are possible. On 'close' it sets reconnecting=true (102) then schedules; connect() sets it again.","impact":"No live impact — the module is dead code. If revived, the unmanaged timer could spawn multiple concurrent Polygon connect attempts. Latent debt rather than an active bug.","fix":"Delete the file to remove dead, divergent reconnect logic; or, if retained for future use, assign and clearTimeout the reconnectTimer field before each schedule, mirroring the uwSocket/polygon-socket single-timer pattern.","commit":null,"note":""},{"id":"f_6_4","dim":"Provider — Unusual Whales","sev":"P3","cat":"performance","eff":"S","conf":"medium","title":"In-memory uwResponseCache only covers 4 path patterns; market-tide is then cached twice (Redis + in-memory)","location":"src/lib/providers/unusual-whales.ts:39-66 (uwCacheTtlMs/readUwCache/writeUwCache) + 365-381 (fetchUwMarketTide)","evidence":"uwCacheTtlMs returns >0 only for /api/economy/*, /api/market/market-tide, /api/net-flow/expiry, and /api/group-flow/*. fetchUwMarketTide already wraps its uwGetSafe('/api/market/market-tide') in uwCacheGet (Redis), and uwGetSafe additionally writes the same payload into uwResponseCache because market-tide has a non-zero in-memory TTL.","impact":"Minor: redundant serialization/storage and two TTLs (Redis 180s vs in-memory UW_MARKET_TIDE_CACHE_SEC default 300s) that can disagree, so a value can be served from the in-memory layer up to 5min while Redis considers it stale. Not a correctness risk for tide but an inconsistency.","fix":"Pick one cache tier per endpoint. Since tide/group-flow/net-flow already go through Redis uwCacheGet, drop them from uwCacheTtlMs and keep the in-memory layer for endpoints with no Redis wrapper (or vice-versa).","commit":null,"note":""},{"id":"f_6_6","dim":"Provider — Unusual Whales","sev":"P3","cat":"reliability","eff":"S","conf":"medium","title":"WS handler trusts any non-status payload as authenticated/'open' — a server error frame can mask a dead channel","location":"src/lib/ws/uw-socket.ts:140-167 (dispatch), 169-195 (handleMessage)","evidence":"dispatch sets authenticated=true / channelState='open' for ANY payload that isn't a {status:...} frame (lines 156-158), before invoking handlers. handleMessage only treats top-level {error:...} objects as auth failures; a per-channel error delivered as `[channel, {error:...}]` is routed to dispatch and marked 'open'.","impact":"getStatus()/getChannelHealth() can report a channel as OPEN/authenticated even when UW is returning error frames on it. Mitigated in practice because consumers (flow-ingest) additionally check isUwChannelFresh, but the health snapshot and any status-only consumer can be misled.","fix":"In dispatch, detect array frames whose payload contains an `error` field and mark the channel degraded rather than 'open'; only flip authenticated=true on an actual data row or a status:ok join ack.","commit":null,"note":""},{"id":"f_6_7","dim":"Provider — Unusual Whales","sev":"P3","cat":"tech-debt","eff":"S","conf":"medium","title":"Stale TODO/comment claims contradict live config — UW_MAX_RPS default still 2, 'spot-exposures are 503' asserted as permanent","location":"src/lib/providers/unusual-whales.ts:17-19, 798, 842, 1353; src/lib/providers/uw-rate-limiter.ts:11","evidence":"unusual-whales.ts:17-19 says 'UW_MAX_RPS can be safely lowered to 1 ... TODO: Set UW_MAX_RPS=1', but the limiter default is still 2 (uw-rate-limiter.ts:11) and there's no evidence it was changed. Multiple comments assert 'UW spot-exposures are 503' as fact (line 798) while fetchUwOdteGexLadder still actively tries that endpoint first (line 329), so either the comment is stale or the first ladder attempt is known-dead work.","impact":"Misleading for the next maintainer: the code still attempts spot-exposures every desk build (a guaranteed-failing call + its rate-limit slot) if 503 is truly permanent, or the 'sole GEX source is Polygon' comments are wrong if it isn't. Either way it wastes a UW slot or misdocuments behavior.","fix":"Decide: if spot-exposures is permanently 503 on this plan, drop it from the fetchUwOdteGexLadder attempt list and keep only greek-exposure/strike; if it's transient, soften the comments. Resolve the UW_MAX_RPS TODO or delete it.","commit":null,"note":""},{"id":"f_6_8","dim":"Provider — Unusual Whales","sev":"P3","cat":"performance","eff":"M","conf":"low","title":"Sequential desk fetches (runUwSequential) serialize 6+ UW calls with 300ms min-spacing → slow desk build under the 2s cap","location":"src/lib/providers/spx-desk.ts:799-808, 914-923, 1276-1285; uw-rate-limiter.ts:15 (MIN_SPACING_MS=300), 253-261","evidence":"buildSpxDesk runs two runUwSequential batches of 6 tasks each; each UW HTTP call is paced by waitMinSpacing (300ms) and the token bucket (MAX_RPS=2). Six serial calls = ~1.8s minimum just in spacing, and the fresh-flows fetch has a hard 2000ms Promise.race cap (line 864).","impact":"On a cache-cold desk build, the UW portion alone can approach/exceed the 2s flow cap, causing fetchSpxDeskFlowAlertsWithDb to time out and fall back to sticky data more often than necessary. Most of these calls are independently cacheable and could use runUwPool within the global RPS ceiling.","fix":"Where the underlying endpoints are Redis-cached (tide, nope, dark pool, net-prem, flow-per-expiry), use runUwPool (concurrency 2-3) instead of strict sequential — the Redis global limiter already enforces the true ceiling, so serialization only adds latency without cost savings on cache hits.","commit":null,"note":""},{"id":"f_7_4","dim":"Provider — Polygon/Massive & misc (symbol conventions, error handling, caching, macro/news/web-search, provider-policy fallback)","sev":"P3","cat":"bug","eff":"S","conf":"medium","title":"fetchIndexRsi encodes I:SPX inconsistently with every other indicator/aggs path","location":"src/lib/providers/polygon.ts:649 (encodeURIComponent on the symbol) vs :500/:603/:618 fetchTickerEma/fetchIndexEma/fetchIndexSma which pass raw `I:SPX`","evidence":"fetchIndexRsi builds the path with `encodeURIComponent(\"I:\"+symbol)` → `I%3ASPX`, whereas fetchIndexEma/Sma and all aggs builders use the unencoded `I:SPX`. The api-probe docs confirm the working format is unencoded: `/v1/indicators/rsi/I:SPX?...` and `/v1/indicators/ema/I:SPX` (api-probe/page.tsx:708,740,748). Massive accepts the raw colon, so the encoded variant likely 404s.","impact":"Latent: fetchIndexRsi has zero callers today (only fetchPolygonRsi in polygon-largo is used for index RSI), so nothing breaks now — but the function is exported and the next caller would silently get null index RSI.","fix":"Drop encodeURIComponent and normalize to the same `I:`-prefix-raw convention used by fetchIndexEma/Sma, or delete the unused function.","commit":null,"note":""},{"id":"f_7_5","dim":"Provider — Polygon/Massive & misc (symbol conventions, error handling, caching, macro/news/web-search, provider-policy fallback)","sev":"P3","cat":"reliability","eff":"S","conf":"high","title":"Tavily/Serper/Brave web-search swallow all non-OK responses, hiding auth/quota failures","location":"src/lib/providers/web-search.ts:36,57,80 (each `if (!res.ok) return [];`)","evidence":"All three providers return [] on any non-200 with no log. A 401 (bad key), 429 (quota), or 5xx is indistinguishable from a genuinely empty result set. Contrast with polygon-options-gex.ts which logs status+host on failure.","impact":"When the search provider key expires or hits quota, catalyst/breaking-news fallback silently returns nothing and the desk shows no news with no operator signal — a silent degradation in a product that uses web search for breaking catalysts.","fix":"Log a host-only warning with res.status on !res.ok (mirroring polygon-gex's hostOf pattern), so telemetry/operators can see provider auth/quota failures.","commit":null,"note":""},{"id":"f_7_6","dim":"Provider — Polygon/Massive & misc (symbol conventions, error handling, caching, macro/news/web-search, provider-policy fallback)","sev":"P3","cat":"bug","eff":"S","conf":"medium","title":"fetchIndexSnapshots returns price 0 (not null) when value/session fields are all missing","location":"src/lib/providers/polygon.ts:369-373","evidence":"out[ticker] = { price: row.value ?? row.session?.close ?? row.session?.previous_close ?? 0, change_pct: ... }. A present-but-malformed index row (no value, no session) yields a non-null IndexQuote with price 0, unlike the stock path (_rowToSnapshot throws on price\u003c=0 → null).","impact":"Downstream callers test `snap?.price` truthiness (e.g. spx-desk.ts:781 `if (!spxSnap?.price) return empty`) so a 0 is mostly caught, but any consumer reading the field without a truthiness check could treat 0 as a real index level. Inconsistent with the stock snapshot's strict null contract.","fix":"Skip rows where the resolved price is \u003c=0/non-finite (leave out[ticker]=null), matching the stock snapshot validation contract.","commit":null,"note":""},{"id":"f_8_3","dim":"AI / Anthropic (Largo, Commentary, NightHawk)","sev":"P3","cat":"reliability","eff":"S","conf":"medium","title":"Tool-loop final synthesis call has no error handling and is non-streaming for streaming clients","location":"src/lib/providers/anthropic.ts:296-305","evidence":"After maxRounds (default 12) is exhausted the loop makes one more `client.messages.create(...)` wrapped only in withTelemetry, which records and rethrows — there is no try/catch returning null (contrast anthropicText at :162-168). An exception propagates up through anthropicToolLoop to runLargoQuery/runLargoQueryStream. It is also non-streaming even when the turn streamed, and passes no timeoutMs override, so it uses the 20s client default.","impact":"A model error/timeout on the 13th-round synthesis surfaces as a hard Largo error instead of the graceful null/fallback used elsewhere, and the user sees no tokens for the final synthesis. Edge-case: only reached after 12 full tool rounds in one turn.","fix":"Wrap the final create() in try/catch returning null (mirroring anthropicText), and pass a timeout/retry override consistent with the rest of the loop. Optionally stream the final synthesis so the user still sees output after a 12-round tool session.","commit":null,"note":""},{"id":"f_8_4","dim":"AI / Anthropic (Largo, Commentary, NightHawk)","sev":"P3","cat":"tech-debt","eff":"M","conf":"high","title":"Anthropic telemetry hardcodes attempt=1/max_attempts=1 despite SDK maxRetries=3","location":"src/lib/providers/anthropic.ts:37 (maxRetries:3), 59-67 & 82-91 (attempt:1, max_attempts:1, synthetic correlation_id)","evidence":"getClient() sets `maxRetries: 3` (line 37), but withTelemetry always records `attempt: 1, max_attempts: 1` (lines 60-61, 84-85) and latency_ms measures the whole SDK call including its internal retries. correlation_id is `anthropic-${Date.now()}` (lines 59,82) — synthetic, not the Anthropic request_id — and request/response bodies are null.","impact":"Observability is misleading: a call that internally retried 3x over ~60s logs as a single attempt with large latency and rate_limited only set on the final 429, making 429/529 retry storms hard to diagnose from telemetry.","fix":"Either set maxRetries:0 and implement the retry loop inside withTelemetry so true attempt counts are recorded, or annotate the telemetry that latency includes SDK-internal retries and surface the real request_id (Anthropic.APIError.request_id) instead of the synthetic correlation id.","commit":null,"note":""},{"id":"f_8_5","dim":"AI / Anthropic (Largo, Commentary, NightHawk)","sev":"P3","cat":"tech-debt","eff":"S","conf":"high","title":"play / market.indices live-feed dumps are sliced mid-JSON without field whitelisting","location":"src/lib/largo/largo-live-feed.ts:415 (JSON.stringify(play).slice(0,600)), :422 (JSON.stringify(market.indices).slice(0,400))","evidence":"formatLargoLiveFeed appends `JSON.stringify(play).slice(0,600)` and `JSON.stringify(market.indices).slice(0,400)` directly into the system-prompt lines. Unlike the adjacent vol block (lines 401-408), which builds a whitelisted volSafe object before stringifying specifically to avoid mid-value truncation, play and market.indices are stringified whole and hard-sliced, which can truncate mid-value into malformed JSON. (Note: the prior claim that volSafe is unsanitized is incorrect — volSafe is already whitelisted.)","impact":"Low. Sources are first-party APIs (Polygon/UW/desk), so this is not a security/injection risk — only malformed/truncated JSON that can confuse the model or waste tokens.","fix":"Apply the same pattern already used for volSafe: build a whitelisted, field-limited object for play and market.indices before stringifying, so slicing never cuts mid-value.","commit":null,"note":""},{"id":"f_9_4","dim":"SPX Play / Confluence Engine (correctness)","sev":"P3","cat":"bug","eff":"S","conf":"high","title":"SPX_EARLY_CLOSE_ET_MINS env override has no NaN guard — a typo silently disables no-entry and force-exit cutoffs","location":"src/lib/spx-play-session-guards.ts:36-39 (getEarlyCloseMinutes) feeding isPastNoEntryCutoff:96-102 and isPastForceExitCutoff:113-119","evidence":"`const envOverride = process.env.SPX_EARLY_CLOSE_ET_MINS; if (envOverride) return Number(envOverride);` (lines 36-37) — no Number.isFinite check. A malformed value yields NaN; then earlyClose-30 / earlyClose-10 are NaN and `etMinutes(now) >= NaN` is always false (lines 101, 118), so both the no-entry and force-exit cutoffs are disabled for the day.","impact":"A typo in the operator-set early-close override silently removes the theta force-exit guard — the worst-case money safety on a 0DTE early-close day. Low likelihood (operator-set, only active when env is present) but high blast radius.","fix":"Coerce with a finite guard in getEarlyCloseMinutes: `const n = Number(envOverride); if (Number.isFinite(n)) return n;` then fall through to EARLY_CLOSE_DATES[todayEtYmd] ?? null. Optionally log a warning when the override is set but unparseable.","commit":null,"note":""},{"id":"f_9_5","dim":"SPX Play / Confluence Engine (correctness)","sev":"P3","cat":"bug","eff":"S","conf":"medium","title":"Macro-event date-only rows assume a fixed 8:30 ET release time","location":"src/lib/spx-play-gates.ts:47-56 (parseMacroEventMinutes) and 58-95 (macroHardBlock)","evidence":"parseMacroEventMinutes returns `8*60+30` for any YYYY-MM-DD-only event (lines 49-52). macroHardBlock then blocks the eventMins-5 .. eventMins+60 window for CPI/PPI/NFP/PAYROLL/GDP (lines 89-92). FOMC/FED/RATE DECISION date-only rows are routed to the afternoon branch defaulting to 14:00 (lines 78-87), but other macro events with no time are pinned to 8:30.","impact":"A date-only macro event released at a non-8:30 time (e.g. 10:00 ET data) is not blocked at its real release, or blocks the wrong window — degrading the macro hard-block's protective value on those days.","fix":"When parseMacroEventMinutes has only a date, prefer the provider's time field if present on the event; if truly unknown, widen the blocked window (e.g. through the full morning) or skip the precise-window optimization rather than pinning to 8:30.","commit":null,"note":""},{"id":"f_9_6","dim":"SPX Play / Confluence Engine (correctness)","sev":"P3","cat":"data-integrity","eff":"S","conf":"high","title":"closeOpenPlay meta write omits session_date, weakening the same-day re-entry lock","location":"src/lib/spx-play-store.ts:304-318 (newMeta) and 337-342 (metaPayload persisted via setMetaFn in the DB-transaction branch); read-side reset src/lib/spx-play-store.ts:131-135","evidence":"newMeta (lines 304-318) and the DB-branch metaPayload (337-342) set last_buy_at/last_sell_at/last_sell_was_loss/last_direction/last_stop_at but never set session_date. The savePlaySessionMeta path adds session_date via mergeSessionMeta (line 180), but the closeOpenPlay DB-transaction branch writes metaPayload directly with setMetaFn (raw UPSERT, db.ts:644), bypassing that merge. loadPlaySessionMeta then sees `!meta.session_date` and resets last_sell_was_loss/last_direction/last_stop_at (lines 131-135).","impact":"After a close persisted via the transaction branch, the stored meta has no session_date, so the next read treats it as stale and clears the post-loss re-entry-lock fields within the same trading day — prematurely allowing a same-direction re-entry that the lock should still be blocking.","fix":"Set `session_date: todayEt()` on metaPayload (and newMeta) in closeOpenPlay so the same-day re-entry lock survives reads until the ET date actually rolls over. (This becomes moot once finding 1's transaction is properly threaded if you route the meta write through savePlaySessionMeta/mergeSessionMeta instead.)","commit":null,"note":""},{"id":"f_10_6","dim":"Flow Pipeline + GEX + Data Integrity","sev":"P3","cat":"performance","eff":"S","conf":"medium","title":"WS flow_alerts handler has no in-process dedup or premium pre-filter — every message hits persist + DB round-trip","location":"src/lib/ws/uw-socket.ts:467-479; src/lib/flow-persist.ts:50-99","evidence":"Handler loops `for (const raw of block) { ... void persistAndPublishFlowAlert(raw, flow); }` with no local seen-set. persistAndPublishFlowAlert only short-circuits on `flow.premium \u003c MIN_PREMIUM`; everything above issues an insertFlowAlert round-trip relying solely on ON CONFLICT to dedup.","impact":"UW's flow_alerts WS commonly re-broadcasts the same alert id in successive frames. Each repeat costs a Postgres INSERT...ON CONFLICT round-trip and a Redis publish even though the insert is a no-op, adding avoidable DB/Redis load and connection-pool pressure on the hot 0DTE path. Correctness is unaffected (ON CONFLICT backstops it).","fix":"Keep a small bounded LRU/Set of recently-seen alert ids in the WS handler (e.g. last 2-5k) and skip persist for repeats before touching Postgres/Redis; leave ON CONFLICT as the correctness backstop. Note this overlaps with the duplicate-publish fix above.","commit":null,"note":""},{"id":"f_10_7","dim":"Flow Pipeline + GEX + Data Integrity","sev":"P3","cat":"bug","eff":"M","conf":"medium","title":"computeGammaFlip can select a flip arbitrarily far from spot via the prevCum===0 / newCum===0 zero-touch branches","location":"src/lib/providers/gamma-desk.ts:66-90 (computeGammaFlip)","evidence":"When prevCum===0 it proposes `flip=prevStrike` and when newCum===0 it proposes `flip=strike`, each gated only by `dist \u003c bestDist`. A run of zero-net strikes far from spot (sparse 0DTE wings) makes the cumulative curve touch zero at distant strikes, any of which can beat bestDist over a genuine sign-crossing nearer spot.","impact":"On a thin/early-session ladder the reported gamma flip — and therefore gammaRegime amplification vs mean_revert (gamma-desk.ts:101-104), which gates directional desk logic — can latch onto a far OTM strike where cumulative GEX merely grazes zero. Mitigated by sticky lastGoodGammaFlip, but a single bad build still propagates.","fix":"Prefer true sign-change crossings (prevCum*newCum\u003c0) over exact-zero touches; only fall back to a zero-touch flip when no sign change exists, and clamp candidate flips to a sane band around spot (reuse the band topGexWalls uses, gamma-desk.ts:109).","commit":null,"note":""},{"id":"f_10_8","dim":"Flow Pipeline + GEX + Data Integrity","sev":"P3","cat":"reliability","eff":"S","conf":"low","title":"mergeTapeBuffer / mergeTapeItems sort on new Date(t.time) without guarding NaN, so an unparseable timestamp corrupts ordering","location":"src/lib/spx-desk-merge.ts:36; src/lib/providers/spx-desk.ts:553,572","evidence":"`new Date(b.time).getTime() - new Date(a.time).getTime()` where time is f.alerted_at (possibly the NOW()-defaulted value) or dark-pool p.executed_at (spx-desk.ts:545). An unparseable value yields NaN; premium is guarded with `?? 0` but time is not.","impact":"A single unparseable timestamp makes the comparator return NaN, leaving array order for that element undefined under V8 sort — intermittently shuffling the tape rather than just misplacing one row.","fix":"Parse time once through a guarded helper (`Number.isFinite(Date.parse(x)) ? Date.parse(x) : 0`) before sorting and treat unparseable times as oldest (0) so they sink instead of corrupting ordering. Fold this into the shared comparator from finding 1.","commit":"e87fe97","note":"New pure alias-free safeTime() (Date.parse guarded to 0) used by all 3 tape comparators. safe-time.test.ts incl. a one-bad-timestamp ordering-stability case."},{"id":"f_10_9","dim":"Flow Pipeline + GEX + Data Integrity","sev":"P3","cat":"data-integrity","eff":"S","conf":"low","title":"analyzeStrikeGexRows net===0 filter keeps balanced (callG=-putG) strikes but drops genuinely empty ones, creating inconsistent flip anchors","location":"src/lib/providers/gamma-desk.ts:32","evidence":"`if (net === 0 && callG === 0 && putG === 0) continue;` — a strike with large equal-and-opposite call/put gamma (net 0, both nonzero) is kept and contributes 0 to cum but still acts as a prevStrike anchor in computeGammaFlip; a true 0/0 strike is dropped.","impact":"Net-0-but-nonzero strikes become zero-touch flip anchors (feeding the computeGammaFlip finding), and a real 0/0 gap is treated differently from a balanced strike. Low frequency on SPX 0DTE but affects flip precision on balanced ladders.","fix":"Pick one explicit policy — either keep all finite-strike rows (let net 0 contribute 0 naturally) or skip any row whose net is 0 regardless of legs — and document it, since computeGammaFlip's prevStrike anchoring depends on which rows survive.","commit":"0bd6862","note":"VERIFIED the current policy is already correct (keeps balanced net-0 strikes = output-neutral for computeGammaFlip; skips only true 0/0). Documented the policy + dropped a redundant clause; gamma-desk.test.ts locks in the behavior."},{"id":"f_11_7","dim":"NightHawk + Lotto Engines (edition builder/checkpoint-resume, lotto/power-hour engines, outcomes tracking, server-only, scheduling)","sev":"P3","cat":"ux","eff":"S","conf":"medium","title":"Lotto premium-cap fallback range can advertise a premium the chosen contract can't meet","location":"src/lib/spx-lotto-options.ts:114-129,202-203","evidence":"When the chain is unavailable the ticket falls back to `premium_range: \"~$0.50–$1.50\"` with blocked:true, but the engine still surfaces contract_label and entry guidance. The blocked flag is passed to copy via lottoWatchStatusMessage but the premium_range string itself is an estimate unrelated to the VIX-indexed maxPremium cap actually used for selection.","impact":"On chain-fetch failure subscribers may see a concrete-looking ~$0.50–$1.50 premium for a strike that was never price-validated, slightly misrepresenting real entry cost for a far-OTM 0DTE lotto.","fix":"When blocked, suppress the dollar premium_range or clearly label it as an unvalidated estimate tied to the VIX bucket; keep the block_reason visible in the headline, not just the footnote.","commit":null,"note":""},{"id":"f_11_8","dim":"NightHawk + Lotto Engines (edition builder/checkpoint-resume, lotto/power-hour engines, outcomes tracking, server-only, scheduling)","sev":"P3","cat":"reliability","eff":"S","conf":"medium","title":"`rehydrated` flag is process-global and latches true permanently, defeating later rehydrates","location":"src/lib/spx-lotto-outcomes.ts:6,17-28,73","evidence":"`let rehydrated = false;` set to true after the first rehydrateMemoryIds(); logLottoPhase only rehydrates `if (id == null && !rehydrated)`. After the first call it never re-reads the DB even if memoryIds is missing a key created by another instance.","impact":"In a multi-instance or restart-after-first-log scenario, a phase log for a pick inserted elsewhere skips rehydrate and instead re-inserts a fresh row (line 78), creating a duplicate/disconnected outcome record. Self-heals via insert but pollutes the outcomes table.","fix":"Drop the permanent latch — rehydrate whenever the specific key is missing (keyed by session_date), or reset `rehydrated` on session rollover.","commit":null,"note":""},{"id":"f_12_7","dim":"Crons & Background Jobs","sev":"P3","cat":"tech-debt","eff":"S","conf":"high","title":"Health-snapshot diagnostics reference a ?secret= query param that isCronAuthorized does not accept","location":"src/lib/admin-cron-health.ts:254-255 vs src/lib/market-api-auth.ts:5-10","evidence":"diagnosticsNote tells operators: 'HTTP crons must curl blackout-web with ?secret=CRON_SECRET after this deploy.' But isCronAuthorized only reads the Authorization Bearer header (`req.headers.get('authorization')?.replace(/^Bearer\\s+/i,'')`) and has no query-param path. scripts/hit-cron.mjs correctly uses the Bearer header.","impact":"An operator following the dashboard's own instructions (curl with ?secret=) gets a 401 and may wrongly conclude crons are broken or the secret is wrong, wasting debugging time during an incident.","fix":"Fix the diagnostics string to say 'send Authorization: Bearer $CRON_SECRET' (matching hit-cron.mjs), or extend isCronAuthorized to also accept a ?secret= query param if that ergonomic path is actually wanted.","commit":null,"note":""},{"id":"f_12_8","dim":"Crons & Background Jobs","sev":"P3","cat":"performance","eff":"M","conf":"medium","title":"db-cleanup uses fragile RETURNING 1 for rowCount and DELETE without batching on high-volume tables","location":"src/app/api/cron/db-cleanup/route.ts:36-41,43-76","evidence":"deleteOlderThan runs `DELETE FROM ${table} WHERE ${column} \u003c NOW() - INTERVAL '${days} days' RETURNING 1` and returns res.rowCount. api_telemetry_events is noted as ~30k rows/day kept 7 days; all seven DELETEs run concurrently via Promise.all with no LIMIT/batching and no statement_timeout.","impact":"A single unbounded DELETE over a large, un-vacuumed table can take a long lock and bloat; running all seven concurrently on one nightly tick can spike DB load. RETURNING 1 also forces returning a row per deleted tuple just to get a count that rowCount already provides from a plain DELETE. If the table/column were ever derived from input this would be injectable, though here they're hardcoded constants (so not a security issue today).","fix":"Drop RETURNING 1 (plain DELETE already sets rowCount), consider batched deletes (DELETE ... WHERE ctid IN (SELECT ctid ... LIMIT N) looped) for the highest-volume tables, run them sequentially or with a per-statement timeout, and keep table/column names as a hardcoded allowlist (as now).","commit":null,"note":""},{"id":"f_12_9","dim":"Crons & Background Jobs","sev":"P3","cat":"reliability","eff":"S","conf":"medium","title":"flow-ingest concurrency guard is per-replica in-memory only","location":"src/app/api/cron/flow-ingest/route.ts:13-16 + src/lib/providers/flow-ingest.ts:12 (export let ingestInFlight)","evidence":"The route skips when module-level `ingestInFlight` is truthy. ingestInFlight is a per-process variable (flow-ingest.ts:12). The cron runs every 2 min and numReplicas=1 in the TOML, but blackout-web itself (the app being curled) can run multiple replicas.","impact":"If blackout-web scales beyond one replica, the in-memory guard does not prevent two replicas from ingesting simultaneously. This is largely mitigated by the `alert_id TEXT UNIQUE` constraint on flow_alerts (DB-level dedup), so the realistic impact is wasted UW API calls rather than duplicate rows. Acceptable today but a latent scaling footgun.","fix":"If blackout-web ever runs >1 replica, gate runFlowIngest behind a short pg_try_advisory_lock (single-connection, per the fix above) instead of an in-memory flag; otherwise document the single-replica assumption.","commit":null,"note":""},{"id":"f_13_6","dim":"Frontend Architecture & Performance","sev":"P3","cat":"performance","eff":"S","conf":"medium","title":"Decorative DnaHelixBackground renders 4 full-height animated SVGs with multi-stage blur filters always-on","location":"src/components/DnaHelixBackground.tsx:188-262 (4 COLS each rendering HelixSvg with 12 animateMotion particles + a 3-layer feGaussianBlur filter); mounted on /flows via src/app/flows/page.tsx:13","evidence":"COLS has 4 columns; each HelixSvg has DOTS_S1+DOTS_S2 = 12 animateMotion particles wrapped in `filter={url(#F)}` where F is a 3x feGaussianBlur+feMerge filter (stdDeviation up to 14). Plus RUNGS arrays drawing dozens of lines/circles per SVG.","impact":"SVG SMIL animateMotion under large Gaussian-blur filters is GPU/CPU expensive and runs continuously behind the live flow feed — compounding with the tape's frequent re-renders. On lower-end laptops this is a steady background cost even when idle.","fix":"Lazy-load via next/dynamic(ssr:false), gate behind prefers-reduced-motion, and/or reduce blur stdDeviation and particle count; pause animation when the tab is hidden (visibilitychange).","commit":null,"note":""},{"id":"f_13_7","dim":"Frontend Architecture & Performance","sev":"P3","cat":"reliability","eff":"S","conf":"low","title":"experimental.cpus uses os.cpus() at config eval — fragile in constrained containers","location":"next.config.mjs:42-47 (`import os from \"os\"; experimental: { cpus: Math.max(1, os.cpus().length - 1) }`)","evidence":"cpus: Math.max(1, os.cpus().length - 1). On Railway/nixpacks, os.cpus().length reflects host cores, not the container's cgroup CPU quota, so this can over-subscribe build/runtime parallelism.","impact":"Build can request more parallel workers than the container is actually allotted, causing OOM/throttling or slower builds on small Railway plans. Minor, build-time only.","fix":"Pin to an explicit small value (e.g. 2) or read a NEXT_BUILD_CPUS env var with a conservative default; don't trust os.cpus() inside a container.","commit":null,"note":""},{"id":"f_14_3","dim":"UI/UX & Design Polish","sev":"P3","cat":"enhancement","eff":"M","conf":"medium","title":"Upgrade page is a bare link list — weak conversion surface for a paid product","location":"src/app/upgrade/page.tsx:6-57","evidence":"The entire authenticated upgrade page is max-w-xl and renders only three text links ('Monthly — $79.99', 'Yearly — $699', 'Lifetime — $1,500' from whop-checkout.ts:37-41) plus a sync button. No feature recap, no value framing, no 'save X with yearly' callout, no testimonials/social proof, no highlighted/default plan.","impact":"This is the money page for premium-gated users who hit requireTier('premium'). A plain price list with no value reinforcement or anchoring under-converts versus the richer landing PricingSection, leaving revenue on the table.","fix":"Reuse the landing PricingSection feature checklist on the upgrade page; visually emphasize a recommended plan (e.g. Yearly), show the per-month equivalent and savings vs monthly ($699/yr ≈ $58/mo, ~27% off), and add a one-line value statement + trust signal above the buttons.","commit":null,"note":""},{"id":"f_14_4","dim":"UI/UX & Design Polish","sev":"P3","cat":"tech-debt","eff":"S","conf":"high","title":"Dead, unused LargoTerminal component full of low-contrast grey text","location":"src/components/LargoTerminal.tsx:69,83,95,107,113,123,146 (text-text-muted/#4a4a60, text-text-secondary/#8888a0, text-surface-4)","evidence":"This root component uses text-text-muted (#4a4a60) and text-text-secondary (#8888a0) for body copy/labels. grep for any import of '@/components/LargoTerminal' returns no matches — /terminal imports '@/components/desk/LargoTerminal' instead (terminal/page.tsx:3). The grey version is orphaned.","impact":"No live UX impact (it doesn't ship), but it is a maintenance trap: a future dev could wire it up and reintroduce the exact unreadable-grey problem the team has banned elsewhere. text.muted=#4a4a60 and text.secondary=#8888a0 are defined greys in tailwind.config (lines under colors.text).","fix":"Delete src/components/LargoTerminal.tsx (and the unused .largo-msg / text.muted greys it relies on), or if kept, migrate its colors to the sanctioned sky/cyan palette so it can't reintroduce a violation.","commit":null,"note":""},{"id":"f_14_5","dim":"UI/UX & Design Polish","sev":"P3","cat":"ux","eff":"S","conf":"high","title":"Unused friendly error constant — upgrade page shows dev-speak instead","location":"src/app/upgrade/page.tsx:43 vs src/lib/whop-checkout.ts:34-35","evidence":"whop-checkout.ts exports WHOP_CHECKOUT_UNAVAILABLE_MESSAGE = 'Upgrade options temporarily unavailable — please contact support.' but upgrade/page.tsx:43 renders a hardcoded 'Whop checkout links are not configured yet.' and the friendly constant is never imported/used.","impact":"In the misconfigured-env fallback path, a paying customer sees an internal-sounding 'links are not configured yet' message rather than the prepared support-oriented copy. Minor, but it's the failure path on a revenue page.","fix":"Import and render WHOP_CHECKOUT_UNAVAILABLE_MESSAGE in the else branch of upgrade/page.tsx (and PricingSection's no-link fallback), removing the inline dev string.","commit":null,"note":""},{"id":"f_14_6","dim":"UI/UX & Design Polish","sev":"P3","cat":"ux","eff":"S","conf":"medium","title":"Red used as neutral body/label color on landing pricing — semantic mismatch","location":"src/components/landing/PricingSection.tsx:79 (instructional paragraph text-red-400), :115 (Free tier label text-red-400), :128 (inactive feature text text-bear/80)","evidence":"The 'Sign up on BlackOut, then choose monthly… same email unlocks everything' instruction is text-red-400, and the Free plan's name label is text-red-400. Red conventionally signals error/danger, not neutral guidance.","impact":"On the conversion-critical pricing section, coloring the core how-to-buy instruction red reads as a warning and can subtly undermine trust / clarity. It's readable (contrast is fine) but semantically off-brand for neutral copy.","fix":"Use text-sky-300/cyan-400 for the instructional paragraph and a neutral-but-readable tone for the Free label; reserve red (bear) strictly for the inactive/locked feature markers where 'unavailable' is the intended meaning.","commit":null,"note":""},{"id":"f_15_7","dim":"Observability & Telemetry","sev":"P3","cat":"reliability","eff":"S","conf":"low","title":"Liveness /api/health reports ok:true while DB is unreachable; only /api/ready checks connectivity","location":"src/app/api/health/route.ts:14-15; src/app/api/ready/route.ts:11-14","evidence":"health route comment: 'liveness must not fail deploy when Postgres is slow/unreachable' and returns {ok:true, db:'configured'} without pinging. Only /ready calls pingDatabase. This is intentional, but whether Railway's healthcheck is pointed at /ready (the connectivity-aware probe) vs /health is not enforced in code.","impact":"If the Railway healthcheck is configured against /health, a deploy with a broken DATABASE_URL or unreachable Postgres will pass healthcheck and serve traffic that 500s on every DB call. The design is reasonable but the safer probe (/ready) must be the one wired up.","fix":"Confirm Railway healthcheckPath points at /api/ready (or add a shallow DB ping with a tight timeout to /health), and document the liveness-vs-readiness split in the deploy config.","commit":null,"note":""},{"id":"f_15_8","dim":"Observability & Telemetry","sev":"P3","cat":"tech-debt","eff":"S","conf":"medium","title":"recordAdminRouteError synthesizes a fake telemetry event with latency_ms:0 and method 'ROUTE', polluting provider stats","location":"src/lib/admin-route-errors.ts:13-22","evidence":"Every admin route error calls recordApiCall({provider:'blackout_engine', method:'ROUTE', status:500, latency_ms:0, ...}). These zero-latency synthetic events flow into endpointStats and the blackout_engine provider rows used for p95/p99 and error rates.","impact":"latency percentiles and avg_latency for blackout_engine are skewed toward 0 by these synthetic entries, and 'ROUTE'/500 rows mix internal route failures with real outbound API health, making the provider health summary harder to trust.","fix":"Either tag these as a distinct synthetic phase excluded from latency percentile sampling, or route admin-route errors to the incident/error sink only rather than into the outbound-API telemetry stats.","commit":null,"note":""},{"id":"f_16_6","dim":"Code Quality & Tech Debt","sev":"P3","cat":"tech-debt","eff":"S","conf":"high","title":"`round5` math helper duplicated verbatim in 5 files (and clamp in 3)","location":"round5: spx-lotto-engine.ts:77, spx-lotto-options.ts:52, spx-play-intel.ts:14, spx-play-options.ts:87, spx-power-hour-engine.ts:129; clamp defined in 3 lib files","evidence":"`function round5(n: number): number` appears 5 times. clamp helper defined in 3 separate lib files.","impact":"Strike/price rounding is money-adjacent; five copies invite drift (one file 'fixing' rounding while others don't), and there is no single place to unit-test the rounding rule.","fix":"Move round5/clamp and similar primitives into a shared src/lib/num.ts (or the et-date/option-math modules) and import; delete copies.","commit":null,"note":""},{"id":"f_16_7","dim":"Code Quality & Tech Debt","sev":"P3","cat":"tech-debt","eff":"M","conf":"medium","title":"isomorphic spx-desk-merge.ts pulls ioredis into the client graph, mitigated only by a webpack alias hack","location":"next.config.mjs:54-79 (webpack alias { ioredis: false } + stubbing stream/crypto/dns/net/tls on client); src/lib/spx-desk-merge.ts (16KB, imported by client hooks)","evidence":"Comment: 'spx-desk-merge.ts is isomorphic (used by client hooks) and lazily pulls shared-cache -> ioredis ... webpack still bundles it into the client graph. Stub its Node built-ins on the client ... (This replaced a webpackIgnore:true hack ...)'.","impact":"A server-only Redis dependency leaking into a client-imported module is an architectural smell held together by build-time aliasing; a future refactor that touches the import boundary can resurface ERR_MODULE_NOT_FOUND / 'Can't resolve crypto' build failures. The 'replaced a previous hack' note shows this boundary has already broken once.","fix":"Split spx-desk-merge into a pure client-safe merge module and a server-only module that imports shared-cache/ioredis, so the client graph never references ioredis and the webpack stubs become unnecessary.","commit":null,"note":""},{"id":"f_16_8","dim":"Code Quality & Tech Debt","sev":"P3","cat":"tech-debt","eff":"S","conf":"high","title":"Large auto-generated data blobs and audit artifacts committed into src and repo root","location":"src/lib/docs-probe-report.ts (4806 loc), cursor-api-analysis-data.ts (2180 loc), uw-docs-catalog.ts (1932 loc), plus root AUDIT.md (46KB), CURSOR_IMPL.md (44KB), TODO.html (16KB), build.log, and audits/ + complete-repo-bugs/ + private/ dirs","evidence":"docs-probe-report.ts header: '/** Auto-generated — run: node scripts/probe-docs-endpoints.mjs */'; cursor-api-analysis-data.ts: '/** Auto-generated — run: node scripts/analyze-api-usage.mjs */'. Root holds AUDIT.md/CURSOR_IMPL.md/TODO.html and stray audits/ complete-repo-bugs/ dirs.","impact":"~9KB of generated TS in src inflates the type-check/bundle graph and pollutes grep/IDE results (they ARE imported by docs pages, so not dead, but they don't belong as hand-editable source). Multiple 40KB+ planning docs and a build.log committed at root add noise and risk drift from reality.","fix":"Keep the generated reports as .json data assets (some already exist as .json) loaded at runtime rather than giant .ts exports, or move under a generated/ folder excluded from lint. Move AUDIT/CURSOR/TODO planning docs into a docs/ folder (or out of the repo) and gitignore build.log.","commit":null,"note":""},{"id":"f_16_9","dim":"Code Quality & Tech Debt","sev":"P3","cat":"tech-debt","eff":"S","conf":"medium","title":"No committed ESLint config — lint rules rely entirely on the implicit eslint-config-next default","location":"repo root: no .eslintrc.json/.eslintrc.js/eslint.config.* present; package.json only lists eslint + eslint-config-next","evidence":"`ls .eslintrc*` => none; next.config.mjs has no eslint block. Only dependency is eslint-config-next 14.2.35.","impact":"There is no enforced rule against `: any`, against banned grey text classes (the documented UI rule), or against console.log/unused vars beyond Next's minimal default. The current cleanliness is author discipline, not tooling-enforced, so quality can silently regress as the codebase grows or other contributors join.","fix":"Add an explicit eslint config extending next/core-web-vitals with at least no-explicit-any (warn), no-floating-promises, and a custom no-restricted-syntax/regex rule banning text-grey-*/zinc-*/neutral-* classes so the documented UI rule is enforced in CI, not just in review.","commit":null,"note":""},{"id":"f_16_10","dim":"Code Quality & Tech Debt","sev":"P3","cat":"tech-debt","eff":"S","conf":"medium","title":"`as unknown as` casts bypass type checking at Whop/Redis/serialization boundaries","location":"src/lib/membership.ts:109-110, nighthawk/edition-builder.ts:121/183/184, providers/uw-rate-limiter.ts:59/260, components/admin/AdminSpxDashboard.tsx:319/358","evidence":"membership.ts: `(a as unknown as { created_at?: number }).created_at ?? 0` used to sort memberships; uw-rate-limiter.ts:260 `return results as unknown as R;`.","impact":"These double-casts turn off the compiler at exactly the SDK boundaries where upstream shape changes are most likely (Whop SDK membership shape, ioredis pipeline result types). A Whop field rename to created_at would compile fine and silently sort memberships wrong, affecting which membership drives the user's tier.","fix":"Define narrow typed interfaces for the fields actually read (e.g. a WhopMembershipSortable with created_at) and cast once through a validated accessor, or use the SDK's real types. Keep the cast count from growing by flagging `as unknown` in ESLint.","commit":null,"note":""},{"id":"f_17_9","dim":"Product & Service Enhancements","sev":"P3","cat":"enhancement","eff":"M","conf":"low","title":"Outcome/track-record data not exposed as a shareable social proof / referral artifact","location":"src/app/api/market/spx/outcomes/route.ts, src/components/embeds/* (embeds exist for panels but not for results/track record)","evidence":"There is an embeds system (src/components/embeds/EmbedFrame.tsx, DashboardEmbeds, FlowsEmbeds) for live panels, but no shareable result/track-record card or referral mechanism leveraging the outcome stats already computed.","impact":"Trading communities grow heavily through shared wins and referrals. A shareable, branded 'today's plays / win streak' card (watermarked, linking back) is cheap viral acquisition the platform isn't capturing despite owning the data and an embed framework.","fix":"Generate shareable result cards (the repo already uses sharp for image work) from outcome stats with a referral link; add a simple referral credit via Whop. Low cost, organic-acquisition upside.","commit":null,"note":""},{"id":"x_8","evidence":"","extra":true,"note":"","dim":"Validation / Drill-down Checks (post-audit)","sev":"P3","cat":"Coverage","eff":"M","conf":"high","title":"CHECK: expand unit-test coverage to more pure logic now that npm test exists","location":"src/**/*.test.ts (node:test via tsx)","impact":"Only 3 pure modules are covered; more extractable logic (confluence scoring, parsers, gating predicates) could be guarded.","fix":"Extract + test pure functions opportunistically as each area is touched.","commit":null},{"id":"x_9","evidence":"","extra":true,"note":"","dim":"Validation / Drill-down Checks (post-audit)","sev":"P3","cat":"Decision","eff":"S","conf":"medium","title":"CHECK: decide whether net_vex (only) is worth adding to the SPX Slayer (deferred Phase 3)","location":"spx-commentary.ts, nighthawk/positioning.ts","impact":"Positioning was deferred as redundant with desk GEX/max_pain/walls; net_vex is the one genuinely-new datum.","fix":"If wanted, add net_vex alone (accurately labeled 0DTE OI structure), gated, no cold per-window fetch on the hot path.","commit":null},{"id":"x_11","evidence":"","extra":true,"note":"","dim":"Validation / Drill-down Checks (post-audit)","sev":"P3","cat":"Config Verification","eff":"S","conf":"high","title":"CHECK: set DISCORD_OPS_WEBHOOK_URL in prod so Whop/ops alerts do not fall back to the play channel","location":"spx-play-notify.ts notifyOpsDiscord (falls back to DISCORD_PLAY_WEBHOOK_URL)","impact":"The new Whop missing-secret/missing-email ops alerts (e87fe97/d76c916) post to the trade channel if the ops webhook is unset, polluting it.","fix":"Set DISCORD_OPS_WEBHOOK_URL on blackout-web (and cron services that alert).","commit":null}];
const KEY = 'blackout-audit-v1';
const sevRank={P0:0,P1:1,P2:2,P3:3};
let checks = {};
try{ checks = JSON.parse(localStorage.getItem(KEY)||'{}'); }catch(e){ checks={}; }
for(const it of DATA){ if(it.commit) checks[it.id]=true; }
const save=()=>localStorage.setItem(KEY, JSON.stringify(checks));
save();
const esc=(s)=>{const e=document.createElement('div');e.textContent=s==null?'':String(s);return e.innerHTML;};

const list=document.getElementById('list');
const byDim={};
for(const it of DATA){ (byDim[it.dim]=byDim[it.dim]||[]).push(it); }

function buildCard(it){
  const done=!!checks[it.id];
  const badge = it.commit ? '<span class="fixed">✓ fixed · '+esc(it.commit)+'</span>' : '';
  return '<label class="card'+(done?' done':'')+'" data-id="'+it.id+'" data-sev="'+it.sev+'" data-dim="'+esc(it.dim)+'">'+
    '<input type="checkbox" class="cb" '+(done?'checked':'')+' data-id="'+it.id+'">'+
    '<div class="body">'+
      '<div class="row1"><span class="pill '+it.sev+'">'+it.sev+'</span>'+badge+(it.extra?'<span class="added">+ added</span>':'')+
        '<span class="meta">'+esc(it.cat)+' · effort '+esc(it.eff)+' · '+esc(it.conf)+' confidence</span></div>'+
      '<div class="title">'+esc(it.title)+'</div>'+
      '<div class="det loc">'+esc(it.location)+'</div>'+
      (it.impact?'<div class="det"><b>Impact:</b> '+esc(it.impact)+'</div>':'')+
      '<div class="det"><b>Fix:</b> '+esc(it.fix)+'</div>'+
      (it.note?'<div class="det"><b>Note:</b> '+esc(it.note)+'</div>':'')+
      (it.evidence?'<div class="ev">'+esc(it.evidence)+'</div>':'')+
    '</div></label>';
}

function render(){
  let h='';
  for(const dim of Object.keys(byDim)){
    const arr=byDim[dim].slice().sort((a,b)=>(sevRank[a.sev]??9)-(sevRank[b.sev]??9));
    h+='<details class="dim" open data-dim="'+esc(dim)+'"><summary><span>'+esc(dim)+'</span>'+
       '<span class="dprog" data-dimprog="'+esc(dim)+'"></span></summary>'+
       arr.map(buildCard).join('')+'</details>';
  }
  list.innerHTML=h;
  list.querySelectorAll('.cb').forEach(cb=>cb.addEventListener('change',onCheck));
  applyFilter(); updateStats();
}

function onCheck(e){
  const id=e.target.getAttribute('data-id');
  if(e.target.checked) checks[id]=true; else delete checks[id];
  save();
  e.target.closest('.card').classList.toggle('done',e.target.checked);
  updateStats(); if(document.getElementById('statusf').value!=='all') applyFilter();
}

function updateStats(){
  const t={P0:0,P1:0,P2:0,P3:0}, d={P0:0,P1:0,P2:0,P3:0};
  let done=0;
  for(const it of DATA){ t[it.sev]++; if(checks[it.id]){ d[it.sev]++; done++; } }
  ['P0','P1','P2','P3'].forEach(s=>{document.getElementById('t-'+s).textContent=t[s];document.getElementById('d-'+s).textContent=d[s];});
  const pct=DATA.length?Math.round(done/DATA.length*100):0;
  document.getElementById('donecount').textContent=done;
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('barfill').style.width=pct+'%';
  document.querySelectorAll('[data-dimprog]').forEach(el=>{
    const dim=el.getAttribute('data-dimprog'); const arr=byDim[dim]||[];
    el.textContent=arr.filter(i=>checks[i.id]).length+'/'+arr.length;
  });
}

function applyFilter(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const sevs=new Set([...document.querySelectorAll('#sevseg button.on')].map(b=>b.getAttribute('data-sev')));
  const st=document.getElementById('statusf').value;
  const dimf=document.getElementById('dimf').value;
  document.querySelectorAll('details.dim').forEach(sec=>{
    let vis=0;
    if(dimf && sec.getAttribute('data-dim')!==dimf){ sec.style.display='none'; return; }
    sec.querySelectorAll('.card').forEach(card=>{
      const id=card.getAttribute('data-id'); const it=DATA.find(x=>x.id===id);
      const done=!!checks[id];
      let ok=sevs.has(it.sev);
      if(ok && st==='open') ok=!done;
      if(ok && st==='done') ok=done;
      if(ok && q){ const hay=(it.title+' '+it.location+' '+it.fix+' '+it.impact+' '+it.evidence+' '+it.cat).toLowerCase(); ok=hay.includes(q); }
      card.style.display=ok?'':'none'; if(ok)vis++;
    });
    sec.style.display=vis?'':'none';
  });
}

document.getElementById('q').addEventListener('input',applyFilter);
document.getElementById('statusf').addEventListener('change',applyFilter);
document.getElementById('dimf').addEventListener('change',applyFilter);
document.querySelectorAll('#sevseg button').forEach(b=>b.addEventListener('click',()=>{b.classList.toggle('on');applyFilter();}));
document.getElementById('expand').addEventListener('click',()=>document.querySelectorAll('details.dim').forEach(d=>d.open=true));
document.getElementById('collapse').addEventListener('click',()=>document.querySelectorAll('details.dim').forEach(d=>d.open=false));
document.getElementById('reset').addEventListener('click',()=>{ if(confirm('Clear all ticks (including fixed)?')){ checks={}; save(); location.reload(); }});

render();
</script>
</body>
