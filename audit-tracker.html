breaks if dedup is ever weakened.","fix":"Make Redis the single fan-out path: drop the direct fanOutLocal(flow) in publishFlowEvent and rely on the subscriber callback to fan out (it already runs on every instance, including self). This unifies the local and cross-instance paths. If the local subscribe can ever lag/fail, instead tag each published message with an instance id and skip fanOutLocal in the subscriber when origin === self.","commit":null,"note":"TRIAGED TWICE (w5wnjk85g, wzbrzn9cr) — STILL DEFERRED. Beyond the double-fan, redis-pubsub.ts has a REAL reliability bug: publisherReady/subscriberReady are never reset on disconnect AND the connect memo (publisherInit/subscriberInit) is never nulled, so after any Redis blip a dead client can be returned forever. The full fix (reset ready + null the memo on end/close; gate loopback on channel-subscribed only AFTER subscribe() resolves; re-subscribe on reconnect; THEN make Redis the single fan-out path with a no-Redis/not-ready local fallback) needs a FOCUSED pass designed against the ACTUAL file + its retry machinery — the batch-3 design was built on a stale read and had unverified reconnect code. No dropped-flow window in the proposed design, but unsafe to ship unverified. Low blast radius today (ingest instance only; users see no dupes)."},{"id":"f_5_1","dim":"Realtime / WebSockets / SSE","sev":"P2","cat":"cost","eff":"M","conf":"high","title":"Pulse SSE has no connection cap and does a Redis GET per client every 250ms","location":"src/app/api/market/spx/pulse/stream/route.ts:21-51","evidence":"send() runs on setInterval(..., 250) (line 50) and on every tick calls getUwCacheRedis() then redis.get(\"spx:pulse:snapshot\") (lines 25-28). There is no MAX_STREAMS guard (unlike flows/stream/route.ts:18-20). 250ms = 4 Redis GETs/sec per connected client of the same key.","impact":"100 concurrent pulse viewers = ~400 GET/sec of one key, scaling linearly and uncapped. A reconnect storm or burst of viewers can saturate the Redis connection and add latency to every other Redis consumer. Pulse also lacks the activeStreams ceiling that protects fd limits on flows/stream.","fix":"Read spx:pulse:snapshot once per process on a single shared 250ms-1s timer into an in-memory variable, and have each pulse SSE client enqueue from that in-memory copy instead of issuing its own GET. Also apply the SSE_MAX_STREAMS cap that flows/stream uses to the pulse (and admin) routes.","commit":null,"note":""},{"id":"f_5_2","dim":"Realtime / WebSockets / SSE","sev":"P2","cat":"reliability","eff":"S","conf":"high","title":"Admin telemetry SSE relies solely on cancel() for teardown — leaks timer + listener on enqueue failure","location":"src/app/api/admin/apis/stream/route.ts:30-64","evidence":"The send helper does controller.enqueue(...) with NO try/catch and NO closed guard (lines 30-33). Unlike flows/stream/route.ts (which wraps enqueue in try/catch + a single cleanup()), the admin stream only tears down via cancel() (lines 61-64). The 8s heartbeat (53-59) and the subscribeApiTelemetry listener (49-51) keep firing; if the client is gone but cancel() hasn't fired yet, every enqueue throws into an uncaught path and the listener is never removed.","impact":"On a clean disconnect Next.js fires cancel() and teardown is fine, so the practical leak is bounded — not the unbounded per-visit growth originally claimed. But on abrupt drops / proxy resets where cancel() is delayed, the heartbeat keeps throwing every 8s and the listener lingers in the shared telemetry Set, producing log noise and a transient leak until cancel() lands.","fix":"Mirror the flows/stream pattern: add a `closed` flag and a single cleanup() that clears the heartbeat and calls unsubscribe(); wrap the enqueue in send() in try/catch that invokes cleanup() on failure, rather than depending on cancel() alone.","commit":null,"note":""},{"id":"f_5_3","dim":"Realtime / WebSockets / SSE","sev":"P2","cat":"reliability","eff":"M","conf":"medium","title":"UW socket has no stall watchdog — half-open OPEN connection silently stops delivering data","location":"src/lib/ws/uw-socket.ts:294-305, 566-568","evidence":"heartbeat() only calls ws.ping() when available (lines 297-304); the 30s timer (line 567) just pings. Per-channel lastMessageAt and isUwChannelFresh() exist (457-584), but nothing in the socket manager acts on staleness — there is no watchdog that closes/reconnects when readyState===1 (OPEN) yet no messages have arrived for N seconds.","impact":"UW or an intermediary proxy can hold a half-open TCP connection where readyState stays OPEN but no data flows. getStatus() reports OPEN, the socket never reconnects on its own, and recovery waits for the upstream to send a close frame. During market hours this is a silent data-blackout window on a money-critical feed.","fix":"In the 30s heartbeat tick, if the socket is OPEN but max(lastMessageAt across channelsWithHandlers) is older than ~60-90s, call teardownSocket() + scheduleReconnect() to force a fresh connection.","commit":null,"note":""},{"id":"f_5_4","dim":"Realtime / WebSockets / SSE","sev":"P2","cat":"data-integrity","eff":"M","conf":"medium","title":"trading_halts store never expires stale halts → a missed resume can stick 'active' forever","location":"src/lib/ws/uw-socket.ts:549-564, 419-447","evidence":"The trading_halts handler only removes a symbol when a payload with ev.active === false arrives (lines 557-561); it stores no per-entry timestamp (only store-level tradingHaltsStore.updatedAt). hasActiveTradingHalt() (420-427) reads halt.active with no age check. shouldBlockForTradingHalt() (430-447) gates trade entries on it; isTradingHaltChannelStale() (414-417) only detects a fully-dead channel, not a single stuck symbol on a live channel.","impact":"If the WS drops after a halt-on event and the resume (active:false) is missed during the gap, the symbol stays active indefinitely, and shouldBlockForTradingHalt() silently suppresses legitimate entries for that symbol until process restart. Confidence is medium because it depends on whether UW re-snapshots halt state on rejoin (unverified here).","fix":"Store a per-halt timestamp and treat halts older than a max age as resolved; on every reconnect, clear tradingHaltsStore.halts and re-derive from a fresh snapshot rather than trusting incremental active:false deltas to survive a connection gap.","commit":null,"note":""},{"id":"f_6_2","dim":"Provider — Unusual Whales","sev":"P2","cat":"reliability","eff":"S","conf":"high","title":"Each live 429 is counted twice toward the circuit breaker → trips at half the configured threshold","location":"src/lib/providers/unusual-whales.ts:88-90 and 221-222; src/lib/providers/uw-rate-limiter.ts:215-228 (noteUw429)","evidence":"uwGet calls `noteUw429(path)` then throws on status 429 (lines 88-90). uwGetSafe's catch then matches `msg.includes('429')` and calls `noteUw429(path)` a SECOND time (line 222) for the same physical 429. noteUw429 pushes a timestamp into recent429Timestamps each call.","impact":"CIRCUIT_429_THRESHOLD (default 8) is effectively reached after only ~4 real 429s, and rateLimitSummaryCount / the '[uw] N rate-limited endpoints' log double-counts. The circuit opens earlier and longer than intended, unnecessarily forcing stale-cache/null mode during normal rate-limit pressure. (fetchMarketFlowAlertPage via raw uwGet counts once, so behavior is inconsistent across endpoints.)","fix":"Record the 429 in exactly one place. Remove the noteUw429 call from uwGetSafe's catch (uwGet already records it), or remove it from uwGet and let only the wrappers record.","commit":"d76c916","note":"Removed the count in uwGet 429 fetch path (catch is the single site) + compensating noteUw429 in fetchMarketFlowAlertRows catch. Unit test added."},{"id":"f_6_3","dim":"Provider — Unusual Whales","sev":"P2","cat":"reliability","eff":"M","conf":"medium","title":"Local token-bucket / circuit-breaker state is per-process, not shared — defeats cluster-wide pacing for the breaker","location":"src/lib/providers/uw-rate-limiter.ts:21-29, 159-185, 210-228","evidence":"Only acquireGlobalRedisSlot is Redis-backed. The token bucket (tokens/lastRefill), MIN_SPACING, inFlight concurrency, and the entire circuit breaker (circuitOpenUntil, recent429Timestamps) are module-level vars. With web + worker (and multiple Railway replicas) each process keeps its own breaker and its own MAX_RPS bucket.","impact":"GLOBAL_MAX_RPS is enforced cluster-wide (good), but when one replica gets a burst of 429s and opens its breaker, the others keep hammering UW — so a real UW-side rate-limit event isn't coordinated. Effective per-second ceiling is also GLOBAL_MAX_RPS only via Redis; the local bucket per replica can briefly exceed intent before Redis denies.","fix":"Persist circuit state in Redis (a `blackout:uw:circuit_until` key set on threshold breach, read in waitForCircuit/isUwCircuitOpen) so all replicas back off together. The token bucket can stay local since the Redis sliding window is the true ceiling.","commit":null,"note":""},{"id":"f_6_5","dim":"Provider — Unusual Whales","sev":"P2","cat":"reliability","eff":"M","conf":"medium","title":"fetchMarketFlowAlertPage uses raw uwGet (no circuit short-circuit, no stale fallback) and can throw uncaught in pagination","location":"src/lib/providers/unusual-whales.ts:476-481, 517-572","evidence":"fetchMarketFlowAlertPage calls `uwGet\u003cunknown>('/api/option-trades/flow-alerts', query)` directly (not uwGetSafe). uwGet throws on 429/!ok. The outer try/catch (line 560) only serves marketFlowCache if it exists and is \u003c30min old; on the FIRST cold call (no cache) a single 429/503 returns []. During pagination (up to 3 pages, lines 523-551) a mid-pagination 429 aborts and discards already-fetched pages.","impact":"Cold-start or post-deploy flow ingest gets nothing on a transient UW error instead of retrying; partial pages are thrown away. Combined with finding #2 (no 5xx retry in uwGet), the market-wide tape is fragile under rate pressure exactly when flow is busiest.","fix":"Route the page fetch through a retry-aware helper (reuse uwGetSafe's 429/5xx backoff), and on mid-pagination failure return the pages already merged rather than discarding them.","commit":null,"note":""},{"id":"f_7_2","dim":"Provider — Polygon/Massive & misc (symbol conventions, error handling, caching, macro/news/web-search, provider-policy fallback)","sev":"P2","cat":"security","eff":"S","conf":"high","title":"Tavily web-search API key is sent in the JSON POST body and stored verbatim in telemetry","location":"src/lib/providers/web-search.ts:27-34 (body: JSON.stringify({ api_key: tavily, ... })); captured by src/lib/api-tracked-fetch.ts:25-42 requestBodyHint and recordApiCall :100","evidence":"web-search.ts puts the live key in the body as `api_key`. trackedFetch's requestBodyHint slices init.body to 400 chars and stores it as request_body; sanitizeTelemetryBody/requestBodyHint only redact query-string-style `apiKey=`/`token=`/`key=` patterns, not a JSON field named `api_key`. So the request_body becomes `{\"api_key\":\"\u003creal tavily key>\",...}` in the in-memory telemetry ring buffer and is streamed to the admin SSE endpoint (api/admin/apis/stream/route.ts:49-51 sends the full event).","impact":"The Tavily secret is exposed to anyone with admin telemetry access and persists in process memory. Serper (header X-API-KEY) and Brave (header X-Subscription-Token) avoid this because header values aren't logged — only Tavily leaks. Lower than P0/P1 only because the stream is admin-gated (requireAdminApi).","fix":"Redact JSON-body credential fields in sanitizeTelemetryBody (strip `\"api_key\":\"...\"`, `\"apiKey\":\"...\"`, `\"token\":\"...\"`), or have web-search.ts send Tavily auth via the Authorization: Bearer header instead of the body.","commit":null,"note":""},{"id":"f_7_3","dim":"Provider — Polygon/Massive & misc (symbol conventions, error handling, caching, macro/news/web-search, provider-policy fallback)","sev":"P2","cat":"reliability","eff":"M","conf":"medium","title":"Polygon circuit breaker and module-level caches are per-instance, silently weakening protection under horizontal scaling","location":"src/lib/providers/polygon.ts:10-13 (_poly429Count, _polyCircuitOpenUntil), :659 cachedVixIvRank, :700 marketStatusCache; polygon-options-gex.ts:38 cachedOdteBundle, :355 positioningCache","evidence":"All are plain module-scoped let/Map values. Railway/nixpacks deployments and Next.js serverless lambdas can run multiple instances; each holds its own counter and cache. The 5-consecutive-429 threshold is counted per-instance, so with N instances the provider can take ~5*N consecutive 429s before any circuit opens.","impact":"Under load or multi-instance deploy, the 429 circuit opens later than intended and per-instance in-memory caches multiply upstream call volume (each instance independently misses and re-fetches). The Redis-backed shared cache exists only for the ODTE GEX bundle (polygon-options-gex.ts:112-127); VIX rank, market status, positioning, and IV-term caches are local only.","fix":"Back the circuit-breaker 429 state and the hot caches (market status, VIX rank) with the existing sharedCache/Redis layer, or document that the app is intended to run single-instance. At minimum note the assumption in provider-policy.ts.","commit":null,"note":""},{"id":"f_8_0","dim":"AI / Anthropic (Largo, Commentary, NightHawk)","sev":"P2","cat":"cost","eff":"S","conf":"high","title":"Commentary per-user throttle + daily cap module is dead code — never wired to the route","location":"src/lib/spx-commentary-limits.ts:98,148 (checkCommentaryLimits/recordCommentaryCall); src/app/api/market/spx/commentary/route.ts:22-77","evidence":"A repo-wide grep for checkCommentaryLimits and recordCommentaryCall returns only their definitions in spx-commentary-limits.ts:98,148 — zero callers anywhere in src. The commentary route never imports them; it relies solely on serverCache(cacheKey, 5min) for dedup. The module's SPX_COMMENTARY_MIN_INTERVAL_MS (default 55s) per-user throttle and SPX_COMMENTARY_DAILY_CAP (default 80/day) per-user spend cap are therefore inert.","impact":"The intended per-user rate limit and daily Anthropic spend cap for Live Desk AI are not enforced. The 5-min shared-window serverCache already collapses all users to one Claude call per window (the dominant fan-out cost), so this is NOT unbounded spend — but a misbehaving client polling with slightly varying desk payloads, or Redis/cache unavailability, has no per-user backstop, and the documented guardrail is illusory.","fix":"Either wire it in: call checkCommentaryLimits(userId) before generateSpxCommentary and recordCommentaryCall(userId) only after a successful (non-null) Claude call, returning the 429/503 result to the client; or delete the module and document that serverCache is the sole control. Confirm whether the 80/day cap is a product requirement before removing.","commit":null,"note":""},{"id":"f_8_1","dim":"AI / Anthropic (Largo, Commentary, NightHawk)","sev":"P2","cat":"reliability","eff":"S","conf":"high","title":"Null commentary result is negatively cached for the whole 5-minute window","location":"src/app/api/market/spx/commentary/route.ts:58-66; src/lib/server-cache.ts:73-74,149-153","evidence":"The loader returns null when generateSpxCommentary returns null (validateDeskData failure or a timed-out Haiku call): `const commentary = await generateSpxCommentary(...); if (!commentary) return null;`. refreshCache stores any resolved value — including null — in its .then with expiresAt=now+ttl (server-cache.ts:149-153); only rejected promises are not stored. Subsequent calls hit `hit.expiresAt > now` (line 73) and return the cached null, so route.ts:64-66 returns 502 for every user until the window boundary.","impact":"A single transient failure (one timed-out Haiku call or one momentarily incomplete desk snapshot) poisons the Live Desk AI for all connected sessions for up to ~5 minutes, even though a retry seconds later would succeed. User-visible as a stuck/empty AI rail.","fix":"Do not cache null. In the loader, throw on null (e.g. `if (!commentary) throw new Error('commentary unavailable')`) so refreshCache's .catch path runs and nothing is stored, then catch at the route to return 502 — the next request retries immediately. Alternatively short-circuit serverCache when commentary is null.","commit":"e87fe97","note":"Loader now throws instead of returning null, so serverCache stores nothing + clears inflight (next request rebuilds); route maps the marker error to 502. server-cache.test.ts added."},{"id":"f_8_2","dim":"AI / Anthropic (Largo, Commentary, NightHawk)","sev":"P2","cat":"security","eff":"M","conf":"medium","title":"Web-search and news tool-result text bypass the prompt-injection sanitizer (defense-in-depth gap)","location":"src/lib/largo/run-tool.ts:748 (get_web_search), :259,267 (get_news teaser); src/lib/providers/web-search.ts:43,65,88 (raw snippet); src/lib/providers/anthropic.ts:276-290 (tool_result loop)","evidence":"get_web_search returns `{ query, results: await fetchWebSearch(...) }` where each snippet is raw third-party text (web-search.ts:43 `snippet: String(r.content ?? '').slice(0,320)`), and get_news returns articles with raw teaser (`a.teaser || a.body.slice(0,280)`, run-tool.ts:259). In the tool loop the result is `JSON.stringify(results[i])` then only length-capped (anthropic.ts:279-288) — sanitizeFeedText() is never applied on this path, unlike the live-feed builder which sanitizes headlines/teasers.","impact":"An attacker who can get a crafted page indexed, or seed a malicious news body that survives as a tool result, can place 'ignore previous instructions' text in Largo's context. The primary control IS present — the system prompt (system-prompt.ts:17) explicitly tells the model to treat web-search snippets and tool results as untrusted data — so this is defense-in-depth, not a missing control. The inconsistency with the care taken on the live-feed path is the real gap.","fix":"Centralize sanitizeFeedText() (export it from a shared module) and apply it to free-text fields of attacker-controllable tool results — web-search snippet, news teaser/title — before they enter tool_result content, or wrap untrusted tool output in an explicit delimiter block in the tool loop.","commit":null,"note":""},{"id":"f_9_2","dim":"SPX Play / Confluence Engine (correctness)","sev":"P2","cat":"bug","eff":"S","conf":"high","title":"WATCH→ENTRY promote strips both the post-loss re-entry lock and the after-any-exit buy cooldown — enabling same-direction revenge entry after a THESIS-break loss","location":"src/lib/spx-play-engine.ts:778-786 (promote block filter); gates src/lib/spx-play-gates.ts:197-236 (BUY_COOLDOWN 197-215, post-STOP 217-223, REENTRY_LOCK 225-236); cooldown set src/lib/spx-play-store.ts:313-317","evidence":"On promoteEligible the engine strips blocks matching BUY_COOLDOWN, QUALITY_COOLDOWN, GRADE_BELOW_MIN and REENTRY_LOCK (engine.ts:780-785). The re-entry lock (same direction, any loss, playReentryLockSec window) is the primary revenge-entry guard. closeOpenPlay sets last_stop_at only for exit_action 'STOP' or a losing 'TRAIL' (store.ts:313-317), so a THESIS-break loss does NOT set last_stop_at and the post-STOP cooldown (gates.ts:217-223, which is NOT stripped) does not apply. Combined with the stripped BUY_COOLDOWN, a WATCH->ENTRY promote in the same direction right after a thesis-break loss has zero remaining cooldown protection.","impact":"After a thesis-break loss, a same-direction promote can re-enter immediately — exactly the revenge-trade scenario the re-entry lock exists to prevent. For STOP losses a 15m post-STOP cooldown remains, but a 5-minute window (15-20m) is still exposed. Grade re-validation (gradeRank>=2 in mechanicalVerdict, engine.ts:723) still applies, limiting blast radius.","fix":"Do not strip GATE_BLOCK.REENTRY_LOCK in the promote filter (engine.ts:780-785), or gate the strip on the prior exit not being a loss (session.last_sell_was_loss === false). Keep the grade re-validation already enforced in mechanicalVerdict.","commit":null,"note":""},{"id":"f_9_3","dim":"SPX Play / Confluence Engine (correctness)","sev":"P2","cat":"reliability","eff":"M","conf":"medium","title":"Open-play management runs on possibly-stale desk.price with no staleness guard","location":"src/lib/spx-play-engine.ts:274-333 (mfe/mae, stopHit/targetHit, trailing stop all derived from desk.price); compare flat-path guard src/lib/spx-play-gates.ts:136-142","evidence":"evaluateOpenPlay computes mfe/mae (lines 276-277), stopHit/targetHit (289-290) and the trailing stop (322-333) entirely from `desk.price` with no check on desk.polled_at age. The flat path blocks entries when `ageSec > playGexStaleMaxSec()` (gates.ts:136-142, ~90s), but there is no equivalent staleness check before managing an OPEN position.","impact":"On a stale or last-good desk feed, the engine can trigger a false STOP/TARGET/TRAIL exit (or fail to exit) based on a price that no longer reflects the market — directly affecting real-money exit timing. Force-exit by clock would still fire, bounding the worst case.","fix":"Add a polled_at staleness guard at the top of evaluateOpenPlay: when (Date.now()-polled_at) exceeds a threshold (reuse playGexStaleMaxSec or a dedicated config), skip stop/target/trail evaluation, return HOLD with a 'stale price — manage manually' state, but still evaluate isPastForceExitCutoff so the clock-based force-exit is never suppressed.","commit":null,"note":""},{"id":"f_10_1","dim":"Flow Pipeline + GEX + Data Integrity","sev":"P2","cat":"bug","eff":"S","conf":"high","title":"GEX wall kind (support/resistance) is never recomputed on price moves — only distance_pts is","location":"src/lib/spx-desk-merge.ts:10-16 (recalcGexWallDistances), called from mergePulseIntoDesk:354 and mergeFlowIntoDesk:270","evidence":"`return walls.map((w)=>({...w, distance_pts: Math.round((w.strike-spot)*100)/100}));` — `kind` is spread through unchanged. kind is only assigned at full-build time in topGexWalls (gamma-desk.ts:128-143: strike\u003c=spot⇒support, strike>spot⇒resistance).","impact":"During the ~1s pulse cadence price can cross a wall strike. distance_pts flips sign correctly but kind stays stale (e.g. 'resistance' on a strike now below spot) until the next ~4s flow-lane rebuild. On a 0DTE desk where wall side drives directional reads, the UI/AI can label a wall sitting below price as resistance.","fix":"In recalcGexWallDistances, recompute kind from the sign of (strike - spot): `kind: w.strike > spot ? 'resistance' : 'support'` alongside distance_pts.","commit":null,"note":""},{"id":"f_10_2","dim":"Flow Pipeline + GEX + Data Integrity","sev":"P2","cat":"reliability","eff":"S","conf":"high","title":"markFlowDataFresh can be pinned into the future by a garbage/future-dated brief, permanently disabling the 5-min flow-staleness trade gate","location":"src/lib/flow-data-freshness.ts:4-17 (markFlowDataFresh / markFlowDataFromBriefs); consumed by src/lib/spx-play-gates.ts:241-246","evidence":"markFlowDataFresh sets `lastFlowDataAt = max(current, at)` with no upper bound. markFlowDataFromBriefs feeds it `Date.parse(flow.alerted_at)` from arbitrary spxFlows briefs (spx-desk.ts:869,1328) with no future-skew check. spx-play-gates.ts:242 blocks buy entries only when `flowAgeMs > 300_000`.","impact":"A single future-dated or garbage alerted_at pins lastFlowDataAt into the future; because max() never decreases, flowDataAgeMs() then reports ~0 indefinitely. The play-gate at spx-play-gates.ts:242 stops blocking entries even after the real UW feed goes silent — a real-money staleness safety gate is silently defeated, not just a green badge.","fix":"In markFlowDataFresh, reject timestamps more than a small skew (e.g. 2-5s) in the future before taking the max. Separately consider tightening the FlowFeed.tsx:413 desk-tape stale threshold below 5min during RTH so a quiet 0DTE tape doesn't read green LIVE.","commit":"345c2be","note":""},{"id":"f_10_3","dim":"Flow Pipeline + GEX + Data Integrity","sev":"P2","cat":"data-integrity","eff":"S","conf":"medium","title":"alertId fallback can collide distinct prints into one row (and ON CONFLICT drops the second) when UW omits a stable id","location":"src/lib/flow-persist.ts:22-26 (alertId)","evidence":"`return uw:${flow.ticker}:${flow.alerted_at}:${flow.strike}:${flow.option_type};` — no premium, rule, trade_count, or sequence. The id-present path uses `uw:${raw.id ?? raw.alert_id}`; the fallback fires when both are absent (notably some WS frames).","impact":"Two genuinely distinct sweeps on the same ticker/strike/side sharing a second-resolution alerted_at collapse to one alert_id; insertFlowAlert's ON CONFLICT DO NOTHING then silently drops the second. Combined with parseUwFlowAlert defaulting alerted_at to new Date() (unusual-whales.ts:182) for timestampless WS alerts, a same-second burst can all collapse to one row, under-counting flow that velocity/stacks depend on.","fix":"Add premium (and trade_count when present) to the fallback key, e.g. uw:ticker:alerted_at:strike:option_type:premium. Better: when WS lacks an id, synthesize a per-message sequence or hash of the raw payload so distinct prints stay distinct.","commit":null,"note":""},{"id":"f_10_4","dim":"Flow Pipeline + GEX + Data Integrity","sev":"P2","cat":"data-integrity","eff":"S","conf":"medium","title":"Tape dedup key includes premium, so the same print arriving with a refreshed premium creates a duplicate tape row","location":"src/lib/providers/spx-desk.ts:557-559 (tapeItemKey) and src/lib/spx-desk-merge.ts:26 (mergeTapeItems key)","evidence":"`return ${t.kind}|${t.time}|${t.label}|${t.premium};` — premium is part of the dedup identity in both helpers. The DB-merge dedup uses a different composite key entirely: `${f.ticker}|${f.alerted_at}|${f.strike}|${f.option_type}|${f.premium}` (spx-desk.ts:656).","impact":"UW aggregated/RepeatedHits alerts can re-emit the same contract at the same timestamp with an updated cumulative premium. Because premium is in the key, the updated print is treated as NEW rather than a replacement, so the tape can show the same strike/time twice with two different premiums.","fix":"Drop premium from the tape dedup key (key on kind|time|label, i.e. side+strike) and keep the latest occurrence's premium; or key on the stable UW alert id when present. Consolidate tapeItemKey and mergeTapeItems on one shared helper.","commit":null,"note":""},{"id":"f_10_5","dim":"Flow Pipeline + GEX + Data Integrity","sev":"P2","cat":"bug","eff":"S","conf":"high","title":"persistAndPublishFlowAlert publishes to SSE and fires Discord even when the DB insert is a duplicate (already-seen alert)","location":"src/lib/flow-persist.ts:77-99","evidence":"insertFlowAlert returns false on ON CONFLICT DO NOTHING (db.ts:845 returns rowCount>0), but flow-persist.ts:95-97 calls `publishFlowEvent(event)` and `void notifyDiscord(event)` unconditionally, never checking `inserted`. The only short-circuit is the MIN_PREMIUM guard at line 54.","impact":"When WS re-broadcasts an alert already ingested by REST (or vice versa) the row is correctly NOT re-inserted, but it IS re-published to all SSE clients and re-fires the Discord webhook. Clients dedup on the tape, but Discord visibly double-posts a whale and SSE carries redundant traffic.","fix":"When dbConfigured(), gate notifyDiscord (and optionally publishFlowEvent) on `inserted === true` so only genuinely-new alerts fan out. Preserve the current publish-always behavior on the dbless path.","commit":"d76c916","note":"New pure shouldFanOut(inserted,usingDb,insertFailed) gates fan-out; DB-outage still publishes. Truth-table unit test."},{"id":"f_11_4","dim":"NightHawk + Lotto Engines (edition builder/checkpoint-resume, lotto/power-hour engines, outcomes tracking, server-only, scheduling)","sev":"P2","cat":"security","eff":"S","conf":"high","title":"spx-lotto-engine missing `import \"server-only\"` guard that the power-hour engine has","location":"src/lib/spx-lotto-engine.ts:1-43 (no server-only); cf. src/lib/spx-power-hour-engine.ts:21","evidence":"Power hour: `import \"server-only\";` at line 21. Lotto engine has no such import despite pulling in DB access (spx-lotto-store -> getMeta/setMeta), Discord webhooks (notifyPlayDiscord), Polygon/Massive option fetches with POLYGON_API_KEY, and outcome DB writes.","impact":"Without the server-only sentinel, an accidental client import of this module (or anything it re-exports through spx-play-lotto.ts) would bundle server secrets/DB logic into the client and only fail at runtime instead of build time — a latent secret-exposure footgun on a paid product.","fix":"Add `import \"server-only\";` to spx-lotto-engine.ts (and the catalyst/options/store/outcomes helpers that touch keys or DB) to match power-hour.","commit":null,"note":""},{"id":"f_11_5","dim":"NightHawk + Lotto Engines (edition builder/checkpoint-resume, lotto/power-hour engines, outcomes tracking, server-only, scheduling)","sev":"P2","cat":"cost","eff":"M","conf":"high","title":"Expensive Claude synthesis + critic stages are not checkpointed — resume re-runs them in full","location":"src/lib/nighthawk/edition-builder.ts:219-287; scored_json written at 223 but never read back","evidence":"`scored_json: ranked` is persisted (line 223) but grep shows it is never read in the builder. After the dossier checkpoint, generateEditionPlays (Claude) at line 242 and critiquePlays (Claude) at line 264 run unconditionally on every (re)invocation; a failure in critiquePlays or the publish upsert forces a full re-run of both Claude calls.","impact":"The checkpoint system's whole point is to avoid redoing expensive work, yet the two most expensive steps (two Claude calls) are repeated on any post-ranking failure or resume nudge, multiplying Anthropic token cost and latency.","fix":"Persist the synthesized plays/recap and critic verdict to the job row after each succeeds, and on resume load them back to skip re-synthesis when already present (mirror the context/candidates/dossier checkpoint pattern).","commit":null,"note":""},{"id":"f_11_6","dim":"NightHawk + Lotto Engines (edition builder/checkpoint-resume, lotto/power-hour engines, outcomes tracking, server-only, scheduling)","sev":"P2","cat":"reliability","eff":"M","conf":"medium","title":"In-memory lotto record cache returns stale state without re-reading DB on same-day hits","location":"src/lib/spx-lotto-store.ts:44-66","evidence":"loadLottoRecord: `if (memoryLotto.record?.session_date === today) return memoryLotto.record;` — for any same-day call it returns the process-local copy and never consults the DB.","impact":"If two processes/instances run (e.g. the public route's serverless instance and the Railway cron worker, or two web replicas), each holds its own memory copy; a write by one is invisible to the other on subsequent reads, so engines can act on stale phase/anchor data and overwrite each other (last-write-wins). Safe only under a strict single-process assumption.","fix":"On same-day cache hits, still re-read the DB meta key (cheap) or use a short TTL/version check, so the DB remains the single source of truth across instances; or document and enforce single-instance execution for the engines.","commit":null,"note":""},{"id":"f_12_4","dim":"Crons & Background Jobs","sev":"P2","cat":"reliability","eff":"S","conf":"high","title":"nighthawk-edition route writes no cron_job_runs row; registry key mismatch ('nighthawk-playbook')","location":"src/app/api/cron/nighthawk-edition/route.ts (no logCronRun) vs cron-registry.ts:57-65 (key 'nighthawk-playbook')","evidence":"The route at /api/cron/nighthawk-edition contains no logCronRun call (it returns build results directly). The registry entry is keyed 'nighthawk-playbook' (kind 'worker', no path). Health is only inferred via a special-case fallback reading fetchLatestNighthawkJob (admin-cron-health.ts:189-228).","impact":"The cron_job_runs table never gets a 'nighthawk-playbook' row from the actual HTTP trigger, so staleness/failure detection for the evening pipeline relies entirely on the nighthawk_job table side-channel. A trigger that 401s or never fires (rotated secret / dropped Railway schedule) leaves no run row AND, if no job row was created, shows 'unknown' — excluded from watchdog alerts. The name mismatch (route 'nighthawk-edition' vs key 'nighthawk-playbook' vs TOML file 'nighthawk-playbook') is a maintenance trap.","fix":"Have the route log a run under the 'nighthawk-playbook' key (at least on the trigger fire and on failure) so the primary run-log path covers it, and align the route path / registry key / TOML filename naming.","commit":null,"note":""},{"id":"f_12_5","dim":"Crons & Background Jobs","sev":"P2","cat":"reliability","eff":"M","conf":"high","title":"Migration advisory lock relies on same-connection semantics that pool.query() does not guarantee","location":"src/lib/db.ts:124-552 (runMigrations)","evidence":"runMigrations does `await p.query('SET statement_timeout=...')`, `await p.query('SELECT pg_advisory_lock($1)', [MIGRATION_LOCK_ID])`, runs all DDL via `p.query(...)`, then `await p.query('SELECT pg_advisory_unlock($1)')` in finally — where `p = await getPool()` is the Pool, not a checked-out client. Comment claims it's a 'session-level advisory lock so concurrent cold-start instances wait'.","impact":"Each p.query() can use a different pooled connection, so the SET statement_timeout, the blocking pg_advisory_lock, and the pg_advisory_unlock may run on different backends. The intended cross-instance DDL serialization is not reliably enforced and the unlock may no-op (leaking the migration lock). Lower severity than the SPX lock because CREATE TABLE IF NOT EXISTS is mostly idempotent and the 30s statement_timeout bounds a stuck blocking lock, but it's still incorrect locking.","fix":"Acquire one client via pool.connect() and run SET/lock/DDL/unlock/release all on that single client, then release it. The migration lock should be pg_advisory_lock on a dedicated connection (or use pg_advisory_xact_lock within a transaction).","commit":"a7fe184","note":""},{"id":"f_12_6","dim":"Crons & Background Jobs","sev":"P2","cat":"reliability","eff":"M","conf":"medium","title":"Watchdog has no external dead-man's-switch — if the watchdog itself dies, nothing alerts","location":"src/app/api/cron/cron-staleness-watchdog/route.ts + railway.cron-staleness-watchdog.toml","evidence":"The watchdog is the only mechanism that catches silently-dead crons, and it detects them by reading buildCronHealthSnapshot from the SAME blackout-web app it monitors. There is no independent heartbeat/dead-man's-switch (e.g. an external uptime ping or Healthchecks.io URL) confirming the watchdog itself ran.","impact":"If the watchdog Railway service is deleted, its CRON_SECRET rotates (401), or blackout-web is down, the entire cron fleet can go dark with zero notification — the single point of failure the watchdog was built to eliminate now exists at the watchdog layer itself. It does log its own run row, but only something OUTSIDE the system can notice it stopped.","fix":"Add a cheap external dead-man's-switch: have the watchdog ping a Healthchecks.io / Better Uptime cron-monitor URL on each successful run (and/or have a second tiny external monitor curl the health endpoint). That external service alerts when the watchdog stops checking in.","commit":null,"note":""},{"id":"f_13_3","dim":"Frontend Architecture & Performance","sev":"P2","cat":"performance","eff":"M","conf":"high","title":"FlowFeed recomputes 10+ O(n) memos and re-sorts the full alert list on every SSE message","location":"src/components/FlowFeed.tsx:129-304 (callCount, putCount, compoundTickers, splitFlowMap, earningsDays, velocity, coordinatedTickers, sectorFlowEntries, nighthawkPlaysWithFlow all keyed on [alerts]) and 393-404 (displayAlerts re-sorts)","evidence":"SSE handler does `setAlerts((prev) => [alert, ...prev])` (line 341) on every print; ~10 useMemo blocks list `alerts` in deps, several doing nested .filter/.reduce over all alerts (e.g. nighthawkPlaysWithFlow filters `alerts` once per play). displayAlerts does `[...base].sort(...)` over the whole array each render.","impact":"In a fast tape (many prints/sec, alerts array growing into the hundreds), each incoming print triggers a full recompute of every analytic + a full array clone+sort, then re-renders the right-rail panels. CPU spikes and dropped frames during the exact high-volume moments traders care about.","fix":"Batch SSE inserts (flush every ~250-500ms via a ref buffer + single setState), cap `alerts` length explicitly, and derive the heavy analytics from a throttled/debounced snapshot rather than the live array. Memoize the right-rail panel components with React.memo.","commit":null,"note":""},{"id":"f_13_4","dim":"Frontend Architecture & Performance","sev":"P2","cat":"performance","eff":"M","conf":"medium","title":"Multiple useMergedDesk mounts open independent SSE pulse connections (no shared context)","location":"src/hooks/useMergedDesk.ts:69 (usePulseStream per hook instance); src/components/desk/SpxLiveStrip.tsx:7-17 (self-documented warning); SWR keys differ between desk and embeds","evidence":"SpxLiveStrip.tsx header comment: 'This component calls useMergedDesk() directly, which opens its own SSE pulse connection. If rendered on the same page as SpxDashboard ... two independent SSE connections will be opened.' usePulseStream creates a new createPulseEventSource per hook instance. SWR dedupes the REST keys (spx-desk-pulse etc.) but NOT the EventSource. LiveMarketPulse uses key 'spx-merged-pulse' / fetchSpxState — a separate poll from the dashboard's lanes.","impact":"Any page rendering both the dashboard and a live strip (or multiple embeds) opens N SSE connections + N REST poll loops to /api/market/spx/pulse/stream, multiplying server connections and Polygon/UW pull cost per viewer. EventSource connections are a constrained resource per origin in browsers too.","fix":"Hoist the merged-desk feed into a React context/provider mounted once per page so all consumers share one SSE + one SWR lane set. Unify embed SWR keys with the dashboard lanes so SWR dedupes the REST polls.","commit":null,"note":""},{"id":"f_13_5","dim":"Frontend Architecture & Performance","sev":"P2","cat":"performance","eff":"M","conf":"medium","title":"FlowAlertStream renders up to 150 framer-motion items with stagger; no list virtualization","location":"src/components/desk/FlowAlertStream.tsx:12 (RENDER_LIMIT=150), :139 (visible.slice(0, renderLimit)), :11 (STAGGER) with motion list items","evidence":"RENDER_LIMIT = 150 and STAGGER = 0.04 with AnimatePresence/motion used for rows; displayed = visible.slice(0, renderLimit). No windowing (react-window/virtual) — all 150 motion nodes mount in the scroll container.","impact":"150 animated DOM nodes each with framer-motion layout/animation is heavy; combined with the parent FlowFeed re-rendering on each SSE tick, the tape can stutter. The RENDER_LIMIT cap is a real mitigation, but 150 animated rows is still a lot for a live-updating list.","fix":"Virtualize the tape (react-window) or drop per-row framer-motion in favor of a single CSS enter animation on the newest row only; keep the slice cap.","commit":null,"note":""},{"id":"f_14_0","dim":"UI/UX & Design Polish","sev":"P2","cat":"accessibility","eff":"S","conf":"high","title":"No prefers-reduced-motion support anywhere despite pervasive infinite animation","location":"src/app/globals.css (0 occurrences of prefers-reduced-motion project-wide); examples: VelocityRadar.tsx:30-31 (repeat:Infinity pulse), PricingSection.tsx:67-74 (Infinity textShadow), DnaHelixBackground, nv-scanlines, MarqueeStrip","evidence":"grep for 'prefers-reduced-motion' across all of src returns 'No matches found'. The app runs continuous motion: VelocityRadar 'animate={{ opacity: [1,0.2,1] }} transition={{ repeat: Infinity }}', infinite marquees, animated DNA helix background, and scanline overlays.","impact":"Users with vestibular disorders / motion sensitivity have no way to reduce the constant pulsing, scrolling, and glowing motion. This is a documented WCAG 2.1 (2.3.3) accessibility failure and can cause real nausea/dizziness.","fix":"Add a global '@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }' block to globals.css, and gate framer-motion infinite loops behind useReducedMotion() from framer-motion for the worst offenders (VelocityRadar, PricingSection).","commit":null,"note":""},{"id":"f_14_1","dim":"UI/UX & Design Polish","sev":"P2","cat":"accessibility","eff":"S","conf":"high","title":"Keyboard users get no visible focus indicator on custom buttons/inputs","location":"src/app/globals.css (only :focus-visible/:focus at lines 1965 and 4210 across ~9000 lines); affected controls e.g. FlowFeed.tsx:433-569 (premium/type/replay/CSV buttons), upgrade/page.tsx:23-31 (checkout links)","evidence":"grep for 'focus-visible|:focus|outline:' in globals.css returns 6 hits total; only .nighthawk-play-row-clickable:focus-visible (1965) and .desk-largo-input:focus (4210) define a focus ring. Tailwind preflight removes native outlines and the custom .flow-seg-btn / .btn-primary classes add none back.","impact":"Keyboard-only and low-vision users cannot tell which control is focused when tabbing through the filter bar, replay/CSV/audio controls, or the upgrade checkout buttons — a core operability failure (WCAG 2.4.7).","fix":"Add a global ':focus-visible { outline: 2px solid rgba(0,212,255,0.7); outline-offset: 2px; }' in the base layer, or append focus-visible:ring-2 to the shared button classes. The brand cyan keeps it on-theme.","commit":"345c2be","note":""},{"id":"f_14_2","dim":"UI/UX & Design Polish","sev":"P2","cat":"ux","eff":"S","conf":"high","title":"Near-invisible grey text on /terminal header via CSS variables (rule bypass)","location":"src/app/globals.css:3690 (.largo-page-kicker color:var(--grey-300)=#707080), :3709 (.largo-page-subtitle color:var(--grey-400)=#4a4a5a), :3307 (.largo-msg-label color:var(--grey-500)=#32323f), :3535 (.largo-pipeline-node color:var(--grey-600)=#22222c)","evidence":"tailwind.config grey palette: 300:#707080, 400:#4a4a5a, 500:#32323f, 600:#22222c. These are applied as 'color:' on the live /terminal page kicker/subtitle and Largo message labels. #4a4a5a on the #040407 void is ~2:1 contrast; #32323f/#22222c are effectively invisible.","impact":"The banned-grey rule exists precisely because grey text is unreadable on #040407 — but it only catches Tailwind text-* classes. These raw CSS-variable greys evade it and ship to a live premium page (terminal/page.tsx:14-19 renders .largo-page-kicker/.largo-page-subtitle). The kicker/subtitle are washed out; msg-label/pipeline-node are unreadable.","fix":"Replace these color values with the sanctioned palette: kicker/subtitle → var(--grey-200 #a8a8b8 minimum) or text-sky-300/cyan-400; msg-label/pipeline-node → at least #a8a8b8. Better: add grey-300..600 as color values to the design-lint denylist so CSS-var greys are caught like the Tailwind ones.","commit":null,"note":""},{"id":"f_15_4","dim":"Observability & Telemetry","sev":"P2","cat":"reliability","eff":"M","conf":"medium","title":"All alerting funnels through a single Discord webhook with no delivery confirmation or fallback","location":"src/lib/spx-play-notify.ts:33-56; src/lib/admin-critical-alerts.ts:53","evidence":"notifyOpsDiscord posts to DISCORD_OPS_WEBHOOK_URL (falling back to the play/trade webhook) and on failure only '.catch((err) => console.warn(...))' (line 55). There is no retry, no second channel, and no record that an alert failed to deliver. maybeAlertCriticalIssues marks issues as seen (addSeen) even if the Discord POST silently failed.","impact":"If Discord is down, the webhook is rotated/revoked, or rate-limited, critical SPX incidents are marked 'seen' and never re-sent — the alert is permanently lost with only a console.warn. Single point of failure for the entire alerting story, and ops alerts may leak into the customer-facing trade channel when OPS webhook is unset.","fix":"Only addSeen after a confirmed 200 from Discord; on delivery failure, leave the issue unseen (so the next poll retries) and/or fan out to a secondary channel (email/SMS). Persist alert-delivery outcome so failures are auditable.","commit":null,"note":""},{"id":"f_15_5","dim":"Observability & Telemetry","sev":"P2","cat":"reliability","eff":"L","conf":"medium","title":"In-memory telemetry/snapshot is per-replica; cross-instance view carries only counts, so the admin dashboard is replica-local","location":"src/lib/api-telemetry.ts:38; src/lib/api-telemetry-redis.ts:120-165; src/app/api/admin/apis/stream/route.ts:40","evidence":"events/endpointStats/activeRetries are module-level Maps/arrays. readCrossInstanceTelemetry aggregates only calls_5m/errors_5m/rate_limits across instances — not individual events, errors, or active retries. The SSE snapshot (stream/route.ts:40 getApiTelemetrySnapshot) and event detail are served only from the local replica's buffer.","impact":"With more than one Railway replica, an admin watching the live API stream sees only the events that happened to hit the replica serving their SSE connection. Recent errors, active retries, and event-detail lookups for events handled by other replicas are missing (the [id] route falls back to Postgres, but the live stream and snapshot do not), giving a misleading 'looks healthy' view.","fix":"Either pin telemetry reads to Postgres (already persisted) for the snapshot/stream, or extend the Redis flush to carry recent error/event detail so the dashboard reflects the whole fleet, not one replica.","commit":null,"note":""},{"id":"f_15_6","dim":"Observability & Telemetry","sev":"P2","cat":"security","eff":"S","conf":"medium","title":"Admin read access to sensitive dashboards (audit log, health, incidents) is not itself audited","location":"src/app/api/admin/audit-log/route.ts:24-26; src/app/api/admin/health/route.ts:9-11; src/lib/admin-audit.ts","evidence":"Only mutations and the single event-view route call logAdminAction. The audit-log GET, admin health GET, incidents GET, and cron-health GET gate on requireAdminApi() but write no audit entry. There is no record of who read the audit log or the ops dashboards.","impact":"An admin (or a compromised admin account) can enumerate the full incident history, provider error snippets, and the audit log itself with no trace. For a real-money platform this weakens the tamper-evidence of the audit trail and forensic capability after an account compromise.","fix":"Log a lightweight 'admin_view' audit entry (action + path) on read of the audit-log and other sensitive admin endpoints, or at minimum on audit-log access, so reads are attributable.","commit":null,"note":""},{"id":"f_15_9","dim":"Observability & Telemetry","sev":"P2","cat":"reliability","eff":"M","conf":"medium","title":"WebSocket data feeds (Polygon indices, UW socket) lack staleness alerting despite being core to live pricing","location":"src/lib/admin-health.ts:51-54; src/lib/ws/polygon-socket.ts; src/lib/ws/uw-socket.ts","evidence":"buildAdminHealthSnapshot surfaces getIndexStoreStatus() and getUwSocketHealth() into the websockets payload, but maybeAlertCriticalIssues only fires on SpxAdminIssue critical entries derived from the desk — there is no path that turns a disconnected/stale WS into a Discord alert. A silent socket drop (REST fallback) only logs a console.warn.","impact":"Live SPX pricing depends on these sockets; a silent disconnect degrades to REST polling (or stale data) and is visible only if an admin happens to open the dashboard. No proactive alert means stale/degraded market data can persist unnoticed during trading hours.","fix":"Feed WS connection state and last-tick age into buildSpxAdminIssues (or directly into maybeAlertCriticalIssues) so a disconnected/stale socket during market hours raises a critical incident + Discord alert.","commit":null,"note":""},{"id":"f_16_3","dim":"Code Quality & Tech Debt","sev":"P2","cat":"tech-debt","eff":"L","conf":"high","title":"db.ts is a 2230-line god module spanning 5+ unrelated domains (60 exports)","location":"src/lib/db.ts (2230 lines, 60 exports)","evidence":"One file exports pooling/SSL (createPool, poolSsl), schema (ensureSchema), advisory locks, flows (fetchRecentFlows/insertFlowAlert), SPX plays (insertOpenSpxPlay, closeOpenSpxPlayRow, fetchSpxAdminRollups), lotto (insertLottoPlay/updateLottoPlay), and the entire Nighthawk pipeline (upsertNighthawkEdition, fetchPendingNighthawkOutcomes, saveDossierStaging, logNighthawkJob...).","impact":"Every domain change touches the same file, maximizing merge conflicts and the chance of an unrelated query regressing during an edit; new contributors must scroll a 2200-line file to find the one query they need. The embedded schema + per-domain queries also make it impossible to reason about one bounded context in isolation.","fix":"Split into a thin core (pool/SSL/dbQuery/locks/ensureSchema) plus per-domain query modules (db/flows.ts, db/spx-plays.ts, db/lotto.ts, db/nighthawk.ts) re-using the shared dbQuery. No behavior change; pure decomposition.","commit":null,"note":""},{"id":"f_16_4","dim":"Code Quality & Tech Debt","sev":"P2","cat":"tech-debt","eff":"L","conf":"high","title":"Three near-parallel SPX engines (play / lotto / power-hour) duplicate store + options + engine structure","location":"src/lib/spx-play-engine.ts (1195 loc), spx-lotto-engine.ts (645 loc), spx-power-hour-engine.ts (539 loc); parallel triplets spx-{play,lotto,power-hour}-store.ts and spx-{play,lotto}-options.ts","evidence":"buildOptionTicket (spx-play-options.ts) vs buildLottoOptionTicket (spx-lotto-options.ts) share round5/deltaBand/fallbackStrike scaffolding; store files each define load/save/clear + their own todayEt; round5 is defined verbatim in spx-lotto-engine.ts:77, spx-lotto-options.ts:52, spx-play-intel.ts:14, spx-play-options.ts:87, spx-power-hour-engine.ts:129.","impact":"Bug fixes and tuning (e.g., strike rounding, fallback-strike selection, session date handling) must be re-applied across three engines; divergence between them is how a fix lands in 'play' but not 'lotto'. The triplication multiplies the surface a future audit/refactor must cover.","fix":"Extract shared option-math (round5, deltaBand, fallback strike), a generic session-record store (load/save/clear keyed by a record type), and shared session helpers into common modules the three engines compose. Keep engine-specific scoring/config separate.","commit":null,"note":""},{"id":"f_16_5","dim":"Code Quality & Tech Debt","sev":"P2","cat":"tech-debt","eff":"L","conf":"medium","title":"spx-play-engine.ts is a 1195-line single file driving real-trade decisions","location":"src/lib/spx-play-engine.ts (40,484 bytes, 1195 lines) — the largest hand-written logic file","evidence":"40KB/1195-line module; the broader spx-play-* family (engine, config 18KB, gates 11KB, confirmations 11KB, store 14KB, outcomes 8KB, options 7KB, technicals 7KB) is the most concentrated logic in the repo and the engine ties them all together.","impact":"The hardest-to-test, highest-money-impact code lives in the file least amenable to review or unit testing. Large single-file decision logic + zero tests compounds risk: a reviewer cannot easily isolate the entry/exit/grade branches.","fix":"After extracting shared helpers (see other findings), carve spx-play-engine into cohesive units (entry-decision, exit-decision, grading) each independently unit-testable. This finding is the prime beneficiary of the test-runner finding.","commit":null,"note":""},{"id":"f_17_5","dim":"Product & Service Enhancements","sev":"P2","cat":"enhancement","eff":"L","conf":"medium","title":"No trade journaling for users despite a full outcome schema existing","location":"src/lib/spx-play-outcomes.ts (PlayEntrySnapshot/PlayCloseSnapshot), src/lib/nighthawk/play-outcomes.ts; no user-scoped journal table/route in src/app/api","evidence":"The platform models entry/exit/MFE/MAE/PnL for its OWN plays but has no user-scoped journal: no /api route or component for users to log, tag, or review their personal trades (grep for journal across src finds no user journaling surface).","impact":"Journaling is a top retention feature for serious options traders and a strong stickiness/daily-active driver — it turns a signal feed into a workflow users build a habit around. Its absence leaves users to journal elsewhere, weakening lock-in.","fix":"Add a per-user journal: log a play (auto-prefill from a HELIX/SPX/Night Hawk signal), tag, attach notes, and compute personal win-rate using the existing outcome math. Reuse PlayEntry/PlayClose snapshot shapes for consistency.","commit":null,"note":""},{"id":"f_17_6","dim":"Product & Service Enhancements","sev":"P2","cat":"enhancement","eff":"M","conf":"medium","title":"No watchlist / saved-tickers personalization layer","location":"src/components/desk/FlowAlertStream.tsx:255, src/components/desk/TickerDrawer.tsx:45 (alert_rule shown but no user save), src/components/embeds/NightHawkEmbeds.tsx:12 ('Momentum Watchlist' is a static title, not user-owned)","evidence":"References to 'watchlist' are either Night Hawk's internal candidate input (DayTradeAgentWorkspace.tsx:50) or a static panel title; there is no user-owned watchlist persisted per account, and no way to filter the HELIX tape or alerts to a user's tickers.","impact":"Without per-user watchlists, every user sees the same firehose; power users can't focus the flow tape or scope alerts to names they trade. Personalization is a proven engagement and retention multiplier and a prerequisite for ticker-scoped alerts.","fix":"Add a per-user watchlist (Postgres, keyed on Clerk userId) and wire it into the flows API as a filter param and into the alert subscription model. Small surface, high daily-engagement payoff.","commit":null,"note":""},{"id":"f_17_7","dim":"Product & Service Enhancements","sev":"P2","cat":"enhancement","eff":"M","conf":"medium","title":"No in-app onboarding or options education for the stated 'new options traders' audience","location":"src/components/landing/FaqSection.tsx (educational copy lives only on landing), no tour/glossary/tooltip-glossary in src/components or src/app","evidence":"Grep for glossary/education/tutorial/beginner/onboard across components+app finds no product onboarding — only landing FAQ copy and recharts UI tooltips. A dense desk (GEX, NOPE, repeated hits, strike stacks, MFE/MAE) ships with no first-run tour or term glossary.","impact":"The product targets new options traders but presents an institutional-grade desk with no guided entry, raising activation friction and early churn. New users who can't decode GEX/repeated-hits/0DTE jargon won't perceive value before their first bill.","fix":"Add a lightweight first-run product tour and an inline glossary (hover-defs for GEX, NOPE, repeated hits, MFE/MAE, lotto). Tie completion to an activation metric. Low effort, meaningfully improves activation and trial→paid.","commit":null,"note":""},{"id":"f_17_8","dim":"Product & Service Enhancements","sev":"P2","cat":"enhancement","eff":"M","conf":"medium","title":"Binary free/premium tier — no upsell ladder to capture willingness-to-pay","location":"src/lib/tiers.ts:1-25 (Tier = 'free' | 'premium'), src/lib/auth-access.ts:34 requireTier, parseTier coerces pro/elite→premium","evidence":"tiers.ts defines only free|premium; parseTier maps 'pro' and 'elite' down to 'premium' (`if (value==='premium'||value==='pro'||value==='elite') return 'premium'`), showing higher tiers were anticipated but collapsed. All premium features are one flat $79.99 bucket.","impact":"A single paid tier leaves money on the table: heavy Largo users, alert-hungry traders, and pros would pay more for unlimited AI, priority/lower-latency alerts, or API access. No ladder = no expansion revenue and no way to price-discriminate.","fix":"Introduce an Elite tier (the enum already anticipates it): unlimited Largo, real-time (vs delayed) alerts, ticker-scoped push, API/export access. Gate via the existing tierAtLeast machinery — minimal plumbing, direct ARPU lift.","commit":null,"note":""},{"id":"x_2","evidence":"","extra":true,"note":"","dim":"Cross-Tool Access (post-audit)","sev":"P2","cat":"AI / Data Lifecycle","eff":"S","conf":"high","title":"Largo renders NOPE; SPX desk AI sees lotto + power-hour + realized win-rate","location":"largo-live-feed.ts, spx-commentary.ts, commentary/route.ts","impact":"Surfaces already-computed data the AI surfaces were blind to.","fix":"Add NOPE render + a cross engine-state bundle into the commentary.","commit":"ebc9e0b"},{"id":"x_3","evidence":"","extra":true,"note":"","dim":"Cross-Tool Access (post-audit)","sev":"P2","cat":"AI / Data Lifecycle","eff":"M","conf":"high","title":"Largo gets TICK/TRIN/ADD; Night Hawk gets live SPX desk + HELIX tape + engine state","location":"platform/types.ts, spx-service.ts, nighthawk/*","impact":"Internals were dropped by the summary; Night Hawk fetched live SPX then discarded it.","fix":"Add internals to the summary + thread spxDesk/flowTape/engineState into the edition prompt.","commit":"5b47ede"},{"id":"x_4","evidence":"","extra":true,"note":"","dim":"Cross-Tool Access (post-audit)","sev":"P2","cat":"AI / Data Lifecycle","eff":"M","conf":"high","title":"Night Hawk gets a DESK TRACK RECORD line + a power-hour platform accessor","location":"nighthawk/format.ts, edition-builder.ts, platform/spx-service.ts","impact":"Edition AI was blind to its own win-rate + power-hour state.","fix":"fetchPlayOutcomeStats into the prompt + new getSpxPowerHourState. (positioning into Slayer deferred — redundant with desk GEX/max_pain.)","commit":"ed53e90"},{"id":"x_6","evidence":"","extra":true,"note":"","dim":"Validation / Drill-down Checks (post-audit)","sev":"P2","cat":"Prod Verification","eff":"S","conf":"high","title":"CHECK: confirm macro LIVE_VS_LITERAL canary fires + live UW FOMC/CPI rows appear in prod","location":"macro-events.ts checkLiveVsLiteralFomc; prod logs","impact":"Live wiring was built against the UW OpenAPI shape; real payload shape must be confirmed (falls back to literal if it differs).","fix":"Grep prod logs for [macro-events] LIVE_VS_LITERAL and confirm live rows are served.","commit":null},{"id":"x_7","evidence":"","extra":true,"note":"","dim":"Validation / Drill-down Checks (post-audit)","sev":"P2","cat":"Regression Guard","eff":"S","conf":"high","title":"CHECK: confirm the Discord dedup never suppresses a genuinely distinct alert (alert_id uniqueness)","location":"flow-persist.ts, db.ts insertFlowAlert (ON CONFLICT alert_id)","impact":"Dedup keys on alert_id; if two distinct UW alerts ever collide on alert_id one would be silently dropped.","fix":"Confirm alertId() is unique per real alert (UW id, else ticker:time:strike:type); add a test if a collision is possible.","commit":null},{"id":"x_10","evidence":"","extra":true,"note":"","dim":"Validation / Drill-down Checks (post-audit)","sev":"P2","cat":"Frontend Verification","eff":"S","conf":"high","title":"CHECK: confirm the Live Desk AI frontend handles a 502 from /commentary by retrying (not a stuck error rail)","location":"commentary client/hook + src/app/api/market/spx/commentary/route.ts","impact":"The null-commentary fix (e87fe97) now returns 502 on a transient generation failure instead of caching null; the UI must retry on the next poll rather than freezing.","fix":"Verify the commentary poller treats 502 as transient (retry next window) and does not render a permanent error.","commit":null},{"id":"f_0_3","dim":"Auth & Authorization","sev":"P3","cat":"security","eff":"S","conf":"medium","title":"Cron secret compared with non-constant-time equality","location":"src/lib/market-api-auth.ts:8-9","evidence":"const authHeader = req.headers.get(\"authorization\")?.replace(/^Bearer\\s+/i, \"\"); return authHeader === secret;","impact":"The `===` string comparison short-circuits on first differing byte, leaking timing about CRON_SECRET. Practically low risk over the network (jitter dwarfs the signal, the secret is high-entropy), but it is the single auth gate for all 9 cron writers (membership reconcile, flow ingest, spx-evaluate, db-cleanup, etc.).","fix":"Compare with crypto.timingSafeEqual over equal-length Buffers, guarding the length-mismatch case first (e.g. return false if lengths differ, after hashing both sides to fixed length to avoid the length leak). Cheap, removes the theoretical side channel.","commit":"345c2be","note":""},{"id":"f_0_4","dim":"Auth & Authorization","sev":"P3","cat":"performance","eff":"M","conf":"high","title":"Admin actor resolution makes redundant Clerk getUser calls per request","location":"src/lib/admin-access.ts:48-68 and src/app/api/admin/apis/events/[id]/route.ts:13,34","evidence":"requireAdminApi() (line 49) calls getAdminApiActor(), which calls auth() + isAdminUser() (a getUser at line 18) + a second getUser at line 64. The route then calls getAdminApiActor() AGAIN at line 34, repeating the whole sequence. A single admin request can hit Clerk's Backend API ~4 times for the same user.","impact":"Admin endpoints (including SSE streams and dashboards) issue multiple identical Clerk Backend API calls per request, adding latency and consuming Clerk rate-limit budget — the same class of problem tierCache was created to solve for market routes, but admin has no equivalent cache.","fix":"Have requireAdminApi return the resolved actor (or expose a single resolve-once helper) so the route reuses it instead of calling getAdminApiActor a second time, and dedupe the two getUser calls inside getAdminApiActor (isAdminUser already fetched the user). Optionally apply the same short-TTL per-user cache used in requireTierApi.","commit":"0bd6862","note":"New resolveAdminApi() does ONE getUser and returns {actor,denied}; requireAdminApi/getAdminApiActor delegate to it; dashboard + events routes call it once. Auth semantics identical (401/403, role===admin || isAdminEmail)."},{"id":"f_1_5","dim":"Webhook & Billing Integrity (Whop/Clerk)","sev":"P3","cat":"reliability","eff":"S","conf":"medium","title":"Reconcile cron is the only safety net but runs only every 6 hours — long worst-case drift window","location":"railway.membership-reconcile.toml:10 (cronSchedule = \"0 */6 * * *\") + src/app/api/cron/membership-reconcile/route.ts","evidence":"The reconcile route comment confirms 'The Whop webhook is the only realtime tier-writer and it is fire-and-forget — a dropped or unverified event leaves tiers drifted permanently.' The healing sweep is scheduled at `0 */6 * * *` (railway.membership-reconcile.toml:10).","impact":"If a webhook delivery is dropped for a user whose email IS available, the cron heals it — but only at the next 6-hour tick, so a paid user can be locked out (or a refunded user retain premium) for up to ~6 hours. For a real-money 0DTE product, a multi-hour lockout of a paying subscriber during market hours is a meaningful UX/revenue issue. (Note: the null-email failure mode in the P1 finding is NOT covered by this cron at all, since reconcile also keys on email.)","fix":"Tighten the schedule during market hours (e.g. every 30-60 min) or add a faster self-heal: when requireTierApi sees a `free` user who just hit a premium-gated route, opportunistically enqueue a single sync. At minimum, run reconcile hourly.","commit":null,"note":""},{"id":"f_1_6","dim":"Webhook & Billing Integrity (Whop/Clerk)","sev":"P3","cat":"security","eff":"S","conf":"medium","title":"Cron auth uses non-constant-time string equality for CRON_SECRET","location":"src/lib/market-api-auth.ts:9","evidence":"`return authHeader === secret;` — plain JS === short-circuits on first differing byte, unlike the crypto timingSafeEqual that standardwebhooks uses for webhook verification.","impact":"Theoretically timing-observable, but a remote timing attack over HTTP against a high-entropy bearer secret is extremely impractical, and this gates the reconcile cron rather than direct money movement. Low real-world risk, but inconsistent with the timing-safe comparison the webhook path correctly uses.","fix":"Compare with crypto.timingSafeEqual over equal-length Buffers (length-guard first to avoid throwing on mismatched lengths), matching the standard the webhook verification already sets.","commit":"345c2be","note":""},{"id":"f_2_3","dim":"Database (Postgres/pg)","sev":"P3","cat":"security","eff":"S","conf":"medium","title":"Cron auth uses non-constant-time secret comparison","location":"src/lib/market-api-auth.ts:5-10 (isCronAuthorized)","evidence":"`const authHeader = req.headers.get(\"authorization\")?.replace(/^Bearer\\s+/i, \"\"); return authHeader === secret;` — a plain `===` compare of CRON_SECRET. A repo-wide grep for timingSafeEqual returns no files.","impact":"`===` short-circuits on the first differing byte, a timing side-channel that in principle could be used to recover CRON_SECRET, which gates every cron route including db-cleanup (data deletion). Realistically low risk: the secret is high-entropy, network jitter dwarfs the per-byte timing delta over HTTP, and a remote byte-by-byte timing attack on a JIT'd JS string compare is impractical — hence P3, not P2.","fix":"Compare with crypto.timingSafeEqual over equal-length Buffers (length-check first to avoid the throw on unequal length, then constant-time compare), rejecting when either side is empty.","commit":"345c2be","note":""},{"id":"f_2_5","dim":"Database (Postgres/pg)","sev":"P3","cat":"reliability","eff":"S","conf":"medium","title":"ensureLargoSession does check-then-insert without ON CONFLICT — race window","location":"src/lib/largo/largo-store.ts:29-47","evidence":"`SELECT user_id ... WHERE id = $1`; if no rows -> `INSERT INTO largo_sessions (id, user_id, updated_at) VALUES ($1,$2,NOW())`. No ON CONFLICT and not wrapped in a transaction with the caller's writes.","impact":"Two concurrent requests for the same brand-new session id (double-submit, retry) can both pass the existence check and both attempt the INSERT; the second fails on the `id` primary key, surfacing a 23505 as a 500 to the user instead of a clean no-op. Low blast radius (session ids are app-generated) but a real edge-case 500.","fix":"Use `INSERT ... ON CONFLICT (id) DO UPDATE SET updated_at = NOW() RETURNING user_id`, then assert ownership against the returned user_id — collapsing check+insert+touch into one atomic statement.","commit":"e87fe97","note":"Atomic INSERT ... ON CONFLICT (id) DO UPDATE SET updated_at NOW() RETURNING user_id; ownership asserted against the returned owner (DO UPDATE never touches user_id)."},{"id":"f_2_6","dim":"Database (Postgres/pg)","sev":"P3","cat":"performance","eff":"M","conf":"low","title":"fetchRecentFlows default LIMIT 5000 with premium-DESC sort cannot use an index","location":"src/lib/db.ts:696-766","evidence":"Default `since_hours = 48`, default `limit = 5000`, `ORDER BY COALESCE(total_premium, 0) DESC NULLS LAST`. The sort key (total_premium) has no supporting index; flow_alerts indexes are on created_at and ticker (db.ts:150-159).","impact":"On a busy 48h window the planner must filter by COALESCE(created_at,inserted_at) then sort the full matched set by premium before LIMIT — a sort that cannot use an index. At high flow volume this is a periodic heavy query feeding the live tape.","fix":"Either add an index supporting the premium sort within the time window, or (preferable for a 'recent tape') sort by COALESCE(created_at, inserted_at) DESC and cap rows, since users care about recency more than a global premium ranking across 48h.","commit":null,"note":""},{"id":"f_2_7","dim":"Database (Postgres/pg)","sev":"P3","cat":"data-integrity","eff":"S","conf":"medium","title":"flow_alerts analytics filter/bucket on nullable created_at with no inserted_at fallback","location":"src/lib/db.ts:811-846 (insert), 1674-1703 / 1705-1736 / 1738-1776 (analytics)","evidence":"insertFlowAlert writes `parseTimestamptz(row.created_at)`, which is null for timestampless UW alerts. fetchTickerFlowDailyNet, fetchTickersAvgDailyPremium, and fetchTickersFlowDailyNets all filter and bucket purely on `created_at` (`WHERE created_at >= ...`, `GROUP BY (created_at AT TIME ZONE ...)::date`) with no COALESCE(created_at, inserted_at) — inconsistent with fetchRecentFlows (db.ts:709) which does COALESCE.","impact":"Alerts ingested without a UW created_at are silently excluded from Night Hawk avg-premium and daily-net analytics, biasing the scorer relative to the tape, which counts them.","fix":"Pick one rule and apply it consistently: if these analytics should count all rows, use COALESCE(created_at, inserted_at) like fetchRecentFlows; if they intentionally require real event time, document the exclusion. The inconsistency with fetchRecentFlows is the key gap.","commit":null,"note":""},{"id":"f_3_5","dim":"Redis & Caching","sev":"P3","cat":"reliability","eff":"S","conf":"medium","title":"Telemetry flush setInterval is never cleared and writes to a client with no error handler","location":"src/lib/api-telemetry-redis.ts:26, 95-101, 103-118","evidence":"`flushTimer = setInterval(() => { void flushTelemetryToRedis(); }, FLUSH_MS);` (line 97) with no `clearInterval` anywhere; `flushTelemetryToRedis` writes via `redisClient()` which is created without an error listener. `scheduleTelemetryRedisFlush` guards re-entry only via the module-level `flushTimer`.","impact":"The 10s flush runs for the life of the process even if Redis is permanently unreachable (each tick re-attempts `redisClient()` and silently swallows). Blast radius is low (telemetry only, errors are caught at the call site) but it is an unbounded recurring source — relevant mainly as another consumer of the shared-factory + error-handler fix.","fix":"Have the flush back off (or skip) when `redisClient()` returns null repeatedly, and route the client through the shared `getRedis()` factory so it gets the error listener. A `clearInterval` on shutdown is nice-to-have but secondary.","commit":null,"note":""},{"id":"f_3_6","dim":"Redis & Caching","sev":"P3","cat":"reliability","eff":"S","conf":"medium","title":"redisSubscribe's returned unsubscribe is local-handler-only — never issues Redis UNSUBSCRIBE","location":"src/lib/flow-events.ts:25-45; src/lib/redis-pubsub.ts:106-125","evidence":"`redisSubscribe` returns `() => { channelHandlers.get(channel)?.delete(handler); }` (lines 122-124) — it removes the local handler but never calls `client.unsubscribe(channel)`. `ensureRedisBridge` stores `redisUnsubscribe` but never invokes it (flow-events.ts:30, 11).","impact":"Functionally fine today: the bridge is a singleton and ioredis auto-resubscribes channels on reconnect by default. But the returned function is misleading — a future caller expecting a real teardown (to stop receiving a channel) would silently keep receiving messages, and if all handlers are removed the Redis subscription leaks.","fix":"Either document that the returned function is local-handler-only, or make it issue `UNSUBSCRIBE` when the last handler for a channel is removed.","commit":null,"note":""},{"id":"f_3_7","dim":"Redis & Caching","sev":"P3","cat":"tech-debt","eff":"S","conf":"medium","title":"UW cache keys use `uw_cache:` prefix instead of the `blackout:` root used everywhere else","location":"src/lib/providers/uw-shared-cache.ts:38, 84, 93, 109; vs src/lib/shared-cache.ts:56, 106","evidence":"uw-shared-cache uses `const CACHE_PREFIX = 'uw_cache:'` (line 38) while shared-cache namespaces everything under `blackout:` (e.g. `redis.set(`blackout:${key}`...)`, line 106). Both prefixes share one Redis DB with no common root.","impact":"No collision today (`uw_cache:` and `blackout:` are disjoint), but if this Redis instance is ever shared with another app/env (common on Railway where add-ons get reused), the `uw_cache:` keys have no app/env scoping and could be flushed by an unrelated `KEYS uw_cache:*` sweep. Mostly an ops/debugging-consistency concern.","fix":"Prefix UW cache keys under the same root, e.g. `blackout:uw_cache:`, to match the rest of the codebase (ideally with an env/deploy discriminator if the Redis instance is multi-tenant).","commit":null,"note":""},{"id":"f_4_6","dim":"API Routes — Correctness & Robustness","sev":"P3","cat":"performance","eff":"S","conf":"high","title":"Redundant Clerk getUser calls on admin routes (latency + Clerk rate-limit pressure)","location":"src/app/api/admin/spx/dashboard/route.ts:12-13; src/app/api/admin/apis/events/[id]/route.ts:13,34; src/lib/admin-access.ts:61-67","evidence":"admin/spx/dashboard calls getAdminApiActor() (a Clerk getUser) THEN requireAdminApi() (which internally calls getAdminApiActor again) — 2-3 getUser round-trips per request; the comment claims it 'caches the result' but it does not. isAdminUser() also does its own getUser, and getAdminApiActor calls getUser a second time after isAdminUser already fetched.","impact":"3-4 Clerk Backend API calls per admin request where 1 would do. Adds latency and pushes toward the same Clerk rate limit that requireTierApi was specifically built (with a cache) to avoid. Admin traffic is low so impact is modest.","fix":"Have getAdminApiActor return the already-fetched user/email and reuse it; gate-then-actor (call requireAdminApi first, then derive actor from a single cached getUser). Mirror the tierCache approach for admin lookups.","commit":"0bd6862","note":"Same fix as the other admin-getUser finding: resolveAdminApi() single getUser, reused by dashboard + events routes."},{"id":"f_4_7","dim":"API Routes — Correctness & Robustness","sev":"P3","cat":"security","eff":"S","conf":"medium","title":"Inconsistent error-detail exposure: some routes leak internal messages to clients","location":"src/app/api/cron/flow-ingest/route.ts:32; src/app/api/cron/cron-staleness-watchdog/route.ts:57; vs src/app/api/cron/spx-evaluate/route.ts:90","evidence":"flow-ingest returns `{ ok:false, error:'Ingest failed', detail }` where detail = error.message; watchdog returns `{ ok:false, error: detail }`. spx-evaluate (same author pattern) deliberately returns generic 'Evaluation failed' and logs detail separately.","impact":"Internal error strings (stack-adjacent messages, possibly host/path/driver detail) surface in HTTP responses on cron endpoints. Cron endpoints are secret-gated so reach is limited, but the inconsistency means future copy-paste spreads the leak.","fix":"Standardize on the spx-evaluate pattern everywhere: generic client error message, full detail only to console.error / logCronRun. Consider a shared jsonError(status, publicMsg, err) helper.","commit":null,"note":""},{"id":"f_4_8","dim":"API Routes — Correctness & Robustness","sev":"P3","cat":"bug","eff":"S","conf":"medium","title":"play-explain throws on plays missing a ticker field","location":"src/app/api/market/nighthawk/play-explain/route.ts:48","evidence":"const play = plays.find((p) => p.ticker.toUpperCase() === ticker); — if any play object in the stored edition has an undefined ticker, p.ticker.toUpperCase() throws TypeError, producing an unhandled 500 (no try/catch wraps this section).","impact":"A single malformed play row in a persisted edition turns the whole explain endpoint into a 500 for that edition, with a stack-trace-style error rather than a clean 4xx/404.","fix":"Guard: plays.find((p) => p.ticker?.toUpperCase() === ticker). Wrap the handler body in try/catch returning a generic 502 like the sibling AI routes.","commit":null,"note":""},{"id":"f_4_9","dim":"API Routes — Correctness & Robustness","sev":"P3","cat":"reliability","eff":"S","conf":"medium","title":"Whop webhook returns 200 (silently drops events) when WHOP_WEBHOOK_SECRET is unset","location":"src/app/api/webhook/whop/route.ts:22-31","evidence":"if (!WHOP_WEBHOOK_SECRET) { ... return NextResponse.json({ ok:true, warning:'webhook_secret_not_configured' }, { status:200 }) } — membership.activated/deactivated events are acknowledged but never processed.","impact":"If the secret is ever missing/misconfigured in prod, every membership change is silently dropped with a 200 — paid users don't get provisioned and cancellations don't revoke access (billing-state drift). The choice to 200 is defensible (avoids Whop retry storms) but the failure is invisible to monitoring.","fix":"Keep the 200 to avoid retry storms, but additionally page ops (notifyOpsDiscord critical) on the missing-secret path, and add a startup health check that fails readiness if the secret is absent in production. The membership-reconcile cron is the backstop — ensure it runs.","commit":"e87fe97","note":"Same fix as the Auth-dim duplicate: notifyOpsDiscord critical alert on the missing-secret path."},{"id":"f_5_5","dim":"Realtime / WebSockets / SSE","sev":"P3","cat":"security","eff":"M","conf":"medium","title":"flows/stream auth is enforced at connect only; long-lived SSE outlives tier downgrade","location":"src/app/api/market/flows/stream/route.ts:15-16; src/lib/market-api-auth.ts:28-29, 84-88","evidence":"authorizeMarketDeskApi runs once in GET before the stream opens (route lines 15-16). Tier is additionally cached 60s (tierCache, market-api-auth.ts:28-29). The SSE connection then stays open indefinitely with no periodic re-authorization.","impact":"A user whose premium access is revoked (billing lapse / Whop cancel) keeps receiving the live flow tape until their EventSource reconnects, which re-checks. Practical exposure is bounded by client reconnect cadence; for a paid real-money feed this is a low-severity entitlement leak.","fix":"Re-validate entitlement on the open stream periodically (e.g. re-run the tier check inside the heartbeat tick every few minutes and close on revocation), or cap stream lifetime so a reconnect forces fresh auth.","commit":null,"note":""},{"id":"f_5_6","dim":"Realtime / WebSockets / SSE","sev":"P3","cat":"reliability","eff":"S","conf":"medium","title":"Pulse heartbeat enqueue failure is swallowed without clearing the 250ms data interval","location":"src/app/api/market/spx/pulse/stream/route.ts:43-47, 56-60","evidence":"The data send() path clears both intervals and closes the controller on enqueue failure (lines 43-47). The heartbeat enqueue (lines 56-60) is wrapped in catch { /* stream already closed */ } that silently swallows the error and does NOT clear `interval`. If the client drops between data ticks, the heartbeat fails quietly while the 250ms data loop keeps issuing Redis GETs until its own next enqueue fails.","impact":"A brief window of wasted Redis GETs + CPU after an abrupt disconnect before the next data tick self-cleans. Mostly mitigated by cancel() firing on normal disconnects.","fix":"On heartbeat enqueue failure, run the same teardown the data path uses (clear both intervals, close the controller) instead of swallowing silently.","commit":null,"note":""},{"id":"f_5_7","dim":"Realtime / WebSockets / SSE","sev":"P3","cat":"reliability","eff":"S","conf":"high","title":"redis-pubsub shared lastFailedAt backoff couples publisher and subscriber failures","location":"src/lib/redis-pubsub.ts:9-11, 21, 43, 54, 85","evidence":"A single module-level lastFailedAt (line 11) is checked at the top of BOTH connectPublisher (line 21) and connectSubscriber (line 54), and set on either's failure (lines 43, 85). After any one failure, both connect paths short-circuit for RETRY_BACKOFF_MS (30s).","impact":"If only the subscriber connection fails (or vice versa), the healthy side is also blocked from (re)connecting for the full 30s window, delaying restoration of
