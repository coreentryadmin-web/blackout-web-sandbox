<style>
  :root{ --bg:#07080d; --card:#0d0f17; --card2:#11141f; --line:#1d2233; --tx:#e8ecf3; --mut:#93a4bd;

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.55 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}

  .controls{position:sticky;top:0;background:rgba(7,8,13,.92);backdrop-filter:blur(8px);padding:12px 0;margin:0 0 8px;border-bottom:1px solid var(--line);z-index:5;display:flex;flex-wrap:wrap;gap:8px;align-items:center}

  details.dim{margin:14px 0 0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#0a0c14}

<script>
const DATA = [{"id":"f_0_0","dim":"Auth & Authorization","sev":"P0","cat":"security","eff":"S","conf":"high","title":"Unauthenticated SSE stream leaks live premium SPX/VIX market data","location":"src/app/api/market/live/route.ts:16-48","evidence":"export async function GET(req: NextRequest) { ... const unsub = spxBroadcaster.subscribe((bar) => { controller.enqueue(`data: ${JSON.stringify(bar)}\\n\\n`) }) ... — verified: no auth/tier check anywhere in the handler. The sibling premium path market/indices/route.ts:14-15 gates the same I:SPX/I:VIX data with `const auth = await authorizeMarketDeskApi(req); if (auth instanceof Response) return auth;`.","impact":"Anyone (no account, no subscription) can open EventSource('/api/market/live') and receive the live Polygon SPX/VIX 1-minute bar stream — the same real-time index data that /api/market/indices gates behind authorizeMarketDeskApi (premium). Direct paid-data leak and tier bypass on a real-money SaaS, and it also pins an extra share of the single shared Polygon WS connection for free.","fix":"Add `const auth = await authorizeMarketDeskApi(req); if (auth instanceof Response) return auth;` as the first lines of the handler, matching market/indices. Note the route is force-dynamic SSE so the gate runs per-connection. If the route is dead/legacy, delete it.","commit":"b895972","note":""},{"id":"f_3_0","dim":"Redis & Caching","sev":"P0","cat":"reliability","eff":"S","conf":"high","title":"No `error` event listener on any ioredis client — an unhandled error can crash the process","location":"src/lib/shared-cache.ts:32-37; src/lib/redis-pubsub.ts:32-37, 65-70; src/lib/providers/uw-shared-cache.ts:56-61; src/lib/providers/uw-rate-limiter.ts:53-58; src/lib/spx-commentary-limits.ts:44-49; src/lib/api-telemetry-redis.ts:55-60","evidence":"All 7 client instantiations are `const client = new Redis(url, {...}); await client.connect();` with NO `client.on('error', ...)` anywhere in src/ — grep for `.on(\"error\"` returns only spx-broadcaster.ts:105, a WebSocket, never a Redis client.","impact":"ioredis emits an `error` event on every connection drop, auth failure, or runtime command error. Node's EventEmitter throws `Unhandled 'error' event` (uncaught exception) when an `'error'` event has no listener — this can crash a Railway replica serving live 0DTE traders. The `try/catch` around `connect()` only covers the initial handshake; errors AFTER a successful connect (Redis restart, network blip, Railway Redis maintenance) fire on the live client with no handler. The local-memory fallback does not protect against this because the crash happens at the EventEmitter level, not at a call site.","fix":"Attach `client.on('error', (e) => console.warn('[\u003cmodule>] redis error', e?.message))` immediately after each `new Redis(...)`. Best done by extracting a single `makeRedis(url, opts)` helper that all factories call, so the listener can never be re-omitted.","commit":"b895972","note":""},{"id":"f_0_1","dim":"Auth & Authorization","sev":"P1","cat":"cost","eff":"S","conf":"high","title":"Unauthenticated ticker-search proxies to paid Polygon/Massive API (cost/DoS vector)","location":"src/app/api/market/ticker-search/route.ts:5-16","evidence":"export async function GET(req: NextRequest) { const q = ...; const results = await serverCache(`search:${q.toLowerCase()}:${limit}`, TTL.TICKER_SEARCH, () => fetchPolygonTickerSearch(q, limit)); ... — verified: no requireTierApi / authorizeMarketDeskApi call anywhere in the handler.","impact":"Any anonymous caller can drive Polygon/Massive ticker-search lookups. The cache key is attacker-controlled (`search:${q}:${limit}`), so a flood of distinct q values bypasses the cache and runs one upstream paid API call per unique query — uncapped cost amplification and a way to exhaust the data-provider quota for paying users.","fix":"Gate with requireTierApi('free') at minimum (require a signed-in user) so the cache key is no longer reachable by anonymous callers; the cache alone is not a defense because the key includes user input. Add per-user rate limiting on this endpoint if it stays public to signed-in free users.","commit":"b895972","note":""},{"id":"f_0_2","dim":"Auth & Authorization","sev":"P1","cat":"security","eff":"M","conf":"high","title":"Middleware documents a 'protected by default' deny-list that does not exist in code","location":"src/middleware.ts:13-39","evidence":"The handler is only `if (isProtectedRoute(req)) auth().protect();` and isProtectedRoute is a page allow-list (/dashboard, /flows, /terminal, /heatmap, /nighthawk, /admin, /docs). The comment block (lines 20-39) claims 'DENY-LIST (protected by default)', references '/api/health (see isPublicRoute above)', and instructs devs to add routes to isPublicRoute/isPremiumRoute — but grep confirms isPublicRoute and isPremiumRoute appear ONLY inside this comment; no such code exists.","impact":"clerkMiddleware does NOT protect routes unless auth().protect() is called; here it runs only for the isProtectedRoute page allow-list. API routes are protected solely by their own per-route guards — the opposite of 'protected by default'. The comment gives future devs false confidence and is the most likely reason /api/market/live shipped unguarded. There is also no isPremiumRoute tier gate in middleware; premium gating relies entirely on per-route requireTierApi/authorizeMarketDeskApi.","fix":"Either rewrite the comment to match reality (allow-list of protected PAGES; all API routes must self-guard) OR actually implement the described deny-list: protect all routes by default in middleware and maintain an explicit isPublicRoute allow-list (/api/health, /api/ready, /api/webhook/whop, static). Implementing the real deny-list would have prevented both leaks above.","commit":null,"note":""},{"id":"f_1_0","dim":"Webhook & Billing Integrity (Whop/Clerk)","sev":"P1","cat":"reliability","eff":"S","conf":"high","title":"Webhook silently no-ops when Whop omits user.email; reconcile cron cannot heal it either (both key on email)","location":"src/app/api/webhook/whop/route.ts:60-61; reconcile also email-keyed at src/lib/membership.ts:167-168","evidence":"route.ts:60-61: `const email = event.data.user?.email; if (email) await syncWhopMembershipForEmail(email);` — the else branch is a silent 200 no-op with no log. Whop's Membership.User types email as `email: string | null` with the note 'Requires the member:email:read permission to access' (node_modules/@whop/sdk/resources/shared.d.ts:957 and :1672). The reconcile cron also harvests targets via `membership.user?.email?.toLowerCase()` (membership.ts:167-168) and syncWhopMembershipForEmail only accepts an email — there is no sync-by-user-id path.","impact":"If the API key / webhook scope lacks member:email:read (or the user record has no email), every membership.activated/deactivated event resolves email=null and the handler returns 200 having done nothing, with NO log on the dropped-email branch. Critically, the 6-hourly reconcile cron does NOT self-heal this case because it also depends on email — so the drift is permanent, not merely delayed: a paid user stays locked out (or a churned user keeps premium) until someone notices. This is a global-misconfiguration failure mode, not a per-event blip.","fix":"Log a warning when event.type is a membership event but email is missing, so the missing-permission misconfig surfaces in logs immediately. Document that member:email:read is required alongside WHOP_WEBHOOK_SECRET. Do NOT promise an id-based fallback in the recommendation unless syncWhopMembershipForEmail is first extended to accept a Whop user id (it currently cannot), e.g. add a syncWhopMembershipForUserId that resolves the member's email/memberships by id.","commit":"d76c916","note":"Added console.warn (whop_user_id + member:email:read hint). Minimal — no id-heal path."},{"id":"f_2_0","dim":"Database (Postgres/pg)","sev":"P1","cat":"data-integrity","eff":"M","conf":"high","title":"closeOpenPlay() transaction wraps zero of the real statements — claimed atomicity is fake","location":"src/lib/spx-play-store.ts:320-355 (with db.ts:577-580 dbClient, db.ts:1097-1103 closeOpenSpxPlayRow, db.ts:1186-1225 closePlayOutcomeRow)","evidence":"closeOpenPlay does `const client = await dbClient(); await client.query(\"BEGIN\")` then calls recordPlayClose() -> closePlayOutcomeRow(), closeOpenSpxPlayRow(), and setMeta() — each of which runs `(await getPool()).query(...)` on a DIFFERENT pooled connection. dbClient() (db.ts:577) returns getPool().connect(), so client is its own connection. The comment claims: \"Wrap all 4 writes ... in a single DB transaction so a crash cannot leave the play open while meta reflects it as closed (BUG-05).\"","impact":"The BEGIN/COMMIT on `client` govern nothing — the three real writes auto-commit independently on other pool connections. A crash or error between them leaves exactly the inconsistent state BUG-05 was meant to prevent (play row still 'open' while session meta says closed, or outcome closed but play still open), which bypasses post-loss re-entry protection on a real-money engine. The ROLLBACK on `client` cannot undo writes already committed on other connections.","fix":"Thread the acquired `client` through recordPlayClose/closePlayOutcomeRow/closeOpenSpxPlayRow/setMeta as an optional executor param so all four statements run on the same connection inside the BEGIN/COMMIT; or run the raw UPDATE/UPDATE/UPSERT SQL directly on `client` within the try block.","commit":"a7fe184","note":""},{"id":"f_2_1","dim":"Database (Postgres/pg)","sev":"P1","cat":"reliability","eff":"M","conf":"high","title":"Migration advisory lock acquired and released across a multi-connection pool, not a single session","location":"src/lib/db.ts:124-553 (runMigrations)","evidence":"runMigrations runs `await p.query('SELECT pg_advisory_lock($1)')` (db.ts:130), ~40 DDL `await p.query(...)` calls, then `await p.query('SELECT pg_advisory_unlock($1)')` (db.ts:551) — all on the Pool `p` (default max 5), not a single checked-out client. (Note: statement_timeout is set then immediately RESET at line 131, so it does not even cover the DDL — the timeout-protection comment is moot; the lock/unlock-across-connections issue is the real defect.)","impact":"pg_advisory_lock is session-scoped. The lock can be acquired on connection A but the unlock issued on connection B — a no-op that Postgres logs as a failed advisory_unlock — leaving A holding the lock until the connection is recycled, forcing other cold-start instances to wait/contend on the next migration. The lock therefore does not reliably serialize concurrent cold-start DDL the way the comment intends.","fix":"Acquire one client via getPool().connect() at the top of runMigrations and run the advisory lock, all DDL, and the unlock on that single client, releasing it in finally. This makes the session-scoped lock actually span the migration. (The internal dedup block at 193-212 already does exactly this on its own client.)","commit":"a7fe184","note":""},{"id":"f_3_1","dim":"Redis & Caching","sev":"P1","cat":"reliability","eff":"S","conf":"high","title":"uw-rate-limiter Redis failure is permanent — cluster-wide rate limiter silently degrades forever after one blip","location":"src/lib/providers/uw-rate-limiter.ts:42, 45, 61-64, 116","evidence":"`let sharedRedisFailed = false;` (line 42); `if (sharedRedisFailed) return null;` (line 45); `catch { sharedRedisFailed = true; return null; }` (lines 61-64). There is no reset path — unlike shared-cache.ts/redis-pubsub.ts/uw-shared-cache.ts which all use a time-windowed `lastFailedAt` + `RETRY_BACKOFF_MS`. `acquireGlobalRedisSlot` returns `true` unconditionally when the client is null (line 116). The connect failure is also swallowed with no log.","impact":"A single transient Redis failure during cold start permanently disables the *cluster-wide* UW rate limit for the life of the process. Each Railway replica then paces only locally at UW_MAX_RPS; with N replicas the cluster can blow past the UW plan cap → 429 storms and circuit-breaker churn (the very condition the global limiter exists to prevent).","fix":"Replace the permanent `sharedRedisFailed` boolean with the same `lastFailedAt` + `RETRY_BACKOFF_MS` backoff used in the sibling modules (also drop the boolean from the `redisGlobal` calc in uwRateLimiterStats, line 308), and log the failure once.","commit":"01b2ba0","note":""},{"id":"f_3_2","dim":"Redis & Caching","sev":"P1","cat":"reliability","eff":"S","conf":"high","title":"redis-pubsub shares one `lastFailedAt` across the publisher AND subscriber","location":"src/lib/redis-pubsub.ts:11, 21, 43, 54, 85","evidence":"Module-level `let lastFailedAt = 0;` (line 11) is read by both `connectPublisher` (line 21) and `connectSubscriber` (line 54), and written in both catch blocks (lines 43, 85). The two clients are independent connections.","impact":"A failure establishing the publisher blocks the subscriber from even attempting to connect for the full 30s backoff window (and vice versa). For the flow-events bridge this means a transient publisher hiccup can stall the cross-instance flow *subscriber* for up to 30s, dropping cross-replica flow fan-out to SSE clients during that window. Note: local same-process fan-out (flow-events.ts `fanOutLocal`) is unaffected, so the blast radius is cross-instance delivery only.","fix":"Split into independent `publisherLastFailedAt` / `subscriberLastFailedAt` variables so each connection's backoff is tracked separately.","commit":null,"note":""},{"id":"f_3_3","dim":"Redis & Caching","sev":"P1","cat":"cost","eff":"M","conf":"medium","title":"Cross-instance cache stampede on cold start; uwCacheGet has no dedup at all","location":"src/lib/server-cache.ts:61-112, 144-179; src/lib/providers/uw-shared-cache.ts:76-98","evidence":"`withServerCache` dedups only via the in-process `inflight` Map (server-cache.ts:108-109, 177); the Redis layer is plain read-through with no distributed lock. `uwCacheGet` has NO dedup whatsoever: `const cached = await redis.get(...); ... const result = await fetcher()` (uw-shared-cache.ts:82-89), so even concurrent requests within a single replica each fire the upstream fetch.","impact":"When a hot key is cold across all replicas (deploy, TTL expiry of a key with no SWR predecessor, first request after restart), every replica's first request fires the upstream fetch simultaneously — and for uwCacheGet, every concurrent request within a replica does too. With multiple Railway replicas this multiplies UW/Polygon load exactly when the rate-limiter is most stressed.","fix":"Two fixes: (1) add in-process inflight dedup to `uwCacheGet` to match `withServerCache` (cheap, high value); (2) optionally add a short-lived Redis `SET key:lock NX EX` single-flight around the loader so only one fetch per key runs cluster-wide, with losers polling the cache briefly.","commit":null,"note":""},{"id":"f_4_0","dim":"API Routes — Correctness & Robustness","sev":"P1","cat":"reliability","eff":"M","conf":"high","title":"Unbounded in-process cache fed by unauthenticated, user-keyed endpoint (memory-exhaustion DoS)","location":"src/lib/server-cache.ts:22 (const store = new Map) + src/app/api/market/ticker-search/route.ts:11-14","evidence":"ticker-search has NO auth and caches per raw query: serverCache(`search:${q.toLowerCase()}:${limit}`, ...). server-cache.ts has `const store = new Map\u003cstring, CacheEntry>()` with NO size cap, no LRU, and no proactive eviction (grep for store.delete/clear/size returns no matches) — entries are only overwritten when the SAME key is requested again. Unique keys are never revisited, so they persist until OOM.","impact":"An unauthenticated attacker sending millions of distinct ?q= values grows the in-process Map without bound (and writes each to Redis under server:*), driving the Railway replica toward memory exhaustion / OOM-restart. Also burns Polygon ticker-search quota and pollutes Redis.","fix":"Require auth on ticker-search (authorizeMarketDeskApi or at least requireTierApi free-tier). Add a bounded LRU / max-entries + periodic sweep of expired keys in server-cache.ts. Validate/sanitize q (length + charset) before using it as a cache key, and reject NaN limit (Number(...) of a non-numeric gives NaN → Math.min(NaN,20)=NaN passed to fetch).","commit":null,"note":""},{"id":"f_4_1","dim":"API Routes — Correctness & Robustness","sev":"P1","cat":"cost","eff":"M","conf":"high","title":"Expensive AI hunt route has no rate-limit or concurrency gate","location":"src/app/api/market/nighthawk/hunt/route.ts:14-51 (maxDuration=120)","evidence":"POST runs runDayTradeAgent / runHuntScan — multi-step Anthropic agent runs with maxDuration=120 — guarded only by authorizeCronOrTierApi('premium'). Unlike market/largo/query, there is NO acquireLargoSlot-style concurrency gate and no per-user rate limit. A single premium user can fire unlimited parallel POSTs.","impact":"Direct, unbounded Anthropic spend and CPU/connection pressure: every premium user can launch concurrent 2-minute agent runs. One abusive or buggy client can multiply the AI bill and exhaust the maxDuration worker pool.","fix":"Apply the same Redis concurrency gate used in market/largo/query (per-user MAX_CONCURRENT with 429), or a token-bucket rate limit keyed on userId. Also wrap the Promise.all on line 38 in try/catch — currently an agent rejection produces an unhandled 500.","commit":null,"note":""},{"id":"f_6_0","dim":"Provider — Unusual Whales","sev":"P1","cat":"bug","eff":"S","conf":"high","title":"Coalesced UW requests share one Response object → second concurrent caller throws 'body already read'","location":"src/lib/providers/unusual-whales.ts:77-93 (uwGet) + src/lib/providers/uw-rate-limiter.ts:241-250 (throttleUwCoalesced)","evidence":"uwGet does `const res = await throttleUwCoalesced(requestKey, () => trackedFetch(...))` then `return res.json()`. throttleUwCoalesced returns the SAME in-flight Promise (and thus the SAME Response) to every concurrent caller with an identical key. There is no res.clone(). A Response body is a one-shot stream.","impact":"When two callers issue an identical UW GET in the same window — e.g. buildSpxDesk and buildSpxDeskFlow both calling fetchUwGreekExposureExpiry('SPX') / fetchUwNetPremTicks('SPY') on overlapping poll intervals — the first .json() consumes the body and the second throws `TypeError: body used already`. uwGetSafe swallows it as `return null`, so the desk silently loses greek-exposure / net-prem data intermittently under load; fetchMarketFlowAlertPage (raw uwGet) would surface the throw.","fix":"Coalesce on the parsed JSON, not the Response. Either move res.json() inside the coalesced fn (return the parsed payload + status), or have throttleUwCoalesced callers .clone() before reading. Simplest: change uwGet to `const data = await throttleUwCoalesced(key, async () => { const r = await trackedFetch(...); if (r.status===429){...} if(!r.ok) throw...; return r.json(); })`.","commit":"ae57daa","note":""},{"id":"f_6_1","dim":"Provider — Unusual Whales","sev":"P1","cat":"reliability","eff":"S","conf":"high","title":"503/5xx responses are never retried — spot-exposures goes straight to null on a transient blip","location":"src/lib/providers/unusual-whales.ts:210-238 (uwGetSafe catch) + 68-93 (uwGet) + src/lib/api-tracked-fetch.ts:64 (default maxRetries=0)","evidence":"uwGetSafe's catch only special-cases '403' and '429'; every other error including `→ 503` hits the final `return null` with no retry (line 236). uwGet calls trackedFetch with no maxRetries, so trackedFetch's own 5xx retry loop (api-tracked-fetch.ts:108-111) never runs (maxAttempts=1). The retry loop (for attempt\u003c=retries) only continues on 429.","impact":"The documented spot-exposures 503 issue means fetchUwOdteGexLadder's first attempt returns 0 strikes on any 503; the second attempt (greek-exposure/strike) is the only safety net. A single transient 503 on an endpoint without a fallback (max-pain, nope, IV rank) yields null for that whole desk build with no retry, even though 5xx is the most retry-worthy class.","fix":"In uwGetSafe, treat 5xx like 429: retry with backoff for `msg.includes('5')`/status>=500 (cap attempts), then fall to stale cache. Cheaper alternative: pass maxRetries:1 to trackedFetch in uwGet so transient 5xx get one in-fetch retry.","commit":null,"note":""},{"id":"f_7_0","dim":"Provider — Polygon/Massive & misc (symbol conventions, error handling, caching, macro/news/web-search, provider-policy fallback)","sev":"P1","cat":"reliability","eff":"S","conf":"high","title":"0DTE GEX fast-move cache bypass is dead code — recordSpxPriceObservation() is never called","location":"src/lib/providers/polygon-options-gex.ts:51-74, 99-101 (recordSpxPriceObservation defined :55); grep shows zero callers repo-wide","evidence":"isSpxFastMove relies on spxPriceHistory, which is only populated by recordSpxPriceObservation(). That exported function has no callers anywhere in src/, so spxPriceHistory is always empty and `if (spxPriceHistory.length === 0) return false;` makes isSpxFastMove ALWAYS false. The documented behavior 'During fast moves (SPX >0.5% in the last 5 min) bypass cache entirely so GEX reflects the new price level' never triggers.","impact":"During a fast SPX move (exactly when 0DTE GEX walls matter most), the desk serves cached GEX up to polygonGexCacheMs (default 15s) old as long as spot is within max(spot*0.003, 5pts) — ~16 SPX points of tolerance. Traders see stale gamma walls during the move the feature was built to handle.","fix":"Call recordSpxPriceObservation(price) on each SPX spot update (e.g. in spx-desk before fetchPolygonOdteDeskBundle, or in the WS price handler). Add a unit test asserting isSpxFastMove flips true after a >0.5% move within the window.","commit":"01b2ba0","note":""},{"id":"f_7_1","dim":"Provider — Polygon/Massive & misc (symbol conventions, error handling, caching, macro/news/web-search, provider-policy fallback)","sev":"P1","cat":"data-integrity","eff":"M","conf":"medium","title":"Curated macro calendar has inaccurate/missing FOMC dates for a real-money trading product","location":"src/lib/providers/macro-events.ts:11-93 (US_MACRO_SCHEDULE_2026 / 2027)","evidence":"2026 FOMC entries are {2026-05-07} and {2026-11-04}, and the list has no April or late-October meeting. Actual 2026 FOMC meeting dates are Jan 27-28, Mar 17-18, Apr 28-29, Jun 16-17, Jul 28-29, Sep 15-16, Oct 27-28, Dec 8-9 — so May 7 and Nov 4 are fabricated and Apr/Oct meetings are missing. Rows are also out of date order (2026-05-13 CPI listed before 2026-05-07 FOMC).","impact":"macroEventsOnDate / fetchUpcomingMacroEvents feed catalyst awareness that gates 0DTE plays. Wrong FOMC dates mean the desk flags no-catalyst on a real FOMC day (Apr 29) and falsely flags a catalyst on a non-meeting day (May 7) — directly mis-informing trade timing around the highest-vol events.","fix":"Replace hand-entered dates with the official Fed/BLS calendars; add a startup assertion or test that cross-checks the 8 FOMC decision dates per year. Consider a data source instead of a quarterly-maintained literal.","commit":"8b28acc","note":"Step 2 (9860658) wired the live UW economic-calendar feed with the corrected literal as fallback."},{"id":"f_9_0","dim":"SPX Play / Confluence Engine (correctness)","sev":"P1","cat":"data-integrity","eff":"M","conf":"high","title":"closeOpenPlay DB transaction wraps no actual writes — BEGIN/COMMIT is a no-op","location":"src/lib/spx-play-store.ts:320-355 (closeOpenPlay DB branch); helpers src/lib/db.ts:644 setMeta, 577-580 dbClient, 1097-1103 closeOpenSpxPlayRow; src/lib/spx-play-outcomes.ts:154 recordPlayClose","evidence":"closeOpenPlay does `const client = await dbClient(); await client.query(\"BEGIN\")` (store.ts:325-327) then calls recordPlayClose(id,...), closeOpenSpxPlayRow(id) and setMetaFn(...). All three execute via `(await getPool()).query(...)` on separate pooled connections (db.ts:650 setMeta, db.ts:1099 closeOpenSpxPlayRow, recordPlayClose -> closePlayOutcomeRow) — none receive `client`. dbClient() (db.ts:577) returns a distinct pool.connect(). The BEGIN/COMMIT/ROLLBACK only affect the dedicated client connection, which issues no data statements. The comment claims it wraps 'all 4 writes ... in a single DB transaction so a crash cannot leave the play open while meta reflects it as closed (BUG-05).'","impact":"The atomicity BUG-05 supposedly fixed does not exist. A crash/timeout between closeOpenSpxPlayRow and setMeta can leave the play row open while session meta says closed (or vice versa), and the outcomes table can desync from the open-play table — re-introducing the post-loss re-entry-protection bypass.","fix":"Thread the transaction `client` into every write: add an optional `client?: PoolClient` param to recordPlayClose/closePlayOutcomeRow, closeOpenSpxPlayRow, and setMeta and run their query on it (falling back to getPool() when absent), so all three execute on the same connection inside BEGIN/COMMIT. Verify with a test that injects a fault between the row close and the meta write and asserts both roll back together.","commit":"a7fe184","note":""},{"id":"f_9_1","dim":"SPX Play / Confluence Engine (correctness)","sev":"P1","cat":"reliability","eff":"M","conf":"high","title":"Session-close settle path is unreachable — open 0DTE play can be orphaned if 15:50 force-exit tick is missed","location":"src/lib/spx-play-engine.ts:1108-1160 (closed-session short-circuit) and 474-533 (the !desk.market_open SESSION branch in evaluateOpenPlay); src/lib/spx-play-session-guards.ts:65-75; src/lib/db.ts:953-964 (fetchOpenSpxPlay)","evidence":"evaluateSpxPlay returns the fully-closed SCANNING payload at line 1108 `if (!desk.market_open && !premarket)` BEFORE ever loading/evaluating the open play. So the `stopHit || thesisBreak || !desk.market_open` SESSION-close branch (line 474, exitAction 'SESSION') is never reached from the cron path once market_open=false. The session-guards comment (lines 65-75) claims the 16:15 cron window exists so 'post-close ticks can reach the SESSION-close branch (market_open=false) and force-flatten/settle any still-open 0DTE play' — but that branch cannot run because the function returns first. fetchOpenSpxPlay (db.ts:959) filters `session_date = $1::date AND status='open'`, so the next day the open row is never reloaded.","impact":"If the 15:50 force-exit tick is missed (cron gap, advisory-lock contention, deploy, or evaluator error during RTH), the open play is never closed: no SELL, no Discord exit, no recordPlayClose. The row becomes a permanent zombie (status stays 'open', no outcome) and win-rate telemetry is silently corrupted. The documented post-close settle is the safety net and it is dead code.","fix":"Before the line-1108 short-circuit, call loadOpenPlay()/evaluateOpenPlay() when an open row exists so the SESSION branch fires while market_open=false; OR add a dedicated settle cron that closes any status='open' row past the force-exit cutoff regardless of session_date (so a stale prior-day row is also caught). Add a startup/health check that alerts if a status='open' row outlives its session_date.","commit":"8a18e36","note":""},{"id":"f_10_0","dim":"Flow Pipeline + GEX + Data Integrity","sev":"P1","cat":"bug","eff":"S","conf":"high","title":"Unified tape ordering diverges: server sorts time-DESC, client mergeTapeItems sorts premium-DESC — the exact bug FlowFeed documents as fixed, still live on the SPX desk tape","location":"src/lib/spx-desk-merge.ts:33-37 (mergeTapeItems) vs src/lib/providers/spx-desk.ts:553 (buildUnifiedTape) & :572 (mergeTapeBuffer); consumed by src/hooks/useLiveSpxTape.ts:16,24","evidence":"Server: `.sort((a,b)=>new Date(b.time).getTime()-new Date(a.time).getTime())` (spx-desk.ts:553,572). Client mergeTapeItems: `const premDiff=(b.premium??0)-(a.premium??0); if(premDiff!==0) return premDiff;` then time only as tiebreaker (spx-desk-merge.ts:34-36). FlowFeed.tsx:398-400 documents: 'sorting the TAPE by premium pinned old whale prints to row 0 so a REAL-TIME TAPE looked frozen — HELIX flow audit.'","impact":"The server seeds a time-sorted REAL-TIME TAPE, but every SSE push and every re-seed runs through useLiveSpxTape→mergeTapeItems, which re-sorts the SPX desk tape by premium — pinning the largest old whale print to row 0 and making the live tape look frozen. The same payload renders in two different orders depending on which merge path last ran. This is the precise FlowFeed regression, reintroduced on the desk path.","fix":"Change mergeTapeItems to sort time-DESC (premium as tiebreaker at most) to match mergeTapeBuffer/buildUnifiedTape and FlowFeed. Better: extract one shared comparator (e.g. byTimeDesc) imported by all three call sites so server and client orderings are provably isomorphic.","commit":"345c2be","note":""},{"id":"f_11_0","dim":"NightHawk + Lotto Engines (edition builder/checkpoint-resume, lotto/power-hour engines, outcomes tracking, server-only, scheduling)","sev":"P1","cat":"reliability","eff":"M","conf":"high","title":"Public market route runs the mutating lotto state machine — clients can drive state transitions and fire Discord alerts","location":"src/app/api/market/lotto/today/route.ts:31; src/lib/spx-lotto-engine.ts:425-637","evidence":"Route handler: `const lotto = await evaluateSpxLotto(merged, technicals);` gated only by `authorizeCronOrTierApi(req, \"premium\")`. evaluateSpxLotto is NOT read-only — it calls saveLottoRecord, clearLottoRecord, logLottoPhase, and `notifyPlayDiscord({action:\"BUY\"/\"SELL\"...})`.","impact":"Any signed-in premium user loading the lotto page (or polling it) executes WATCH->HOLD->SELL transitions on the single shared lotto record and triggers real Discord buy/sell alerts. Concurrent users or a user racing the spx-evaluate cron produce duplicate alerts and can corrupt the one global LOTTO_KEY record (last-write-wins on divergent in-memory copies).","fix":"Add a read-only snapshot path for the public route (mirror the existing readSpxPlaySnapshot pattern used for the main play) so /api/market/lotto/today never mutates or notifies; restrict all state-advancing calls of evaluateSpxLotto to the authenticated cron worker.","commit":"91719cb","note":""},{"id":"f_11_1","dim":"NightHawk + Lotto Engines (edition builder/checkpoint-resume, lotto/power-hour engines, outcomes tracking, server-only, scheduling)","sev":"P1","cat":"reliability","eff":"M","conf":"high","title":"Lotto and Power Hour engines mutate shared state with no lock — unlike the main evaluator","location":"src/lib/spx-lotto-engine.ts (no lock); src/lib/spx-power-hour-engine.ts (no lock); src/app/api/cron/spx-evaluate/route.ts:66-69","evidence":"runSpxEvaluator uses `tryAcquireSpxEvaluateLock()` and returns `skipped: lock_held`, but in the same cron `Promise.all([evaluateSpxLotto(...), evaluateSpxPowerHour(...)])` runs with no advisory lock. grep for lock/mutex in both engine files returns nothing.","impact":"Overlapping cron ticks (the every-5-min schedule can overlap if a run is slow) or a cron tick racing an admin/public invocation will double-process the same record: duplicate BUY/SELL Discord notifications and duplicate or lost outcome rows, since the engines read-modify-write a single meta key without atomicity.","fix":"Wrap lotto and power-hour evaluation in the same advisory-lock pattern as runSpxEvaluator (a distinct lock key), or share one lock for the whole evaluate tick.","commit":"4b50971","note":""},{"id":"f_11_2","dim":"NightHawk + Lotto Engines (edition builder/checkpoint-resume, lotto/power-hour engines, outcomes tracking, server-only, scheduling)","sev":"P1","cat":"data-integrity","eff":"M","conf":"high","title":"Power Hour engine has zero outcomes tracking — win rate is unmeasurable","location":"src/lib/spx-power-hour-engine.ts:334-539","evidence":"grep for logLotto/insertLottoPlay/outcomes/insertPowerHour across the power-hour engine and store returns nothing. WATCH/HOLD/SELL transitions call savePowerHourRecord and notifyPlayDiscord but never persist a play row to any outcomes table.","impact":"Power hour BUY/SELL alerts are sent to subscribers but no win/loss record is ever written, so the platform cannot report or audit power-hour performance — directly undermining a real-money product's accountability and any displayed track record.","fix":"Add an outcomes logger parallel to spx-lotto-outcomes.ts (insert on WATCH/BUY, update on SELL with outcome win/stop) so power-hour results are durable and reportable.","commit":null,"note":""},{"id":"f_11_3","dim":"NightHawk + Lotto Engines (edition builder/checkpoint-resume, lotto/power-hour engines, outcomes tracking, server-only, scheduling)","sev":"P1","cat":"bug","eff":"M","conf":"high","title":"Admin 'dry-run' path mutates state and fires Discord for lotto + power hour despite read-only contract","location":"src/lib/admin-spx-dashboard.ts:190-200","evidence":"Comment: `// EDGE-10: dry-run path — read-only snapshot, no DB writes, no Discord.` Yet the same block calls `evaluateSpxLotto(merged, technicals)` and `evaluateSpxPowerHour(merged, technicals)` (lines 195-196), which both save records and call notifyPlayDiscord. Only the main play uses the genuinely read-only readSpxPlaySnapshot.","impact":"An operator opening the admin dashboard in dry-run expecting a non-mutating preview will silently advance lotto/power-hour state and fire live Discord buy/sell alerts to subscribers — the opposite of the documented behavior.","fix":"Provide read-only snapshot variants of evaluateSpxLotto/evaluateSpxPowerHour (no save, no notify) and call those in the dry-run branch.","commit":"0c46fc7","note":""},{"id":"f_12_0","dim":"Crons & Background Jobs","sev":"P1","cat":"reliability","eff":"M","conf":"high","title":"SPX play-engine advisory lock can leak permanently under connection pooling","location":"src/lib/db.ts:661-673 (tryAcquireSpxEvaluateLock / releaseSpxEvaluateLock); used in src/lib/spx-evaluator.ts:34-50","evidence":"tryAcquireSpxEvaluateLock runs `SELECT pg_try_advisory_lock($1)` via `(await getPool()).query(...)`, and releaseSpxEvaluateLock runs `SELECT pg_advisory_unlock($1)` via a SEPARATE `(await getPool()).query(...)`. Pool is created with `max: parseInt(process.env.PG_POOL_MAX ?? '5')` (db.ts:90). pg session-level advisory locks are bound to the specific backend connection; pool.query() checks out an arbitrary idle connection per call.","impact":"Acquire lands on connection A, release lands on connection B -> pg_advisory_unlock on B returns false and the lock on A is never released. Postgres holds session locks until that backend disconnects, and pooled connections are long-lived, so the SPX single-writer lock can be lost for the life of the process. Subsequent evaluator runs all return skipped:reason 'lock held by another instance' (spx-evaluator.ts:36) — the 0DTE play engine silently stops evaluating/mutating plays during market hours. Same class of bug in the generic acquireAdvisoryLock/releaseAdvisoryLock (db.ts:623-633).","fix":"Check out one client for the whole acquire->work->release lifecycle: `const c = await pool.connect(); try { lock on c; ...; } finally { unlock on c; c.release(); }`. Or switch to transaction-scoped pg_advisory_xact_lock inside a single BEGIN/COMMIT so the lock auto-releases on transaction end regardless of pooling.","commit":"a7fe184","note":""},{"id":"f_12_1","dim":"Crons & Background Jobs","sev":"P1","cat":"bug","eff":"S","conf":"high","title":"Night Hawk outcomes cron misses its window for ~4 months/year under EST (DST bug)","location":"railway.nighthawk-outcomes.toml:10 vs src/app/api/cron/nighthawk-outcomes/route.ts:12-22","evidence":"TOML fires `cronSchedule = \"30 20 * * 1-5\"` (20:30 UTC). The route's inOutcomeWindow() opens at NIGHTHAWK_OUTCOMES_HOUR_ET/MINUTE_ET default 16:30 ET with a 90-min catchup. 20:30 UTC = 16:30 EDT (summer, in window) but = 15:30 EST (winter), which is BEFORE the 16:30 ET window even with catchup.","impact":"During EST (~Nov-Mar) the single daily fire at 15:30 ET hits the route, gets skipped:reason 'Outside outcome window', and play target/stop outcomes are never resolved against next-day prices. Night Hawk performance stats silently rot for a third of the year. The registry stale_after_min is 36h so the watchdog won't even flag it as stale.","fix":"Either schedule a UTC time that covers both DST regimes (e.g. fire at both 20:30 and 21:30 UTC, route self-skips the wrong one), or widen the catchup window, or run the schedule off ET like the SPX cron does (span the UTC hour band). Mirror the EST/EDT-spanning approach already used in railway.spx-evaluate.toml.","commit":"d76c916","note":"Dual-band schedule 30 20,21 UTC + pure DST-aware inEtWindow (et-window.ts) used by the route. Unit test asserts EST/EDT/weekend/catchup."},{"id":"f_12_2","dim":"Crons & Background Jobs","sev":"P1","cat":"bug","eff":"S","conf":"high","title":"Night Hawk edition builder fires outside its ET window for ~4 months/year (DST bug)","location":"railway.nighthawk-playbook.toml:18 vs src/app/api/cron/nighthawk-edition/route.ts:16-26","evidence":"TOML fires `*/15 21-23 * * 1-5` (21:00-23:45 UTC). Route window opens at NIGHTHAWK_EDITION_HOUR_ET default 17:30 ET + 120min catchup (so 17:30-19:30 ET). 21-23 UTC = 17:00-19:45 EDT (summer, mostly in window) but = 16:00-18:45 EST (winter). In EST the cron stops firing at 18:45 ET while the window runs to 19:30 ET, and several early ticks (16:00-17:30 ET) are wasted skips. The file comment itself claims a '5:30-7:55 PM ET evening window'.","impact":"In EST the checkpoint-resumable Claude edition pipeline loses its last ~45 min of nudge ticks; a long build that needs the full window may fail to reach 'published'. The window also doesn't match the comment's stated 7:55 PM ET end. Combined with the no-cron-log gap below, failures here are easy to miss.","fix":"Extend the UTC band to cover both regimes (e.g. `*/15 21-24 * * 1-5` won't work as 24 is invalid — use `*/15 21-23,0 * * 1-5` or widen to 20-23) and/or run the editor off the route window with a wider catchup. Reconcile the comment, the route default (17:30), and the registry label (5:30 PM ET).","commit":"d76c916","note":"VERIFIED NON-ISSUE: the edition cron uses a ranged */15 21-23 UTC schedule that already covers 17:30 ET in BOTH EST and EDT; the route guard is DST-aware (etNowParts). Audit was stale on this one — no change needed."},{"id":"f_12_3","dim":"Crons & Background Jobs","sev":"P1","cat":"reliability","eff":"S","conf":"high","title":"uw-cache-refresh never logs a cron run — invisible to the watchdog","location":"src/app/api/cron/uw-cache-refresh/route.ts (whole file — no logCronRun import or call)","evidence":"Every other HTTP cron route calls logCronRun(...) on success and failure. uw-cache-refresh returns `NextResponse.json({ ok: true, refreshed, total })` (route.ts:111) and never imports or calls logCronRun. It IS registered in cron-registry.ts (key 'uw-cache-refresh', stale_after_min 10, market_hours_only).","impact":"buildCronHealthSnapshot will perpetually report this job as status 'unknown' / 'No runs logged'. The watchdog explicitly excludes 'unknown' from alerts (cron-staleness-watchdog/route.ts:30 comment), so if this cron dies the cache silently goes cold and UW live calls climb toward the 120/min plan cap with ZERO alerting. The job also swallows per-task failures (Promise.allSettled, only console.warn) so even a running-but-failing instance is invisible.","fix":"Wrap the route in logCronRun like the others, recording refreshed/total and marking ok:false (or at least a 'warning' meta) when failed>0 so partial cache-warm failures surface on the dashboard and to the watchdog.","commit":null,"note":""},{"id":"f_13_0","dim":"Frontend Architecture & Performance","sev":"P1","cat":"data-integrity","eff":"M","conf":"medium","title":"Isomorphic spx-desk-merge uses mutable module-level state, shared across concurrent server requests","location":"src/lib/spx-desk-merge.ts:75-213 (lastGoodStructure singleton, stickyStructureLevel, seedStructureCacheFromBase); consumed server-side in src/lib/spx-desk-loader.ts:36 (mergeDeskLayers inside loadMergedSpxDesk)","evidence":"const lastGoodStructure: {...} = { hod: null, ... } is a module singleton mutated by stickyStructureLevel: 'lastGoodStructure[key] = next'. mergeDeskLayers -> mergePulseIntoDesk reads/writes it, and spx-desk-loader.ts calls mergeDeskLayers(desk, flow, pulse) on the server for the /api/market/spx/merged route.","impact":"On the server (Railway Node worker handling many concurrent premium users), all requests share one lastGoodStructure object. SPX is a single symbol so values are usually identical, BUT the 'sticky' fallback means a transient null/zero pulse from one request can seed or be overwritten by another's data, and the file's own comment says it's a client-safe merge — running it server-side defeats the per-request isolation the design assumes. It also makes the cache reset (resetSpxDeskMergeCache on midnight) racy across requests. Low-frequency corruption of VWAP/HOD/EMA levels shown to traders.","fix":"Make the structure cache an explicit parameter/return value (pure function) rather than module state, or namespace it per-request on the server. On the server path, prefer the Redis-backed sticky state (already present via loadStructureFromRedis) and avoid the in-process singleton entirely. At minimum document that mergeDeskLayers is not concurrency-safe on the server.","commit":null,"note":""},{"id":"f_13_1","dim":"Frontend Architecture & Performance","sev":"P1","cat":"performance","eff":"M","conf":"high","title":"Zero code-splitting: no next/dynamic or React.lazy anywhere; framer-motion + recharts eagerly bundled","location":"whole repo (grep for dynamic(/next/dynamic/React.lazy = 0 matches); recharts static-imported in src/components/desk/FlowMomentumChart.tsx, src/components/desk/DarkPoolPanel.tsx, src/components/embeds/FlowVolumeChart.tsx; framer-motion imported in FlowFeed.tsx, CustomCursor.tsx, FlowAlertStream.tsx, SpxCommentaryRail.tsx and many more","evidence":"grep 'dynamic\\(|next/dynamic|React.lazy' across src returned 'No matches found'. package.json deps include framer-motion ^11, recharts ^2.12, @clerk/nextjs, lucide-react — all heavy. recharts is a static `from \"recharts\"` import in 3 desk/embed components.","impact":"recharts (~90-130KB gz) and framer-motion (~50KB+) ship in the initial client chunks for routes that may not paint a chart above the fold (e.g. /flows loads FlowMomentumChart + DarkPoolPanel recharts even though they're in a secondary right rail). Larger TTI/JS payload on every premium route, worse on mobile.","fix":"Wrap chart-heavy + below-the-fold components in next/dynamic({ ssr:false, loading:Skeleton }) — at least the recharts components (FlowMomentumChart, DarkPoolPanel, FlowVolumeChart) and the decorative DnaHelixBackground/SpxSniperBackdrop. Consider lazy-loading the admin dashboards which are never seen by normal users.","commit":null,"note":""},{"id":"f_13_2","dim":"Frontend Architecture & Performance","sev":"P1","cat":"performance","eff":"S","conf":"high","title":"writeSessionCache called as a side-effect inside useMemo, serializing the full desk to sessionStorage every pulse tick","location":"src/hooks/useMergedDesk.ts:128-162 (the `merged` useMemo) — `deskStable.current = out; writeSessionCache(DESK_CACHE_KEY, out);`","evidence":"Inside useMemo(() => {...}, [desk, flow, pulse]) the code performs `writeSessionCache(DESK_CACHE_KEY, out)`. writeSessionCache does sessionStorage.setItem(..., JSON.stringify(envelope)). The desk object is large (~60 fields incl unified_tape, gex_walls, spx_flows, strike_stacks, net_prem_ticks arrays per signalDeskStub).","impact":"During RTH the pulse memo recomputes on every SSE/REST tick (as fast as 1s). Each recompute synchronously JSON.stringifies a large object and writes it to sessionStorage on the main thread — a blocking op that scales with tape size and can cause jank. Side-effects in useMemo are also a React anti-pattern (won't run if React bails out of the memo, and runs during render).","fix":"Move the writeSessionCache/deskStable.current assignment into a useEffect keyed on `merged`, and throttle persistence (e.g. write at most every 5-10s, or only on visibilitychange/unmount). Keep useMemo pure.","commit":null,"note":""},{"id":"f_15_0","dim":"Observability & Telemetry","sev":"P1","cat":"security","eff":"S","conf":"medium","title":"API error response bodies (response_snippet) are persisted, streamed, and rendered without any sanitization","location":"src/lib/api-tracked-fetch.ts:44-52,101; src/lib/api-telemetry-persist.ts:38; src/components/admin/AdminApiEventDetail.tsx:139","evidence":"readSnippet() returns res.clone().text().slice(0,600) raw; it is stored as response_snippet (api-telemetry-persist.ts:38 inserts event.response_snippet with NO sanitize call), streamed full over SSE (stream/route.ts:37,49), and rendered raw: '\u003cpre>{detail.event.response_snippet}\u003c/pre>'. URL, body, and headers are all sanitized — only the response body is not.","impact":"Provider error responses frequently echo request context, auth hints, or signed/temporary tokens. Unlike the scrubbed URL/body/headers, the raw response is written to Postgres (durable), pushed to every connected admin SSE client, and shown verbatim in the dashboard — a secret-exposure path that bypasses the otherwise-complete redaction layer.","fix":"Add a sanitizeTelemetrySnippet() (reuse the apiKey/token/bearer regexes plus a generic Bearer/JWT pattern) and apply it in readSnippet() or recordApiCall() before the snippet is ever stored/emitted, mirroring how request_url/request_body are scrubbed.","commit":null,"note":""},{"id":"f_15_1","dim":"Observability & Telemetry","sev":"P1","cat":"reliability","eff":"M","conf":"high","title":"Whop billing webhook has zero telemetry and never raises an incident or alert","location":"src/app/api/webhook/whop/route.ts:22-68","evidence":"The membership.activated/deactivated handler does not call recordApiCall, recordAdminRouteError, syncAdminIncidents, or notifyOpsDiscord. Failures only console.error (e.g. line 64 '[whop webhook]', and the WHOP_WEBHOOK_SECRET-missing drop at line 26 returns HTTP 200). syncWhopMembershipForEmail errors are swallowed into a 500 with no operator-visible signal.","impact":"This is the money path (entitlement grant/revoke). If signature verification, the Whop SDK, or membership sync breaks, paying users silently lose access or churned users keep access — and nothing appears on the admin health dashboard, incidents list, or Discord. The operator finds out from customer complaints.","fix":"Wrap the handler in recordApiCall(provider:'blackout_engine', endpoint:'webhook/whop', ...) on failure and feed a syncAdminIncidents/notifyOpsDiscord critical alert when secret is missing or sync throws, so billing failures surface like other incidents.","commit":null,"note":""},{"id":"f_15_2","dim":"Observability & Telemetry","sev":"P1","cat":"cost","eff":"M","conf":"high","title":"No AI cost or token-usage telemetry — Anthropic calls are recorded as latency-only","location":"src/lib/providers/anthropic.ts:44-95","evidence":"withTelemetry records status:200/ok:true with latency_ms but discards the Anthropic response's usage block (input_tokens/output_tokens/cache tokens). No field in ApiCallEvent captures tokens or cost. Largo/commentary run Sonnet/Haiku in multi-round tool loops with MAX_TOOL_RESULT_CHARS=16000 re-sent every round.","impact":"For a real-money SaaS, AI spend is completely unmonitored. A runaway tool loop, prompt-bloat regression, or model-pricing change produces no signal until the Anthropic bill arrives. There is no per-feature cost attribution and no alerting threshold on spend.","fix":"Capture result.usage in withTelemetry, add token/cost fields to ApiCallEvent + the telemetry table, compute estimated cost per model, and surface daily AI spend (with a threshold alert) on the admin API dashboard.","commit":null,"note":""},{"id":"f_15_3","dim":"Observability & Telemetry","sev":"P1","cat":"reliability","eff":"M","conf":"high","title":"No external error tracking or distributed tracing — all observability is in-process and lost on restart","location":"src/lib/api-telemetry.ts:37-48; src/lib/admin-route-errors.ts:3-4","evidence":"events ring buffer is capped at MAX_EVENTS=800 and admin-route-errors keeps only MAX=40, both in module-level arrays; processStartTime comment states 'data from before the last cold start is not available'. grep for sentry|datadog|opentelemetry|bugsnag|rollbar across the repo finds zero deps (the globals.css/package-lock hits are incidental). Unhandled exceptions outside trackedFetch/admin routes are not captured anywhere.","impact":"On Railway with restarts/redeploys and potentially multiple replicas, post-mortem data evaporates. Errors thrown in React server components, middleware, cron bodies, or any code path that does not flow through trackedFetch/recordAdminRouteError are invisible. No stack traces, no alerting on unhandled rejections, no cross-replica aggregation (Redis flush only carries counts, not error detail).","fix":"Add a lightweight error sink (Sentry or even a persisted errors table fed by a global process.on('unhandledRejection')/Next instrumentation hook) so crashes outside the telemetry path are captured and survive restarts.","commit":null,"note":""},{"id":"f_16_0","dim":"Code Quality & Tech Debt","sev":"P1","cat":"tech-debt","eff":"L","conf":"high","title":"Zero automated tests across the entire money/billing/signal codebase","location":"whole repo: package.json (no jest/vitest/playwright in deps, no `test` script); no *.test.ts / *.spec.ts / __tests__ anywhere in src","evidence":"`grep -iE \"jest|vitest|mocha|playwright|cypress|testing-library\" package.json` => NO TEST RUNNER. Find for *.test.* / *.spec.* / __tests__ returns nothing. package.json scripts has only dev/build/start/lint and docs generators.","impact":"This is a real-money 0DTE options SaaS. Tier resolution (membership.ts/whop.ts), P&L math (spx-play-outcomes.ts pnl_pts/mfe/mae), strike selection (spx-play-options.ts), session-guard logic, and optimistic-concurrency merges all ship with no regression net. A one-character change to round5 or todayEt or a merge predicate can silently corrupt trade outcomes or re-allow a buy after a stop, with no test to catch it.","fix":"Add a test runner (vitest fits Next 14/tsx already present). Prioritize pure-logic units first: tier resolution from memberships, pnl/mfe/mae math, strike/round helpers, session-meta merge (mergeSessionMeta), and the membership reconcile direction logic. These are deterministic and high-blast-radius; even 30-40 unit tests would cover most money-critical paths.","commit":null,"note":""},{"id":"f_16_1","dim":"Code Quality & Tech Debt","sev":"P1","cat":"bug","eff":"M","conf":"high","title":"`todayEt()` date helper copy-pasted in ~15 files — timezone/session-boundary risk","location":"src/lib/spx-play-store.ts:56, spx-lotto-store.ts:40, spx-power-hour-store.ts:32, spx-play-claude.ts:34, spx-play-session-guards.ts, spx-lotto-engine.ts, spx-power-hour-engine.ts, nighthawk/session.ts, providers/spx-session.ts, admin-spx-dashboard.ts, session-cache.ts and more (15 definitions total)","evidence":"Identical body repeated: `return new Intl.DateTimeFormat(\"en-CA\", { timeZone: \"America/New_York\" }).format(new Date());`. Confirmed verbatim copies in spx-play-store.ts, spx-lotto-store.ts, spx-power-hour-store.ts, spx-play-claude.ts.","impact":"In a 0DTE app the trading session date is the partition key for plays, lotto records, outcomes and caches. 15 independent copies mean any future fix (DST edge, pre-4am ET rollover, market-holiday handling) must be applied 15 times; missing one silently splits state across two 'days' and can drop or duplicate a play/outcome. This is the single most duplicated load-bearing function in the repo.","fix":"Extract one canonical `todayEt()` (and the session-date logic) into a shared module e.g. src/lib/et-date.ts and import everywhere; delete the 15 local copies. Then it is also unit-testable in one place.","commit":null,"note":""},{"id":"f_16_2","dim":"Code Quality & Tech Debt","sev":"P1","cat":"reliability","eff":"M","conf":"medium","title":"DB read failures silently swallowed and replaced with clean defaults in session-guard path","location":"src/lib/spx-play-store.ts:158-160 (loadPlaySessionMeta), spx-lotto-store.ts:63, spx-power-hour-store.ts:52, plus ~72 catch blocks that return null/default with no logging","evidence":"loadPlaySessionMeta ends `} catch { return { last_buy_at: null, last_sell_at: null, last_sell_was_loss: false, last_direction: null, last_stop_at: null }; }`. ~72 of 210 catch blocks across src/lib are `catch { return null }` / `catch { /* ignore */ }` with no log.","impact":"A transient Postgres/PgBouncer error makes the session-guard read return a pristine 'no buys, no stops today' state. Guards keyed on last_buy_at/last_sell_was_loss/last_stop_at (cooldowns, re-entry-after-stop blocks) can then mis-fire and re-arm an entry that should be suppressed — a money-relevant behavior change triggered by an infra blip, with no telemetry to even notice it happened.","fix":"In load*SessionMeta/record catches, log at error level (these already log elsewhere) and prefer the in-memory last-known value over a clean default; consider surfacing a 'degraded' flag so engines can choose to hold rather than act on assumed-empty guard state. Audit the ~72 silent catches and at minimum add a console.warn with context so outages are observable.","commit":null,"note":""},{"id":"f_17_0","dim":"Product & Service Enhancements","sev":"P1","cat":"enhancement","eff":"L","conf":"high","title":"No personalized alerts — every trade signal goes to one shared Discord webhook","location":"src/lib/spx-play-notify.ts:3-31 (notifyPlayDiscord), :12 DISCORD_PLAY_WEBHOOK_URL","evidence":"notifyPlayDiscord posts to a single env var: `const url = process.env.DISCORD_PLAY_WEBHOOK_URL?.trim(); ... await fetch(url, {method:'POST', body: JSON.stringify({content: ...})})`. There is no per-user alert delivery anywhere in the repo (grep for push/sms/telegram/PushSubscription/VAPID returns no user-targeted delivery).","impact":"For a real-money 0DTE product, timely BUY/TRIM alerts ARE the product. A single shared channel means no per-user routing, no tier-differentiated alerts, no preference filtering (e.g. 'only A-grade plays', 'only my tickers'), and no way to monetize an alert tier. This is the #1 retention and upsell lever left on the table.","fix":"Add a per-user alert subscription model: store delivery prefs in Postgres, deliver via web push (VAPID) + optional SMS/Telegram, gated by tier. Let users filter by grade/direction/ticker. Reuse the existing play-engine emit point (call sites of notifyPlayDiscord) as the fan-out source.","commit":null,"note":""},{"id":"f_17_1","dim":"Product & Service Enhancements","sev":"P1","cat":"enhancement","eff":"M","conf":"high","title":"Win-rate / track record is captured but never shown to users — buried in admin only","location":"src/app/api/market/spx/outcomes/route.ts (fetchPlayOutcomeStats), src/components/admin/AdminSpxDashboard.tsx; surfaced only in src/components/admin/*","evidence":"fetchPlayOutcomeStats + fetchRecentPlayOutcomes return real win/loss/PnL stats, but the only components referencing 'outcomes/win-rate/track-record' are under src/components/admin/. The user-facing SpxDayPerformancePanel.tsx shows only today's P&L, not a historical, audited record.","impact":"A transparent, timestamped track record is the single highest-converting trust signal for a signal-selling SaaS — it directly drives free→paid conversion and reduces churn ('is this worth $79.99/mo?'). The data already exists; not surfacing it leaves the strongest sales asset unused and invites skepticism.","fix":"Build a public/teaser 'Track Record' page from fetchPlayOutcomeStats + Night Hawk outcomes: rolling win rate, avg MFE/MAE, equity curve, per-grade breakdown. Show a blurred/limited version to free users as a conversion hook; full history to premium.","commit":null,"note":""},{"id":"f_17_2","dim":"Product & Service Enhancements","sev":"P1","cat":"enhancement","eff":"M","conf":"high","title":"No free trial or preview — entire dashboard hard-gated, killing the conversion funnel","location":"src/app/dashboard/page.tsx:9 (requireTier('premium')), src/components/landing/PricingSection.tsx:10-19, src/app/upgrade/page.tsx","evidence":"dashboard/page.tsx opens with `await requireTier('premium')` — full gate, no preview. PricingSection's Free tier lists only 'Community landing & updates' and 'Create your account'; every real feature is `active: false`. No trial/refund logic exists (grep for trial/7-day/14-day/money-back finds only unrelated retention windows).","impact":"New options traders can't experience the product before a $79.99/mo Whop commitment. A hard wall with zero hands-on preview is a major top-of-funnel leak; competitors offer trials or freemium tiers and win the comparison.","fix":"Add a time-boxed trial (Whop trial product or a delayed/throttled free tier: e.g. 15-min-delayed HELIX tape, 1 Largo query/day, yesterday's plays). Gate live/real-time behind premium. This converts the existing rich feature set into a funnel instead of a wall.","commit":null,"note":""},{"id":"f_17_3","dim":"Product & Service Enhancements","sev":"P1","cat":"enhancement","eff":"M","conf":"high","title":"No mobile push / PWA — 0DTE users live on their phones during market hours","location":"public/ (only icon-192.png; no manifest.webmanifest or sw.js), src/app/layout.tsx (no manifest/serviceWorker registration)","evidence":"public/ contains icon-192.png but no web app manifest and no service worker; grep for manifest/serviceWorker/registerSW across src finds nothing. The in-app alert is a WebAudio beep that only fires while the tab is open and focused (src/components/desk/SpxTradeAlerts.tsx:23 playDeskAlert).","impact":"0DTE decisions are time-critical and most users are mobile during the session. Without installable PWA + push, a BUY signal is silent the moment the user isn't staring at the open tab — directly undermining the product's core value and retention.","fix":"Ship a PWA: add manifest.webmanifest + icons + a service worker, and implement web-push (VAPID) tied to the per-user alert model. This is the mobile-native delivery channel the product currently lacks.","commit":null,"note":""},{"id":"f_17_4","dim":"Product & Service Enhancements","sev":"P1","cat":"cost","eff":"S","conf":"high","title":"Largo LLM has a concurrency gate but no per-user daily/token budget — unbounded cost exposure","location":"src/app/api/market/largo/query/route.ts:30-49 (acquireLargoSlot, MAX_LARGO_CONCURRENT=2)","evidence":"The only limit is `MAX_LARGO_CONCURRENT = 2` simultaneous queries per user (Redis INCR/EXPIRE). There is no daily query cap or token budget — grep for largo:daily/daily-cap/MAX_DAILY/usage-limit returns nothing. A premium user can run unlimited sequential Sonnet-4.6 tool-loop queries.","impact":"Largo runs claude-sonnet-4-6 with multi-round tool use (the most expensive surface). A heavy or scripted user can drive COGS well past their $79.99/mo, eroding margin; there's also no usage signal to power a metered upsell tier.","fix":"Add a Redis-backed per-user daily query counter (and optionally a monthly token budget) alongside the existing concurrency gate; return a soft-limit message and surface 'queries remaining' in the UI. This both caps cost and creates a natural premium/elite upsell ('unlimited Largo').","commit":null,"note":""},{"id":"x_0","evidence":"","extra":true,"note":"","dim":"Cross-Tool Access (post-audit)","sev":"P1","cat":"AI / Data Lifecycle","eff":"M","conf":"high","title":"Macro/FOMC calendar now reaches Largo + Night Hawk (was dropped by formatters)","location":"largo-live-feed.ts, nighthawk/format.ts","impact":"Largo was only macro-aware on news-intent questions; Night Hawk dropped impact labels.","fix":"Render macro_events in the Largo SPX block + label impact in Night Hawk.","commit":"5c2199f"},{"id":"x_1","evidence":"","extra":true,"note":"","dim":"Cross-Tool Access (post-audit)","sev":"P1","cat":"AI / Data Lifecycle","eff":"S","conf":"high","title":"SPX desk AI (Slayer) can no longer contradict the engine’s own open play","location":"commentary/route.ts, spx-commentary.ts","impact":"Desk AI could say LONG while the engine held an open SHORT — worst trust failure.","fix":"Wire live_spx_play into the commentary + hard rule to align-or-flag.","commit":"4a323d7"},{"id":"x_5","evidence":"","extra":true,"note":"","dim":"Validation / Drill-down Checks (post-audit)","sev":"P1","cat":"Prod Verification","eff":"S","conf":"high","title":"CHECK: confirm nighthawk-outcomes actually fires under EST + Railway dashboard is not overriding the TOML","location":"railway.nighthawk-outcomes.toml, Railway dashboard config-as-code","impact":"If the cronSchedule was set in the dashboard UI it overrides the TOML, so the dual-band fix would not take effect.","fix":"Confirm the service reads railway.nighthawk-outcomes.toml; watch a winter (EST) run resolve outcomes at 21:30 UTC.","commit":null},{"id":"f_0_5","dim":"Auth & Authorization","sev":"P2","cat":"reliability","eff":"S","conf":"medium","title":"Whop webhook silently drops events (returns 200) when secret is unset","location":"src/app/api/webhook/whop/route.ts:22-31","evidence":"if (!process.env.WHOP_WEBHOOK_SECRET?.trim()) { console.error('[whop webhook] REQUEST DROPPED ...'); return NextResponse.json({ ok: true, warning: 'webhook_secret_not_configured' }, { status: 200 }); } — confirmed; the only failure signal is console.error (plus a module-load startup warning at lines 14-20).","impact":"If WHOP_WEBHOOK_SECRET is ever missing/rotated incorrectly, every membership.activated/deactivated event is acknowledged with 200 and discarded — Whop will not retry, so paid users get locked out and churned users keep premium until the membership-reconcile cron heals it. Failure is invisible except in logs.","fix":"Keep the 200 to avoid Whop retry storms, but emit a loud, alertable signal (increment an error metric / page the operator) rather than only console.error, and surface secret-misconfiguration in the admin cron-health dashboard so drift is caught fast.","commit":"e87fe97","note":"Added notifyOpsDiscord (critical, fire-and-forget) on the missing-secret path; 200 contract preserved."},{"id":"f_1_1","dim":"Webhook & Billing Integrity (Whop/Clerk)","sev":"P2","cat":"bug","eff":"S","conf":"high","title":"Membership sort tiebreak does string subtraction on created_at → always NaN, tiebreak silently never works","location":"src/lib/membership.ts:109-111","evidence":"`const aTs = (a as unknown as { created_at?: number }).created_at ?? 0; const bTs = (b as unknown as { created_at?: number }).created_at ?? 0; return bTs - aTs;` — but the Whop SDK types created_at as `created_at: string` (ISO-8601), confirmed at node_modules/@whop/sdk/resources/memberships.d.ts:201. The `as unknown as { created_at?: number }` cast hides the real string type; subtracting two ISO strings yields NaN, so the comparator returns NaN and the tiebreak is a no-op.","impact":"When a user holds two or more memberships in the SAME status bucket (e.g. two active plans, or two completed lifetime purchases), the 'prefer most recently created' tiebreak does nothing and sortedMemberships[0] is effectively arbitrary. Because activeMembership = sortedMemberships[0] is written to Clerk as whop_user_id / whop_membership_id, the stored membership pointer can be the stale one. Tier itself is unaffected (resolveTierFromMemberships ORs across all memberships), so this is metadata-pointer correctness, not an access bug — and it self-corrects on the next re-sync once the ordering source is fixed. Downgraded from P1 to P2 accordingly.","fix":"Parse the timestamp before subtracting and drop the bogus numeric cast so the real string type is honored: `const aTs = Date.parse(a.created_at ?? '') || 0; const bTs = Date.parse(b.created_at ?? '') || 0; return bTs - aTs;`.","commit":null,"note":""},{"id":"f_1_2","dim":"Webhook & Billing Integrity (Whop/Clerk)","sev":"P2","cat":"tech-debt","eff":"S","conf":"high","title":"Dead/misleading x-whop-signature guard — real verification depends on entirely different headers","location":"src/app/api/webhook/whop/route.ts:36-44","evidence":"The comment claims 'some SDK versions silently skip HMAC verification when the header is absent' and the code rejects on missing x-whop-signature. But unwrap() delegates to standardwebhooks, which reads webhook-id / webhook-signature / webhook-timestamp (node_modules/standardwebhooks/dist/index.js verify()) and throws 'Missing required headers' if any are absent. x-whop-signature is never consulted. Verification is in fact unconditional here because route.ts always passes a headers object to unwrap (webhooks.js:14 only skips verify when headers is undefined, which never happens on this path).","impact":"False sense of security and a confusing maintenance signal: the guard provides zero actual protection, and a legitimate request lacking x-whop-signature (Whop uses the standard-webhooks header set) would be 401'd before unwrap even runs. Net effect today is benign because Whop sends compatible headers, but the code documents a verification model that does not exist.","fix":"Remove the x-whop-signature pre-check (or replace it with a fast presence check on webhook-id/webhook-signature/webhook-timestamp) and correct the comment. Verification is already guaranteed by unwrap() throwing on bad/missing standard-webhooks headers, provided the headers object is always passed (it is).","commit":null,"note":""},{"id":"f_1_3","dim":"Webhook & Billing Integrity (Whop/Clerk)","sev":"P2","cat":"security","eff":"M","conf":"high","title":"Middleware security-model comment is stale and incorrect — references isPublicRoute/isPremiumRoute that do not exist","location":"src/middleware.ts:19-40","evidence":"The comment describes a 'DENY-LIST (protected by default)' model and instructs 'To make a new route public you MUST add it to isPublicRoute above' and 'premium-gated ... isPremiumRoute above', but the only matcher defined is isProtectedRoute (7 page-route patterns), and the middleware calls auth().protect() ONLY for those (src/middleware.ts:3-17). clerkMiddleware does not auto-protect unlisted routes; it only attaches auth context. Confirmed via grep: isPublicRoute/isPremiumRoute appear only inside comments.","impact":"A maintainer trusting the comment would believe /api/* is 'PROTECTED by default' and might add a sensitive billing/membership route assuming middleware blocks it — when in reality every API route's security depends entirely on its own per-route auth() check. For the webhook this is correct-by-accident (it must be public and does its own HMAC check; sync does its own auth()), but the documented invariant is false and is a latent foot-gun for future billing endpoints.","fix":"Either implement the documented allow/deny model (add isPublicRoute + an else-branch that protects all non-public API routes) or rewrite the comment to state the truth: middleware only protects the listed page routes; all API routes self-authorize. Given billing endpoints live under /api, the explicit-protect model is the safer fix.","commit":null,"note":""},{"id":"f_1_4","dim":"Webhook & Billing Integrity (Whop/Clerk)","sev":"P2","cat":"cost","eff":"S","conf":"medium","title":"User-triggered /api/membership/sync has no rate limiting — amplifies into many Whop+Clerk API calls per request","location":"src/app/api/membership/sync/route.ts:5-30 + src/components/SyncMembershipButton.tsx:18","evidence":"The POST handler authenticates the session (auth()) then calls syncWhopMembershipForEmail with no throttle. That function does a paginated whop.members.list, a paginated whop.memberships.list, a findClerkUsersByEmail, and a Clerk updateUserMetadata per matched user (membership.ts:77-127). The button only guards against double-submit with a `loading` flag (SyncMembershipButton.tsx:10,18) — no real cooldown.","impact":"Any authenticated user can hammer the endpoint (curl loop or repeated clicks across tabs), each request fanning out to multiple paginated Whop API calls plus Clerk writes. Whop and Clerk enforce their own rate limits; sustained abuse could exhaust them and degrade legitimate billing sync — the same Clerk Backend API limit that requireTierApi's 60s tier cache was built to protect (market-api-auth.ts:28-29).","fix":"Add a short per-user server-side cooldown, e.g. Redis SETNX `membership-sync:{userId}` with a 30-60s TTL returning 429 if present. The platform already uses ioredis, so this is cheap.","commit":"0bd6862","note":"Per-user Redis SET NX EX cooldown (45s, 429 + Retry-After) inserted after the 401 auth check + before the Whop/Clerk fan-out; FAILS OPEN on Redis outage. membership-sync-limit.test.ts covers fail-open."},{"id":"f_2_2","dim":"Database (Postgres/pg)","sev":"P2","cat":"security","eff":"S","conf":"high","title":"deleteOlderThan() interpolates table/column/days directly into a DELETE","location":"src/app/api/cron/db-cleanup/route.ts:36-41","evidence":"`DELETE FROM ${table} WHERE ${column} \u003c NOW() - INTERVAL '${days} days' RETURNING 1` — identifiers and the days value are template-literal-interpolated, not parameterized.","impact":"Currently safe because all callers pass hardcoded string literals (lines 55-75), so there is no live injection. But it is an injection-shaped helper one careless future caller away from a SQL-injection / data-loss bug on a DELETE statement, and it can't be parameterized as written without an interval cast.","fix":"Validate table/column against an allow-list (or pg-format %I) and parameterize the window as `NOW() - ($1::int || ' days')::interval` with `[days]` — the same pattern already used safely in fetchRecentFlows (db.ts:709) and the analytics queries.","commit":null,"note":""},{"id":"f_2_4","dim":"Database (Postgres/pg)","sev":"P2","cat":"cost","eff":"M","conf":"medium","title":"High-write outcome/edition tables have no retention pruning; admin rollups scan them unbounded","location":"src/app/api/cron/db-cleanup/route.ts:43-87; fetchSpxAdminRollups db.ts:1294-1370","evidence":"runCleanup prunes only 7 tables (api_telemetry_events, flow_alerts, cron_job_runs, spx_signal_log, nighthawk_dossiers_staging, nighthawk_job_log, admin_audit_log). spx_play_outcomes, nighthawk_play_outcomes, nighthawk_editions, lotto_plays are never deleted. fetchSpxAdminRollups runs full-table GROUP BYs over spx_play_outcomes with `WHERE outcome \u003c> 'open'` and no time bound (db.ts:1294-1306 grade rollup, 1308-1318 exit rollup, 1358-1370 avg rollup).","impact":"spx_play_outcomes accumulates one row per closed play indefinitely and is fully scanned by several admin-rollup GROUP BYs with no time filter. Over months/years this grows admin-dashboard query cost and storage unbounded — a slow cost/perf creep rather than data loss.","fix":"Add explicit retention (or archival) for spx_play_outcomes / nighthawk_play_outcomes / nighthawk_editions, or bound the unbounded admin rollups by a time window (e.g. last 180 days via a closed_at/session_date filter) so they don't degrade as history grows.","commit":null,"note":""},{"id":"f_3_4","dim":"Redis & Caching","sev":"P2","cat":"performance","eff":"M","conf":"high","title":"Seven independent ioredis connections per process — connection bloat and duplicated factories","location":"src/lib/shared-cache.ts:32; src/lib/redis-pubsub.ts:32, 65; src/lib/providers/uw-shared-cache.ts:56; src/lib/providers/uw-rate-limiter.ts:53; src/lib/spx-commentary-limits.ts:44; src/lib/api-telemetry-redis.ts:55","evidence":"Six modules each instantiate their own singleton `new Redis(url, ...)`, plus redis-pubsub creates a separate publisher and subscriber (lines 32, 65) — 7 connections per Node process. Each duplicates the same maxRetriesPerRequest/lazyConnect/connectTimeout boilerplate.","impact":"Pub/sub legitimately needs its own dedicated connection (a subscribed client can't run normal commands), but the other five command clients could share one. On Railway with multiple replicas this multiplies connection count against the Redis plan's `maxclients` and adds FD/memory overhead. The duplicated factories are also where the missing error handler (P0) gets re-omitted each time.","fix":"Extract one shared command client (used by shared-cache, uw-shared-cache, uw-rate-limiter, spx-commentary-limits, api-telemetry-redis) behind a single `getRedis()` factory; keep the pub/sub publisher+subscriber separate. The factory centralizes the error-handler fix and the backoff pattern.","commit":null,"note":""},{"id":"f_4_2","dim":"API Routes — Correctness & Robustness","sev":"P2","cat":"reliability","eff":"S","conf":"high","title":"Admin SSE stream throws uncaught on every heartbeat after client disconnect","location":"src/app/api/admin/apis/stream/route.ts:30-59","evidence":"send() calls controller.enqueue() with NO try/catch and there is no `closed` flag or req.signal handling. After a client disconnects, cancel() clears the heartbeat, but if enqueue ever throws before cancel fires, the 8s heartbeat setInterval keeps calling enqueue on a closed controller — an unhandled throw inside a timer callback. Contrast market/flows/stream which has a `closed` flag and try/catch in send().","impact":"Unhandled rejections/exceptions from timer callbacks on disconnected admin SSE clients; noisy logs and potential timer leaks. Lower blast radius (admin-only) but inconsistent with the hardened flows/stream pattern.","fix":"Adopt the flows/stream pattern: a `closed` flag, try/catch around enqueue that triggers cleanup, and listen to req.signal 'abort'. Factor a shared SSE helper so all four stream routes get identical lifecycle handling.","commit":null,"note":""},{"id":"f_4_3","dim":"API Routes — Correctness & Robustness","sev":"P2","cat":"performance","eff":"M","conf":"high","title":"Pulse SSE stream has no connection cap and polls Redis every 250ms per connection","location":"src/app/api/market/spx/pulse/stream/route.ts:50,16-48","evidence":"interval = setInterval(() => { void send(); }, 250) — each connection issues a Redis GET('spx:pulse:snapshot') + JSON.parse every 250ms. Unlike market/flows/stream (MAX_STREAMS cap + closed flag), this route has no activeStreams cap and no req.signal abort handling; cleanup relies solely on cancel().","impact":"N concurrent dashboard tabs = N*4 Redis GETs/sec against a single shared key. With many premium users this is significant Redis load and unbounded fd/timer growth with no backpressure.","fix":"Add an activeStreams cap (reuse SSE_MAX_STREAMS) returning 503 when exceeded; consider a single shared poller broadcasting to all subscribers (pub/sub) instead of per-connection 250ms polls; add a `closed` flag and req.signal handling.","commit":null,"note":""},{"id":"f_4_4","dim":"API Routes — Correctness & Robustness","sev":"P2","cat":"security","eff":"S","conf":"medium","title":"Cron auth uses non-constant-time secret comparison","location":"src/lib/market-api-auth.ts:5-10","evidence":"return authHeader === secret; — the Bearer CRON_SECRET is compared with plain === across every cron route (flow-ingest, spx-evaluate, db-cleanup, watchdog, etc.).","impact":"JS string === short-circuits on first differing byte, leaking timing about the secret. Remote timing attacks over the network are noisy/impractical, but constant-time comparison is the standard for shared-secret auth on internet-facing endpoints.","fix":"Use crypto.timingSafeEqual on equal-length buffers (guard length first). Cheap, removes the timing side-channel for all cron routes at once.","commit":"345c2be","note":""},{"id":"f_4_5","dim":"API Routes — Correctness & Robustness","sev":"P2","cat":"bug","eff":"S","conf":"high","title":"Incident POST treats any non-'ack' action as 'resolve'","location":"src/app/api/admin/incidents/route.ts:34-37","evidence":"if (body.action === 'ack') { ok = await ackAdminIncident(...) } else { ok = await resolveAdminIncident(...) }. The type says action?: 'ack' | 'resolve' but runtime never validates — action:'typo' silently resolves the incident.","impact":"A malformed/typo'd admin action resolves (closes) an incident instead of erroring, hiding an unresolved production incident. Admin-only, so low exploit risk, but a real correctness/data-integrity gap.","fix":"Explicitly validate: if (body.action !== 'ack' && body.action !== 'resolve') return 400. Only call resolve on action === 'resolve'.","commit":null,"note":""},{"id":"f_5_0","dim":"Realtime / WebSockets / SSE","sev":"P2","cat":"performance","eff":"S","conf":"high","title":"Redis pub/sub self-delivery double-fans every flow on the ingesting instance","location":"src/lib/flow-events.ts:30-40, 53-59","evidence":"publishFlowEvent() calls fanOutLocal(flow) directly (line 54) AND redisPublish(...) (line 56). The subscriber callback (lines 30-40) also calls fanOutLocal(flow) on every received message. ioredis PUBLISH on the same channel delivers to the same process's subscriber client, so on the instance that ingests UW flow every event is fanned out to local SSE clients twice. There is no origin/message-id guard.","impact":"On the ingest instance each flow is pushed to every connected SSE client twice (one local, one round-tripped through Redis), doubling SSE write work and Redis traffic on the busiest instance and inflating received_via_redis. Users don't see dupes only because the client dedupes via seenRef — a hidden correctness dependency that
