# Railway config for the GEX-EOD-Snapshot cron service.
# Wire it up: service Settings -> Config-as-code -> set path to "railway.gex-eod-snapshot.toml"
# Requires CRON_SECRET on this service (same value as blackout-web).
[build]
builder = "nixpacks"
buildCommand = "echo 'cron trigger service: no app build needed'"
# Only redeploy this trigger service when its OWN driver/config changes — NOT on docs/src/
# log commits. Without this, EVERY repo commit (incl. the frequent autonomous-SDLC docs/auto
# log pushes) redeployed all cron trigger services, stalling the every-minute warm writers
# ~15-21 min mid-RTH and tripping the cron-staleness watchdog. This service only runs
# scripts/hit-cron.mjs — ALL business logic lives in the main blackout-web app it pings —
# so it only needs to redeploy when hit-cron.mjs or this TOML changes. Mirrors railway.toml's
# proven repo-relative-glob watchPatterns (a leading-slash "/**" matches NOTHING on Railway).
watchPatterns = [
  "scripts/hit-cron.mjs",
  "railway.gex-eod-snapshot.toml",
  "nixpacks.toml",
]

[deploy]
startCommand = "node scripts/hit-cron.mjs /api/cron/gex-eod-snapshot"
# Post-close EOD GEX close snapshot. 20:10 + 21:10 UTC both land at 16:10 ET — the first in EDT
# (UTC-4: 20:10 UTC = 16:10 ET), the second in EST (UTC-5: 21:10 UTC = 16:10 ET) — so the snapshot
# always fires ~10 min after the 16:00 ET close regardless of DST. appendGexEodSnapshot is
# idempotent per ET trading day (one entry per `gex-eod:{ticker}` list), so the off-DST second fire
# is a harmless no-op. Mirrors railway.nighthawk-outcomes.toml's dual-band convention.
# NOTE: if cronSchedule was set in the Railway dashboard UI, the dashboard value overrides this
# TOML — update it there too.
cronSchedule = "10 20,21 * * 1-5"
restartPolicyType = "never"
numReplicas = 1
