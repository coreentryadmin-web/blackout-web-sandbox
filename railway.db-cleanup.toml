# Railway config for the DB-Cleanup cron service.
# Wire it up: service Settings -> Config-as-code -> set path to "railway.db-cleanup.toml"
# Requires CRON_SECRET on this service (same value as blackout-web).
[build]
builder = "nixpacks"
buildCommand = "echo 'cron trigger service: no app build needed'"

[deploy]
startCommand = "node scripts/hit-cron.mjs /api/cron/db-cleanup"
cronSchedule = "0 7 * * *"
restartPolicyType = "never"
numReplicas = 1
