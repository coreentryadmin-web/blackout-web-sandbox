# Railway config for the NightHawk-Playbook edition builder.
# Wire it up: service Settings -> Config-as-code -> "railway.nighthawk-playbook.toml"
# Requires CRON_SECRET on this service (same value as blackout-web) — NOT the full app env.
#
# Runs the edition build via its HTTP route, NOT `tsx scripts/nighthawk-worker.ts`.
# The tsx worker crashed with "Cannot find module 'server-only'": the
# edition-builder -> platform -> spx-service -> spx-evaluator chain imports
# `server-only`, which only resolves inside Next's bundler, not under raw tsx.
# The HTTP route runs INSIDE the Next server (server-only resolves). As of the #77
# hardening it is FIRE-AND-FORGET: the route dispatches the build in the background
# (next/server after()) and returns 202 in <60s, so the trigger logs SUCCESS while the
# build checkpoints + publishes asynchronously. Firing every 15 min across the
# 5:30-7:55 PM ET evening window lets a long Claude build resume to completion across calls.
#
# CRON_HTTP_TIMEOUT_MS (read by scripts/hit-cron.mjs) is set to 180000 (3 min) as a safety
# margin: the route now returns 202 fast so 60s is moot, but a slow background dispatch /
# cold start should never abort the trigger before the 202 lands.
[build]
builder = "nixpacks"
buildCommand = "echo 'cron trigger service: no app build needed'"
# Only redeploy this trigger service when its OWN driver/config changes — NOT on docs/src/
# log commits. Without this, EVERY repo commit (incl. the frequent autonomous-SDLC docs/auto
# log pushes) redeployed all cron trigger services, stalling the every-minute warm writers
# ~15-21 min mid-RTH and tripping the cron-staleness watchdog. This service only runs
# scripts/hit-cron.mjs — ALL business logic lives in the main blackout-web app it pings —
# so it only needs to redeploy when hit-cron.mjs or this TOML changes. Mirrors railway.toml's
# proven repo-relative-glob watchPatterns (a leading-slash "/**" matches NOTHING on Railway).
watchPatterns = [
  "scripts/hit-cron.mjs",
  "railway.nighthawk-playbook.toml",
  "nixpacks.toml",
]

[deploy]
startCommand = "CRON_HTTP_TIMEOUT_MS=180000 node scripts/hit-cron.mjs /api/cron/nighthawk-edition"
# First fire at :30 past the hour (5:30 PM ET in EDT) — avoids two wasted skips before the edition window opens.
cronSchedule = "30/15 21-23 * * 1-5"
restartPolicyType = "never"
numReplicas = 1
