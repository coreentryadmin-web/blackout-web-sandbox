# Railway config for the SPX-Signal-Observe cron service.
# Wire it up: service Settings -> Config-as-code -> set path to "railway.spx-signal-observe.toml"
# Requires CRON_SECRET on this service (same value as blackout-web).
[build]
builder = "nixpacks"
buildCommand = "echo 'cron trigger service: no app build needed'"

[deploy]
startCommand = "node scripts/hit-cron.mjs /api/cron/spx-signal-observe"
# Every minute during the UTC band covering RTH in EDT and EST (11–21 UTC = 7AM–5PM ET).
# Route self-skips outside isSpxEngineCronWindow to avoid off-hours DB writes.
cronSchedule = "* 11-21 * * 1-5"
restartPolicyType = "never"
numReplicas = 1
