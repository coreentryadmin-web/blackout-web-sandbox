# Railway config for the Platform-Warm cron service.
# Wire it up: service Settings -> Config-as-code -> set path to "railway.platform-warm.toml"
# Requires CRON_SECRET on this service (same value as blackout-web).
[build]
builder = "nixpacks"
buildCommand = "echo 'cron trigger service: no app build needed'"
watchPatterns = [
  "scripts/hit-cron.mjs",
  "railway.platform-warm.toml",
  "nixpacks.toml",
]

[deploy]
startCommand = "node scripts/hit-cron.mjs /api/cron/platform-warm"
# Every 5 minutes, 24/7 (no RTH gate — pre-warm general bootstrap bundle for admin/member loads)
cronSchedule = "*/5 * * * *"
restartPolicyType = "ON_FAILURE"
numReplicas = 1
