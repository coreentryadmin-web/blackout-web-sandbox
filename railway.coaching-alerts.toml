# Railway config for Coaching-Alerts cron (position-coaching-monitor replacement).
[build]
builder = "nixpacks"
buildCommand = "echo 'cron trigger service: no app build needed'"
watchPatterns = [
  "scripts/hit-cron.mjs",
  "railway.coaching-alerts.toml",
  "nixpacks.toml",
]

[deploy]
startCommand = "node scripts/hit-cron.mjs /api/cron/coaching-alerts"
cronSchedule = "*/10 11-21 * * 1-5"
restartPolicyType = "never"
numReplicas = 1
