# Scheduled dependency hygiene for a fintech/auth surface (Clerk, Whop, svix, pg, ws).
# Dependabot opens PRs on `dependabot/*` branches, so the `cursor/*`-scoped automerge
# workflow does NOT auto-merge them — they get human review (intended).
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Batch low-risk patch/minor bumps to cut PR noise; majors stay individual.
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    labels:
      - dependencies
      - github-actions
