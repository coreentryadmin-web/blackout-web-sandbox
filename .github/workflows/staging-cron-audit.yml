# Staging cron audit (requires blackout-infra checkout)
name: Staging cron audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1-5"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    if: github.repository == 'coreentryadmin-web/blackout-web-sandbox'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/checkout@v7
        with:
          repository: coreentryadmin-web/blackout-infra
          path: blackout-infra
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Audit staging crons
        run: node scripts/audit-staging-crons.mjs
        working-directory: blackout-infra
