# RTH prod smoke — weekdays 09:35 ET (covers EDT + EST via dual cron)
#
# Public endpoint checks; optional CRON_SECRET enables SPX desk spot probe.
# Pair with rth-deep-audit.yml (10:00/14:00/16:30 ET) for full numeric audit.

name: RTH prod smoke

on:
  schedule:
    # 09:35 AM ET during EDT (UTC-4)
    - cron: "35 13 * * 1-5"
    # 09:35 AM ET during EST (UTC-5)
    - cron: "35 14 * * 1-5"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Live HTTP smoke (blackouttrades.com)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_TARGET_BASE_URL: https://blackouttrades.com
        run: node scripts/gha-http-smoke.mjs

      - name: Summary
        run: echo "RTH prod smoke passed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
