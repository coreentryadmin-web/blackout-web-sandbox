# Launch a Cursor Cloud Agent for RTH-open validation (weekdays ~09:32 ET).
#
# Requires repo secret: CURSOR_API_KEY (Cursor dashboard → Integrations → User API keys
# or a service account key with Cloud Agents scope).
#
# Without the secret this job no-ops successfully — use cursor.com/automations for
# fully managed scheduling inside Cursor.

name: RTH Cloud Agent launch

on:
  schedule:
    # Multiple passes through RTH so the comprehensive sweep (speed + live-update latency +
    # data correctness + API verification, per page) runs repeatedly — not just at the open.
    # Dual cron per slot covers EDT (UTC-4) + EST (UTC-5). GitHub may delay scheduled runs a
    # few minutes under load; that's fine for these passes.
    - cron: "32 13 * * 1-5" # 09:32 ET (open) EDT
    - cron: "32 14 * * 1-5" # 09:32 ET (open) EST
    - cron: "0 15 * * 1-5"  # 11:00 ET EDT
    - cron: "0 16 * * 1-5"  # 11:00 ET EST
    - cron: "0 17 * * 1-5"  # 13:00 ET EDT
    - cron: "0 18 * * 1-5"  # 13:00 ET EST
    - cron: "0 19 * * 1-5"  # 15:00 ET EDT
    - cron: "0 20 * * 1-5"  # 15:00 ET EST
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Start Cloud Agent (RTH-open runbook)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "CURSOR_API_KEY not set — skipping agent launch."
            echo "Add the secret in GitHub repo settings, or create an Automation at cursor.com/automations"
            exit 0
          fi

          PROMPT='Autonomous RTH session. Read and execute docs/ops/RTH-OPEN-RUNBOOK.md, INCLUDING the "RTH COMPREHENSIVE TEST SWEEP" section: sign in with a premium session and test EVERY page (dashboard, flows, BlackOut Thermal matrix+profile, grid + its 12 panels, nighthawk, terminal/Largo, track-record) for (1) load + soft-nav SPEED, (2) LIVE auto-update without refresh and how soon each updates, (3) DATA CORRECTNESS verified against the canonical source via direct API call (no fabricated/stale/false numbers; cross-tool agreement), (4) API verification (200 + fresh as_of + in-band), (5) console/render health, (6) Largo dynamic status + grounded answers. Also run npm run validate:rth-open and GET /api/cron/data-correctness?force=1. Append findings to docs/api-audit/OPEN-ISSUES.md, open a GitHub issue (label ops-auto-fix) for any P0/P1, and fix → branch → PR → merge → re-verify until GREEN. Do NOT ask the user for permission.'
          export PROMPT

          payload=$(node -e "
            console.log(JSON.stringify({
              prompt: { text: process.env.PROMPT },
              repos: [{ url: 'https://github.com/coreentryadmin-web/blackout-web', startingRef: 'main' }],
              autoCreatePR: true
            }));
          ")

          resp=$(curl -sf -X POST https://api.cursor.com/v1/agents \
            -u "${CURSOR_API_KEY}:" \
            -H 'Content-Type: application/json' \
            -d "$payload")

          echo "$resp" | node -e "
            const r = JSON.parse(require('fs').readFileSync(0,'utf8'));
            const url = r.agent?.url ?? r.url ?? '(see response)';
            console.log('Cloud Agent started:', url);
          "
