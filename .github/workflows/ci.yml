name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (rapid pushes / PR syncs) to save minutes.
# main pushes use a unique group so deploy-gating runs are never cancelled.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: API auth guard (default-deny)
        run: node scripts/verify-api-auth-guards.mjs
      - name: Tailwind @apply opacity guard (recurring build breaker)
        run: node scripts/check-tailwind-apply-opacity.mjs
      - name: Unit tests
        # Node 20 does not expand globs in --test; expand in bash but keep module mocks.
        shell: bash
        env:
          PLAYBOOK_VERDICT_GUARD_ASSERT: "1"
        run: |
          shopt -s globstar nullglob
          files=(src/**/*.test.ts)
          echo "Running ${#files[@]} test files"
          node --import tsx --experimental-test-module-mocks --test "${files[@]}"
      - name: Build (next build — catches deploy-breakers before merge)
        run: npm run build
      - name: Brand guard (no grey)
        run: npm run lint:brand
      - name: Vendor surface guard (no provider names in UI)
        run: npm run lint:vendor
      - name: Accessibility lint (jsx-a11y, non-blocking)
        run: npm run lint
        continue-on-error: true
      - name: Stylelint (non-blocking)
        run: npm run lint:css
        continue-on-error: true
