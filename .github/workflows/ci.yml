name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Brand guard (no grey)
        run: npm run lint:brand
      - name: Vendor surface guard (no provider names in UI)
        run: npm run lint:vendor
      - name: Accessibility lint (jsx-a11y, non-blocking)
        run: npm run lint
        continue-on-error: true
      - name: Stylelint (non-blocking)
        run: npm run lint:css
        continue-on-error: true
