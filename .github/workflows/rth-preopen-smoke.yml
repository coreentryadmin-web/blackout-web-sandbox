# RTH pre-open smoke — weekdays ~09:30 ET (before deep audit at 10:00).
# Catches overnight deploy regressions before the open bell.

name: RTH pre-open smoke

on:
  schedule:
    # 9:30 AM ET during EDT (UTC-4)
    - cron: "30 13 * * 1-5"
    # 9:30 AM ET during EST (UTC-5)
    - cron: "30 14 * * 1-5"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Pre-open HTTP smoke
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_TARGET_BASE_URL: https://blackouttrades.com
        run: node scripts/gha-http-smoke.mjs

      - name: Summary
        run: echo "RTH pre-open smoke passed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
