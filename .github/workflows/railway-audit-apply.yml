# Sync Railway production crons + regions from repo (audit checklist).
#
# Requires GitHub secret: RAILWAY_TOKEN (project or account token with write access)
# Unset invalid RAILWAY_API_TOKEN in the job env so a stale account token does not shadow it.

name: Railway audit apply

on:
  schedule:
    # Sunday 06:00 UTC — refresh cron config-as-code before the trading week
    - cron: "0 6 * * 0"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "railway.*.toml"
      - "scripts/railway-audit-apply.mjs"
      - "scripts/railway-cron-services.mjs"
      - "scripts/railway-apply-cron-config.mjs"

concurrency:
  group: railway-audit-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.23.1

      - name: Validate cron manifest (pre-apply)
        run: node scripts/validate-railway-cron-manifest.mjs

      - name: Apply Railway audit checklist
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 9282f541-a288-4c8b-a174-ee22016f4b1a
          RAILWAY_ENVIRONMENT: production
          DISCORD_OPS_WEBHOOK_URL: ${{ secrets.DISCORD_OPS_WEBHOOK_URL }}
          DISCORD_PLAY_WEBHOOK_URL: ${{ secrets.DISCORD_PLAY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "RAILWAY_TOKEN secret not set — skipping live apply."
            echo "Add project token at https://railway.com/account/tokens"
            exit 0
          fi
          unset RAILWAY_API_TOKEN || true
          node scripts/railway-audit-apply.mjs

      - name: Summary
        run: echo "Railway audit apply finished at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
