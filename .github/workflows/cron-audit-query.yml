# Prod cron_job_runs audit — scheduled + manual.
name: Cron audit query

on:
  schedule:
    # Hourly during RTH UTC band (11–21 UTC ≈ 7AM–5PM ET)
    - cron: "5 11-21 * * 1-5"
    # Off-hours spot check (aligned with off-hours-health)
    - cron: "5 */6 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - scripts/cron-audit-query.mjs
      - .github/workflows/cron-audit-query.yml

jobs:
  query:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Query prod cron_job_runs
        env:
          DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
        run: |
          if [ -z "${DATABASE_PUBLIC_URL:-}" ]; then
            echo "DATABASE_PUBLIC_URL not set — skip scheduled audit"
            exit 0
          fi
          node scripts/cron-audit-query.mjs
