# Staging RTH soak — weekdays 09:35 ET (13:35 UTC standard time; adjust for DST in workflow if needed)
name: Staging RTH check

on:
  workflow_dispatch:
  schedule:
    - cron: "35 13 * * 1-5"

permissions:
  contents: read

jobs:
  rth:
    runs-on: ubuntu-latest
    if: github.repository == 'coreentryadmin-web/blackout-web-sandbox'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Staging RTH validation
        run: npm run validate:staging-rth
