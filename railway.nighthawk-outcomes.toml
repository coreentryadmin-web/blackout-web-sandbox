# Railway config for the NightHawk-Outcomes cron service.
# Wire it up: service Settings -> Config-as-code -> set path to "railway.nighthawk-outcomes.toml"
# Requires CRON_SECRET on this service (same value as blackout-web).
[build]
builder = "nixpacks"
buildCommand = "echo 'cron trigger service: no app build needed'"
# Only redeploy this trigger service when its OWN driver/config changes — NOT on docs/src/
# log commits. Without this, EVERY repo commit (incl. the frequent autonomous-SDLC docs/auto
# log pushes) redeployed all cron trigger services, stalling the every-minute warm writers
# ~15-21 min mid-RTH and tripping the cron-staleness watchdog. This service only runs
# scripts/hit-cron.mjs — ALL business logic lives in the main blackout-web app it pings —
# so it only needs to redeploy when hit-cron.mjs or this TOML changes. Mirrors railway.toml's
# proven repo-relative-glob watchPatterns (a leading-slash "/**" matches NOTHING on Railway).
watchPatterns = [
  "scripts/hit-cron.mjs",
  "railway.nighthawk-outcomes.toml",
  "nixpacks.toml",
]

[deploy]
startCommand = "node scripts/hit-cron.mjs /api/cron/nighthawk-outcomes"
# 20:30 + 21:30 UTC covers the 16:30 ET outcome target in BOTH EDT (UTC-4: 20:30 UTC =
# 16:30 ET) and EST (UTC-5: 21:30 UTC = 16:30 ET). The route self-skips the off-band fire
# via inOutcomeWindow() (DST-aware Intl ET clock); the EDT 21:30 UTC = 17:30 ET second fire
# is a no-op (resolvePendingNighthawkOutcomes only retries still-pending rows). Mirrors
# railway.spx-evaluate.toml's dual-band convention. NOTE: if cronSchedule was set in the
# Railway dashboard UI, the dashboard value overrides this TOML — update it there too.
cronSchedule = "30 20,21 * * 1-5"
restartPolicyType = "never"
numReplicas = 1
