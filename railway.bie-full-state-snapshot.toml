# Railway config for BIE-Full-State-Snapshot cron.
[build]
builder = "nixpacks"
buildCommand = "echo 'cron trigger service: no app build needed'"
watchPatterns = [
  "scripts/hit-cron.mjs",
  "railway.bie-full-state-snapshot.toml",
  "nixpacks.toml",
]

[deploy]
startCommand = "node scripts/hit-cron.mjs /api/cron/bie-full-state-snapshot"
cronSchedule = "3-59/5 11-21 * * 1-5"
restartPolicyType = "never"
numReplicas = 1
