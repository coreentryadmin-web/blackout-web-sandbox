# Railway config for the Largo-Chat-CleanUp cron service.
# Wire it up: service Settings -> Config-as-code -> set path to "railway.largo-cleanup.toml"
# Requires CRON_SECRET on this service (same value as blackout-web).
[build]
builder = "nixpacks"
buildCommand = "echo 'cron trigger service: no app build needed'"

[deploy]
startCommand = "node scripts/hit-cron.mjs /api/cron/largo-cleanup"
cronSchedule = "0 8 * * 0"
restartPolicyType = "never"
numReplicas = 1
